// ---- GitHub 自動保存 ----
const GH_TOKEN_KEY = "vocabTrail_riho_gh_token";
const GH_OWNER = "okuyamafamilychicago-tech";
const GH_REPO  = "Saho-English-Word";
const GH_PATH  = "progress/riho_progress.json";

function getGHToken() { return localStorage.getItem(GH_TOKEN_KEY) || ""; }
function setGHToken(t) { localStorage.setItem(GH_TOKEN_KEY, t); }

async function autoSaveToGitHub() {
  const token = getGHToken();
  if (!token) return;
  try {
    const payload = JSON.stringify(buildBackupPayload(true), null, 2);
    const apiUrl = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}`;
    // 既存ファイルのSHAを取得
    let sha = "";
    const getRes = await fetch(apiUrl, { headers: { Authorization: `token ${token}`, Accept: "application/vnd.github+json" } });
    if (getRes.ok) { const j = await getRes.json(); sha = j.sha; }
    // ファイルを更新/作成
    const body = { message: `自動保存 ${new Date().toLocaleString("ja-JP")}`, content: btoa(unescape(encodeURIComponent(payload))), ...(sha ? { sha } : {}) };
    const putRes = await fetch(apiUrl, { method: "PUT", headers: { Authorization: `token ${token}`, Accept: "application/vnd.github+json", "Content-Type": "application/json" }, body: JSON.stringify(body) });
    if (putRes.ok) showGHToast("☁️ GitHubに保存しました");
    else showGHToast("⚠️ GitHub保存に失敗しました");
  } catch (e) {
    console.warn("GitHub save failed:", e);
  }
}

async function loadFromGitHub() {
  const token = getGHToken();
  if (!token) { alert("GitHub Tokenが設定されていません。設定から入力してください。"); return; }
  try {
    const apiUrl = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}`;
    const res = await fetch(apiUrl, { headers: { Authorization: `token ${token}`, Accept: "application/vnd.github+json" } });
    if (!res.ok) { alert("GitHubにデータが見つかりませんでした。"); return; }
    const j = await res.json();
    const text = decodeURIComponent(escape(atob(j.content)));
    const parsed = JSON.parse(text);
    if (parsed.state) {
      Object.assign(state, parsed.state);
      saveState();
      alert(`GitHubから読み込みました！\n覚えた語: ${state.mastered.length}語`);
      location.reload();
    }
  } catch (e) {
    alert("読み込みに失敗しました: " + e.message);
  }
}

function showGHToast(msg) {
  document.querySelectorAll(".gh-toast").forEach(t => t.remove());
  const t = document.createElement("div");
  t.className = "gh-toast";
  t.style.cssText = "position:fixed; bottom:60px; left:50%; transform:translateX(-50%) translateY(20px); background:#24292e; color:#fff; padding:11px 18px; border-radius:14px; font-weight:700; font-size:0.86rem; box-shadow:0 6px 16px rgba(0,0,0,0.18); z-index:9999; opacity:0; transition:all 0.25s ease;";
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => { t.style.opacity = "1"; t.style.transform = "translateX(-50%) translateY(0)"; });
  setTimeout(() => { t.style.opacity = "0"; t.style.transform = "translateX(-50%) translateY(20px)"; setTimeout(() => t.remove(), 300); }, 2400);
}

function showBackupToast(filename) {
  // 既存のトーストを削除
  document.querySelectorAll(".backup-toast").forEach(t => t.remove());
  const t = document.createElement("div");
  t.className = "backup-toast";
  t.style.cssText = "position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--teal); color:#fff; padding:11px 18px; border-radius:14px; font-weight:700; font-size:0.86rem; box-shadow:0 6px 16px rgba(0,0,0,0.18); z-index:9999; opacity:0; transition:all 0.25s ease;";
  t.innerHTML = `📦 自動バックアップ済み<br><small style="font-weight:600; opacity:0.85; font-size:0.72rem">${esc(filename)}</small>`;
  document.body.appendChild(t);
  requestAnimationFrame(() => {
    t.style.opacity = "1";
    t.style.transform = "translateX(-50%) translateY(0)";
  });
  setTimeout(() => {
    t.style.opacity = "0";
    t.style.transform = "translateX(-50%) translateY(20px)";
    setTimeout(() => t.remove(), 300);
  }, 2400);
}

function importBackup() {
  const inp = document.createElement("input");
  inp.type = "file";
  inp.accept = ".json,application/json";
  inp.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const raw = JSON.parse(ev.target.result);
        const importedState = raw.state || raw;   // 旧フォーマットも 受け入れる
        if (!confirm(`バックアップ から 復元します。\n\n覚えた語: ${(importedState.mastered||[]).length}語\nテスト記録: ${(importedState.history||[]).filter(r=>r.mode==="test").length}回\nバックアップ日: ${raw.exportedAt || "不明"}\n\n現在の進捗は 上書きされます。よろしいですか？`)) return;
        state = { ...structuredClone(defaultState), ...importedState };
        saveState();
        alert("復元しました！");
        renderMountain();
        renderHome();
        document.querySelectorAll(".modal-backdrop").forEach(m => m.remove());
      } catch (err) {
        alert("ファイルの 読み込みに 失敗しました:\n" + err.message);
      }
    };
    reader.readAsText(file);
  };
  inp.click();
}

function resetProgress() {
  if (!confirm("すべての記録を ゼロから やり直します。\n\n・覚えた語\n・テストで まちがえた単語\n・テスト/まなぶ の 履歴\n・SRS（成長 ステージ）\n・連続日数\n\n単語リスト（100語）と 例文 は そのまま 残ります。\n\nよろしいですか？")) return;
  state.mastered = [];
  state.testWrong = [];
  state.totalCorrect = 0;
  state.totalAttempts = 0;
  state.lastSessionDate = null;
  state.streak = 0;
  state.history = [];
  state.srs = {};
  state.images = {};
  saveState();
  renderMountain();
  renderHome();
  document.querySelector(".modal-backdrop")?.remove();
  alert("すべて リセットしました。ゼロから 始めましょう 🌱");
}

applySvgTheme(state.svgTheme || "forest");
