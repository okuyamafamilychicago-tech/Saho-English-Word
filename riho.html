<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riho English Word — めざせ TOEFL 100</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<!-- 単語マスター（Claudeが更新する外部ファイル）-->
<script src="単語マスター.js"></script>
<style>
  :root {
    --bg:        #f7f3ea;
    --bg-2:      #efe8d8;
    --card:      #fffdf8;
    --ink:       #44403a;
    --ink-soft:  #8a8377;
    --line:      #e7dfcf;

    --coral:     #ec7a63;
    --coral-deep:#d65f48;
    --coral-soft:#fbe3dc;
    --teal:      #46a594;
    --teal-soft: #d8efe9;
    --honey:     #eaa83f;
    --honey-soft:#fbeccf;
    --berry:     #b3688c;
    --berry-soft:#f1e0e9;

    --good:      #3f9c7c;
    --bad:       #d65f48;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Zen Maru Gothic", "Quicksand", "Hiragino Maru Gothic ProN", system-ui, sans-serif;
    background:
      radial-gradient(circle at 18% 12%, #fbf6ec 0%, transparent 40%),
      radial-gradient(circle at 85% 0%, #f2ece0 0%, transparent 45%),
      var(--bg);
    background-attachment: fixed;
    color: var(--ink);
    min-height: 100vh;
    padding: 22px 14px 70px;
    line-height: 1.6;
  }

  .wrap { max-width: 600px; margin: 0 auto; }

  /* ---------- Header ---------- */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .logo {
    font-weight: 900;
    font-size: 1.3rem;
    color: var(--ink);
    letter-spacing: 0.01em;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .logo .mark {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; border-radius: 10px;
    background: var(--teal); color: #fff; font-size: 0.95rem;
  }
  .tagline { font-size: 0.72rem; color: var(--ink-soft); margin-top: 3px; padding-left: 37px; }
  .header-btns { display: flex; gap: 7px; }

  /* ---------- Progress card ---------- */
  .journey-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 6px 6px 16px;
    margin-bottom: 14px;
    overflow: hidden;
    box-shadow: 0 8px 22px rgba(68,64,58,0.07);
  }
  .journey-svg {
    width: 100%; height: 244px; display: block;
    border-radius: 18px;
  }
  .journey-body { padding: 12px 16px 0; }

  .elevation-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .elev-num { font-weight: 900; font-size: 1.5rem; color: var(--ink); }
  .elev-num small { font-size: 0.78rem; color: var(--ink-soft); font-weight: 500; }
  .elev-label {
    display: inline-block;
    font-size: 0.74rem; color: var(--teal);
    font-weight: 700; margin-top: 2px;
  }
  .elev-pct { font-weight: 900; font-size: 1.7rem; color: var(--coral); line-height: 1; }
  .elev-pct small { font-size: 0.85rem; }
  .elev-cap { font-size: 0.64rem; color: var(--ink-soft); text-align: right; letter-spacing: 0.05em; }

  .track {
    height: 12px; background: var(--bg-2);
    border-radius: 999px; margin-top: 12px; overflow: hidden;
    position: relative;
  }
  .track > div {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--honey), var(--coral));
    border-radius: 999px; transition: width 0.5s ease;
  }
  .checkpoints {
    display: flex; justify-content: space-between;
    font-size: 0.68rem; color: var(--ink-soft);
    margin-top: 8px; font-weight: 700;
  }
  .checkpoints span { opacity: 0.5; transition: opacity 0.2s, color 0.2s; }
  .checkpoints span.passed { opacity: 1; color: var(--coral-deep); }

  /* ---------- Forest friends roster ---------- */
  .friends-roster {
    margin-top: 14px; padding-top: 12px;
    border-top: 1px dashed var(--line);
  }
  .roster-title {
    font-size: 0.72rem; font-weight: 700; color: var(--ink-soft);
    display: flex; justify-content: space-between; align-items: center;
    gap: 8px; margin-bottom: 6px;
  }
  .roster-title span { color: var(--teal); font-weight: 900; white-space: nowrap; }
  .next-friend {
    font-size: 0.72rem; font-weight: 700; color: var(--coral-deep);
    background: var(--coral-soft); border-radius: 999px;
    padding: 4px 12px; margin-bottom: 9px; display: inline-block;
  }
  .roster-list {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px;
    max-height: 168px; overflow-y: auto; padding: 2px;
  }
  @media (max-width: 460px) { .roster-list { grid-template-columns: repeat(5, 1fr); } }
  .friend {
    background: var(--bg); border: 1px solid var(--line);
    border-radius: 11px; padding: 6px 2px 4px; text-align: center;
    transition: all 0.25s;
  }
  .friend .face { font-size: 1.15rem; line-height: 1.1; filter: grayscale(1); opacity: 0.4; transition: all 0.25s; }
  .friend .fname { font-size: 0.56rem; color: var(--ink-soft); margin-top: 0; font-weight: 700; line-height: 1.2; }
  .friend .fneed { font-size: 0.52rem; color: var(--ink-soft); opacity: 0.8; }
  .friend.met {
    background: var(--honey-soft); border-color: #efd6a3;
    box-shadow: 0 2px 6px rgba(234,168,63,0.18);
  }
  .friend.met .face { filter: none; opacity: 1; }
  .friend.met .fname { color: var(--coral-deep); }
  .friend.next { border-color: var(--coral); border-style: dashed; }
  @keyframes pop-in { 0%{transform:scale(0.6);} 60%{transform:scale(1.12);} 100%{transform:scale(1);} }
  .friend.met .face { animation: pop-in 0.4s ease; }

  /* ---------- Stats ---------- */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 9px; margin-bottom: 18px; }
  .stat {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 12px 4px 10px;
    text-align: center;
    box-shadow: 0 4px 12px rgba(68,64,58,0.05);
    position: relative;
  }
  .stat::before {
    content: ""; position: absolute; top: 0; left: 18%; right: 18%; height: 3px;
    border-radius: 0 0 4px 4px;
  }
  .stat.c1::before { background: var(--coral); }
  .stat.c2::before { background: var(--honey); }
  .stat.c3::before { background: var(--teal); }
  .stat.c4::before { background: var(--berry); }
  .stat-emoji { font-size: 0.95rem; }
  .stat-val { font-weight: 900; font-size: 1.3rem; color: var(--ink); line-height: 1.1; }
  .stat-label { font-size: 0.64rem; color: var(--ink-soft); margin-top: 1px; font-weight: 700; }

  /* ---------- Buttons ---------- */
  .btn {
    background: var(--coral);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 14px 26px;
    font-size: 1rem;
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.08s, box-shadow 0.15s, background 0.15s;
    box-shadow: 0 4px 0 var(--coral-deep), 0 8px 16px rgba(214,95,72,0.22);
  }
  .btn:hover { background: var(--coral-deep); }
  .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--coral-deep), 0 3px 8px rgba(214,95,72,0.2); }
  .btn:disabled { background: #cfc6b6; box-shadow: 0 4px 0 #b9b0a0; cursor: not-allowed; }
  .btn.wide { width: 100%; }
  .btn.small { padding: 11px 18px; font-size: 0.9rem; }
  .btn.ghost {
    background: var(--card); color: var(--coral-deep);
    box-shadow: 0 4px 0 var(--line), 0 6px 12px rgba(68,64,58,0.06);
    border: 1px solid var(--line);
  }
  .btn.ghost:hover { background: #fff8ee; }
  .btn.ghost:active { box-shadow: 0 1px 0 var(--line); }
  .btn.teal { background: var(--teal); box-shadow: 0 4px 0 #357f71, 0 8px 16px rgba(70,165,148,0.22); }
  .btn.teal:hover { background: #3c9384; }
  .btn.teal:active { box-shadow: 0 1px 0 #357f71; }

  /* ---------- Card ---------- */
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 24px 22px;
    box-shadow: 0 8px 22px rgba(68,64,58,0.07);
  }
  .card + .card { margin-top: 14px; }

  /* ---------- Question ---------- */
  .q-progress-bar { height: 8px; background: var(--bg-2); border-radius: 999px; overflow: hidden; margin-bottom: 16px; }
  .q-progress-bar > div { height: 100%; background: linear-gradient(90deg, var(--teal), var(--coral)); transition: width 0.35s ease; border-radius: 999px; }
  .q-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.78rem; margin-bottom: 16px; font-weight: 700; color: var(--ink-soft); }
  .q-type-tag { color: #fff; background: var(--berry); border-radius: 999px; padding: 3px 12px; font-size: 0.7rem; }

  .q-prompt { font-size: 0.95rem; color: var(--ink-soft); margin-bottom: 10px; font-weight: 700; }
  .q-content { font-size: 1.35rem; color: var(--ink); margin-bottom: 22px; line-height: 1.4; font-weight: 700; text-align: center; }
  .q-content.word { font-size: 2.2rem; font-weight: 900; color: var(--coral-deep); letter-spacing: 0.01em; }
  .q-content .blank { display: inline-block; min-width: 60px; border-bottom: 3px dashed var(--coral); color: var(--coral-deep); text-align: center; padding: 0 6px; }

  .choices { display: grid; grid-template-columns: 1fr; gap: 10px; }
  @media (min-width: 480px) { .choices { grid-template-columns: 1fr 1fr; } }
  .choice {
    background: var(--card);
    border: 2px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    font-size: 0.96rem;
    font-family: inherit; font-weight: 600;
    color: var(--ink);
    cursor: pointer; text-align: left;
    transition: all 0.12s;
    box-shadow: 0 3px 0 var(--bg-2);
  }
  .choice:hover:not(:disabled) { border-color: var(--teal); transform: translateY(-1px); }
  .choice:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 1px 0 var(--bg-2); }
  .choice.correct { background: var(--teal-soft); border-color: var(--good); color: var(--good); box-shadow: 0 3px 0 #bfe3d8; }
  .choice.wrong { background: var(--coral-soft); border-color: var(--bad); color: var(--bad); box-shadow: 0 3px 0 #f3cfc6; }
  .choice .letter {
    display: inline-flex; align-items: center; justify-content: center;
    width: 24px; height: 24px; border-radius: 7px;
    background: var(--bg-2); color: var(--ink-soft);
    font-weight: 800; margin-right: 9px; font-size: 0.82rem; vertical-align: middle;
  }

  .feedback { margin-top: 16px; padding: 0; border-radius: 14px; font-size: 0.94rem; font-weight: 700; transition: all 0.2s; }
  .feedback.show.ok  { background: var(--teal-soft); color: var(--good); padding: 13px 16px; }
  .feedback.show.ng  { background: var(--coral-soft); color: var(--bad); padding: 13px 16px; }
  .feedback .word-info { font-weight: 700; margin-top: 4px; color: var(--ink); }

  /* ---------- Result ---------- */
  .result { text-align: center; }
  .result h2 { font-weight: 900; font-size: 1.4rem; color: var(--ink); margin-bottom: 6px; }
  .result .summary { font-size: 0.96rem; color: var(--ink-soft); margin-bottom: 16px; font-weight: 700; }
  .result-score { font-weight: 900; font-size: 3.2rem; color: var(--teal); margin: 8px 0 2px; }
  .result-score small { font-size: 1rem; color: var(--ink-soft); font-weight: 700; }
  .result-gain { color: var(--coral-deep); font-weight: 800; margin-bottom: 18px; }
  .result-actions { display: flex; gap: 10px; margin-top: 12px; }
  .result-actions .btn { flex: 1; }
  .stars-burst { font-size: 1.7rem; margin-bottom: 2px; letter-spacing: 3px; }

  /* ---------- Home ---------- */
  .home-cta { text-align: center; padding: 4px 0; }
  .home-cta h2 { font-weight: 900; font-size: 1.2rem; color: var(--ink); margin-bottom: 6px; }
  .home-cta p { color: var(--ink-soft); font-size: 0.9rem; margin-bottom: 16px; font-weight: 600; }
  .home-actions { display: flex; gap: 10px; margin-top: 12px; }
  .home-actions .btn { flex: 1; }

  /* ---------- Mode cards (Learn / Test) ---------- */
  .mode-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 4px; }
  .mode-card {
    border: 2px solid var(--line); border-radius: 18px;
    padding: 18px 12px; cursor: pointer; text-align: center;
    font-family: inherit; transition: transform 0.1s, box-shadow 0.15s, border-color 0.15s;
    box-shadow: 0 5px 0 var(--bg-2);
  }
  .mode-card:active:not(:disabled) { transform: translateY(3px); box-shadow: 0 2px 0 var(--bg-2); }
  .mode-card:disabled { opacity: 0.5; cursor: not-allowed; }
  .mode-card.learn { background: var(--teal-soft); border-color: #bfe3d8; }
  .mode-card.learn:hover:not(:disabled) { border-color: var(--teal); }
  .mode-card.test { background: var(--coral-soft); border-color: #f3cfc6; }
  .mode-card.test:hover:not(:disabled) { border-color: var(--coral); }
  .mode-emoji { font-size: 1.9rem; }
  .mode-name { font-weight: 900; font-size: 1.1rem; color: var(--ink); margin-top: 2px; }
  .mode-desc { font-size: 0.7rem; color: var(--ink-soft); margin-top: 4px; line-height: 1.5; font-weight: 600; }

  /* ---------- Learning: steps + flashcard ---------- */
  .steps { display: flex; gap: 6px; justify-content: center; margin-bottom: 14px; }
  .step-dot {
    display: flex; align-items: center; gap: 5px;
    font-size: 0.68rem; font-weight: 800; color: var(--ink-soft);
    background: var(--bg); border: 1px solid var(--line);
    border-radius: 999px; padding: 4px 11px;
  }
  .step-dot.active { background: var(--teal); color: #fff; border-color: var(--teal); }
  .step-dot.done { background: var(--teal-soft); color: var(--good); border-color: #bfe3d8; }

  .flash-word {
    text-align: center; font-weight: 900; font-size: 2.2rem;
    color: var(--coral-deep); margin: 4px 0 2px; letter-spacing: 0.01em;
  }
  .audio-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--teal); color: #fff; border: none; cursor: pointer;
    font-size: 1.2rem; box-shadow: 0 3px 0 #357f71; margin: 6px auto 10px;
  }
  .audio-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #357f71; }
  /* 例文ボックス（英語＋日本語） */
  .flash-ex {
    background: var(--honey-soft); border: 1px solid #efd6a3;
    border-radius: 16px; padding: 14px 16px; margin: 4px 0 12px;
    color: var(--ink); line-height: 1.6;
  }
  .flash-ex .lbl {
    font-size: 0.68rem; color: #b07a17; font-weight: 800;
    display: inline-flex; align-items: center; gap: 4px; margin-bottom: 6px;
  }
  .flash-ex .ex-en { font-size: 1.05rem; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
  .flash-ex .ex-en b { color: var(--coral-deep); }
  .flash-ex .ex-ja { font-size: 0.92rem; font-weight: 600; color: var(--ink-soft); border-top: 1px dashed #f0dcae; padding-top: 6px; margin-top: 4px; }
  .flash-meaning {
    background: var(--teal-soft); border-radius: 14px; padding: 14px 16px;
    font-weight: 700; color: var(--ink); text-align: center; margin-bottom: 8px;
  }
  .flash-meaning .lbl { font-size: 0.66rem; color: var(--good); font-weight: 800; display: block; margin-bottom: 3px; }
  .flash-example {
    font-size: 0.95rem; color: var(--ink-soft); text-align: center;
    margin-bottom: 16px; line-height: 1.6;
  }
  .flash-example b { color: var(--coral-deep); }
  .growth-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 0.72rem; font-weight: 800; color: var(--ink-soft);
    background: var(--honey-soft); border: 1px solid #efd6a3;
    border-radius: 999px; padding: 3px 11px;
  }
  .reveal-hidden { filter: blur(7px); user-select: none; transition: filter 0.25s; }

  /* ---------- つかう: タイピング入力 ---------- */
  .use-input {
    width: 100%; padding: 14px 16px; font-size: 1.3rem;
    font-family: "Quicksand", "Zen Maru Gothic", system-ui, sans-serif;
    font-weight: 700; text-align: center;
    color: var(--ink); background: #fffdf8;
    border: 2px solid var(--line); border-radius: 14px;
    transition: border-color 0.15s, background 0.15s;
    letter-spacing: 0.02em;
  }
  .use-input:focus { outline: none; border-color: var(--teal); }
  .use-input.ok { border-color: var(--good); background: var(--teal-soft); color: var(--good); }
  .use-input.ng { border-color: var(--bad); background: var(--coral-soft); color: var(--bad); }
  .use-hint {
    text-align: center; color: var(--ink-soft); font-size: 0.88rem;
    margin: 10px 0 14px; font-weight: 600;
  }
  .use-hint b { color: var(--ink); font-weight: 800; }
  .use-hint .ja { display: block; font-size: 0.8rem; margin-top: 4px; color: var(--ink-soft); opacity: 0.9; }

  /* ---------- Session top bar (やめる / 切りかえ) ---------- */
  .session-bar {
    display: flex; justify-content: space-between; align-items: center;
    gap: 8px; margin-bottom: 14px;
  }
  .session-bar .icon-btn { font-size: 0.74rem; padding: 7px 12px; }
  .session-bar .switch-btn { color: var(--teal); border-color: #c9e6df; }
  .session-bar .switch-btn:hover { background: var(--teal-soft); }

  /* ---------- Upload ---------- */
  .upload textarea {
    width: 100%; min-height: 200px;
    border: 2px solid var(--line); border-radius: 14px;
    padding: 12px 14px;
    font-family: "SFMono-Regular", Consolas, monospace;
    font-size: 0.85rem; line-height: 1.5; resize: vertical;
    color: var(--ink); background: #fffdf8;
  }
  .upload textarea:focus { outline: none; border-color: var(--teal); }
  .hint {
    background: var(--honey-soft);
    border-radius: 14px; padding: 12px 14px;
    font-size: 0.82rem; color: #8a6313; margin: 12px 0; line-height: 1.7;
    border: 1px solid #f0dcae;
  }
  .hint code { background: #fff; padding: 1px 6px; border-radius: 6px; color: var(--coral-deep); font-weight: 700; }
  .preview-line { font-size: 0.88rem; color: var(--ink-soft); margin: 10px 0; min-height: 1.2em; font-weight: 700; }
  .preview-line strong { color: var(--coral-deep); }
  .sample {
    font-size: 0.8rem; color: var(--ink-soft);
    background: var(--teal-soft); border: 1px solid #c9e6df;
    border-radius: 12px; padding: 10px 12px; margin-bottom: 12px;
    max-height: 120px; overflow-y: auto;
  }
  .sample div { padding: 2px 0; }
  .sample b { color: var(--ink); }

  /* ---------- Test chart (折れ線グラフ) ---------- */
  .test-chart {
    background: #fffdf8;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 10px 6px 4px;
    margin-bottom: 14px;
  }
  .test-chart svg { width: 100%; height: auto; max-height: 180px; display: block; }

  /* ---------- Wrong-words list ---------- */
  .wrong-word {
    background: var(--coral-soft); border: 1px solid #f3cfc6;
    border-radius: 12px; padding: 10px 14px; margin-bottom: 8px;
  }
  .wrong-word .ww-head {
    display: flex; justify-content: space-between; align-items: center;
  }
  .wrong-word .ww-word { color: var(--coral-deep); font-size: 1.05rem; font-weight: 800; }
  .wrong-word .ww-date { font-size: 0.7rem; color: var(--ink-soft); }
  .wrong-word .ww-def { font-size: 0.86rem; color: var(--ink); margin-top: 4px; }

  /* ---------- History ---------- */
  .hist-list { display: flex; flex-direction: column; gap: 8px; }
  .hist-row {
    display: grid; grid-template-columns: auto 1fr auto;
    align-items: center; gap: 10px;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 14px; padding: 10px 14px;
    font-size: 0.85rem; box-shadow: 0 3px 10px rgba(68,64,58,0.05);
  }
  .hist-date { color: var(--ink-soft); font-variant-numeric: tabular-nums; font-weight: 700; }
  .hist-bar { height: 9px; background: var(--bg-2); border-radius: 999px; overflow: hidden; }
  .hist-bar > div { height: 100%; background: linear-gradient(90deg, var(--teal), var(--coral)); border-radius: 999px; }
  .hist-score { font-weight: 900; color: var(--teal); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .hist-climb { font-size: 0.72rem; color: var(--coral-deep); font-weight: 700; }
  .empty-note { color: var(--ink-soft); font-size: 0.9rem; text-align: center; padding: 20px 0; font-weight: 600; }

  /* ---------- Modal ---------- */
  .icon-btn {
    background: var(--card); border: 1px solid var(--line);
    color: var(--ink-soft); border-radius: 11px;
    padding: 7px 11px; font-size: 0.76rem; cursor: pointer;
    font-family: inherit; font-weight: 700;
    box-shadow: 0 3px 8px rgba(68,64,58,0.06);
  }
  .icon-btn:hover { background: #fff8ee; color: var(--ink); }

  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(68,64,58,0.32);
    display: flex; align-items: center; justify-content: center;
    padding: 20px; z-index: 100; backdrop-filter: blur(2px);
  }
  .modal {
    background: var(--card); border-radius: 20px; padding: 24px;
    max-width: 460px; width: 100%; max-height: 82vh; overflow-y: auto;
    border: 1px solid var(--line);
    box-shadow: 0 16px 40px rgba(68,64,58,0.28);
  }
  .modal h3 { font-weight: 900; color: var(--ink); margin-bottom: 14px; }
  .modal p { font-size: 0.9rem; color: var(--ink-soft); margin-bottom: 12px; font-weight: 600; }
  .modal .row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; flex-wrap: wrap; }

  .section-title { font-weight: 900; font-size: 1.05rem; color: var(--ink); margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
  .section-title .sub { font-size: 0.72rem; color: var(--ink-soft); font-weight: 600; }

  /* theme toggle (森 / あつ森風) — SVG の 外に 小さく配置 */
  .theme-toggle {
    display: flex; justify-content: flex-end; gap: 4px;
    padding: 8px 14px 4px;
  }
  .theme-toggle button {
    background: transparent; border: 1px solid var(--line); cursor: pointer;
    font-size: 0.72rem; padding: 3px 9px;
    border-radius: 999px; transition: background 0.15s, color 0.15s;
    font-family: inherit; color: var(--ink-soft); font-weight: 700;
  }
  .theme-toggle button:hover { background: var(--bg-2); color: var(--ink); }
  .theme-toggle button.active {
    background: var(--teal); color: #fff; border-color: var(--teal);
  }
  .journey-card { position: relative; }

  /* deco anim */
  @keyframes hop { 0%,100%{transform:translateY(0);} 35%{transform:translateY(-5px);} 55%{transform:translateY(0);} }
  .mascot { animation: hop 2.6s ease-in-out infinite; transform-origin: center bottom; }
  @keyframes sway { 0%,100%{transform:rotate(-2deg);} 50%{transform:rotate(2deg);} }
  .sway { animation: sway 4s ease-in-out infinite; transform-origin: center bottom; }

  /* clouds drift slowly */
  @keyframes drift { 0%{transform:translateX(0)} 100%{transform:translateX(18px)} }
  .cloud { animation: drift 16s ease-in-out infinite alternate; }

  /* butterflies fluttering */
  @keyframes flutter1 {
    0%,100% { transform: translate(0,0) rotate(-6deg); }
    25%     { transform: translate(28px,-12px) rotate(7deg); }
    50%     { transform: translate(56px,-4px) rotate(-4deg); }
    75%     { transform: translate(30px,-16px) rotate(8deg); }
  }
  .butterfly1 { animation: flutter1 11s ease-in-out infinite; transform-origin: center; }
  @keyframes flutter2 {
    0%,100% { transform: translate(0,0) rotate(5deg); }
    30%     { transform: translate(-20px,-10px) rotate(-7deg); }
    60%     { transform: translate(20px,-18px) rotate(6deg); }
    85%     { transform: translate(-8px,-4px) rotate(-3deg); }
  }
  .butterfly2 { animation: flutter2 13s ease-in-out infinite; transform-origin: center; }

  /* bird flying across */
  @keyframes birdFly {
    0%   { transform: translate(560px, 25px); }
    50%  { transform: translate(300px, 18px); }
    100% { transform: translate(40px, 22px); }
  }
  .bird-flight { animation: birdFly 26s linear infinite; }

  /* river ripple */
  @keyframes ripple { 0%,100%{transform:scaleX(1)} 50%{transform:scaleX(1.06)} }
  .ripple { animation: ripple 3.2s ease-in-out infinite; transform-origin: center; }

  /* friend-met glow */
  @keyframes glowPulse { 0%,100%{filter:drop-shadow(0 0 2px #eaa83f);} 50%{filter:drop-shadow(0 0 6px #f0c86a);} }
  .friend-next-glow { animation: glowPulse 1.8s ease-in-out infinite; }
</style>

function loadState() {
  try {

    if (!raw) return structuredClone(defaultState);
    const parsed = JSON.parse(raw);
    const merged = { ...structuredClone(defaultState), ...parsed };
    // v2 マイグレーション: 旧 mastered（まなぶ起源含む）を 削除し、
    // 以降は テストで正解した語のみ（mode:"test"）が 入る
    if ((merged.schemaVersion || 1) < 2) {
      merged.mastered = (merged.mastered || []).filter(m => m && m.mode === "test");
      merged.testWrong = merged.testWrong || [];
      merged.schemaVersion = 2;
    }
    return merged;
  } catch { return structuredClone(defaultState); }

// MY_100_WORDS から 例文/日本語訳 を 既存の state.words に 自動で 補完
function hydrateUserWordsFromMyBank() {
  if (!state.words || !state.words.length) return false;
  const bank = new Map(MY_100_WORDS.map(w => [w.word.toLowerCase(), w]));
  let changed = false;
  for (const w of state.words) {
    const entry = bank.get((w.word || "").toLowerCase());
    if (!entry) continue;
    if (!w.example) { w.example = entry.example; changed = true; }
    if (!w.exJa)    { w.exJa    = entry.exJa;    changed = true; }
    // 例文に単語が含まれていれば 自動で ___ 空欄化（テストの fillBlank 用）
    if (w.example && !w.example.includes("___")) {
      const re = new RegExp(`\\b${w.word.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")}\\b`, "i");
      if (re.test(w.example)) { w.example = w.example.replace(re, "___"); changed = true; }
    }
  }
  if (changed) saveState();
  return changed;
}

// ============================================================
// 単語マスター（バッチ式ロック機構）
// 優先順位: WORD_MASTER.batches → WORD_MASTER.words → state.words → MY_100_WORDS → STARTER_WORDS
// ============================================================
function getBatches() {
  if (!window.WORD_MASTER) return [];
  if (Array.isArray(window.WORD_MASTER.batches)) return window.WORD_MASTER.batches;
  // 後方互換: 旧フォーマット（words配列のみ）→ 1バッチとして扱う
  if (Array.isArray(window.WORD_MASTER.words)) {
    return [{
      id: "batch-1",
      name: window.WORD_MASTER.batchName || "バッチ1",
      words: window.WORD_MASTER.words
    }];
  }
  return [];
}

// バッチが解放済みか: 最初は常に解放、それ以外は 前バッチを 全マスター すれば 解放
function isBatchUnlocked(batchIdx) {
  if (batchIdx === 0) return true;
  const batches = getBatches();
  if (batchIdx < 0 || batchIdx >= batches.length) return false;
  const prev = batches[batchIdx - 1];
  if (!prev || !Array.isArray(prev.words) || prev.words.length === 0) return false;
  const mset = new Set(state.mastered.map(m => m.word.toLowerCase()));
  return prev.words.every(w => mset.has(w.word.toLowerCase()));
}

// バッチの 進捗（覚えた / 全 / %）
function batchProgress(batchIdx) {
  const batches = getBatches();
  if (batchIdx < 0 || batchIdx >= batches.length) return { mastered: 0, total: 0, pct: 0 };
  const b = batches[batchIdx];
  const mset = new Set(state.mastered.map(m => m.word.toLowerCase()));
  const total = b.words.length;
  const mastered = b.words.filter(w => mset.has(w.word.toLowerCase())).length;
  return { mastered, total, pct: total ? Math.round((mastered/total)*100) : 0 };
}

// 現在 学習中の バッチ index（解放済みで かつ 未完了の 最初のバッチ）
function getCurrentBatchIndex() {
  const batches = getBatches();
  for (let i = 0; i < batches.length; i++) {
    if (!isBatchUnlocked(i)) return Math.max(0, i - 1);
    const p = batchProgress(i);
    if (p.mastered < p.total) return i;
  }
  return Math.max(0, batches.length - 1);
}

// 例文の ___ 化（fillBlank 用）
function hydrateExample(w) {
  const ww = { ...w };
  if (ww.example && !ww.example.includes("___")) {
    const re = new RegExp(`\\b${ww.word.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")}\\b`, "i");
    if (re.test(ww.example)) ww.example = ww.example.replace(re, "___");
  }
  return ww;
}

// 解放済みバッチの 全単語を 返す
function getMasterWords() {
  const batches = getBatches();
  if (!batches.length) return null;
  const out = [];
  for (let i = 0; i < batches.length; i++) {
    if (!isBatchUnlocked(i)) break;
    for (const w of batches[i].words) out.push(hydrateExample(w));
  }
  return out.length ? out : null;
}

function getWords() {
  const master = getMasterWords();
  if (master) return master;
  if (state.words && state.words.length) return state.words;
  if (typeof MY_100_WORDS !== "undefined" && MY_100_WORDS.length) return MY_100_WORDS;
  return STARTER_WORDS;
}
function usingStarter() {

function masterVersion() {

  if (!b) return "test-first";

  return idx === 0 ? "test-first" : "learn-first";

const shuffle = arr => [...arr].sort(() => Math.random() - 0.5);

// 同じ単語が 隣り合わない ようにシャッフル（連続出題回避）
function shuffleNoAdjacent(arr, keyFn) {
  const out = shuffle(arr);
  // 隣接する 同キーペアを 後方の 非マッチ要素と 入れかえる
  for (let pass = 0; pass < 4; pass++) {
    let fixed = false;
    for (let i = 1; i < out.length; i++) {
      if (keyFn(out[i]) === keyFn(out[i - 1])) {
        let swapIdx = -1;
        for (let j = i + 1; j < out.length; j++) {
          if (keyFn(out[j]) !== keyFn(out[i - 1]) &&
              (j + 1 >= out.length || keyFn(out[j]) !== keyFn(out[j + 1]))) {
            swapIdx = j; break;
          }
        }
        if (swapIdx === -1) {
          for (let j = i + 1; j < out.length; j++) {
            if (keyFn(out[j]) !== keyFn(out[i - 1])) { swapIdx = j; break; }
          }
        }
        if (swapIdx !== -1) {
          [out[i], out[swapIdx]] = [out[swapIdx], out[i]];
          fixed = true;
        }
      }
    }
    if (!fixed) break;
  }
  return out;
}

// マスタリーループで 間違えた単語を キューに 戻すとき、両隣と 同じキーに ならない 位置に 挿入。
// キューが 空の場合は 戻さない（同じ単語の 連続レンダリングを 防ぐ）。
function requeueAvoidingAdjacent(queue, spec, keyFn) {
  if (queue.length === 0) return false;
  const key = keyFn(spec);
  for (let i = queue.length; i >= 1; i--) {
    const prevKey = keyFn(queue[i - 1]);
    const nextKey = i < queue.length ? keyFn(queue[i]) : null;
    if (prevKey !== key && nextKey !== key) {
      queue.splice(i, 0, spec);
      return true;
    }
  }
  // どこも 衝突する → 末尾に 追加（最後の砦）
  queue.push(spec);
  return true;
}
const today = () => new Date().toISOString().slice(0,10);
const daysBetween = (a,b) => Math.round((new Date(b) - new Date(a)) / 86400000);
const esc = s => String(s).replace(/[&<>"']/g, c =>
  ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));

function parseWordList(text) {
  const lines = text.split(/\r?\n/);
  const out = [];
  for (let raw of lines) {
    const line = raw.trim();
    if (!line) continue;
    let word = "", def = "", example = "", exJa = "";
    if (line.includes("\t")) {
      const cols = line.split("\t").map(c => c.trim());
      word = cols[0]; def = cols[1] || ""; example = cols[2] || ""; exJa = cols[3] || "";
    } else {
      const m = line.match(/^(.+?)\s*[,，=:：]\s*(.+)$/) ||
                line.match(/^(.+?)\s+[-—–]\s+(.+)$/);
      if (m) { word = m[1].trim(); def = m[2].trim(); }
      else   { word = line; }
    }
    if (!word) continue;
    // 例文に単語が含まれているが ___ が無い場合は、自動で ___ にして空欄問題を作れるようにする
    if (example && !example.includes("___")) {
      const re = new RegExp(`\\b${word.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")}\\b`, "i");
      if (re.test(example)) example = example.replace(re, "___");
    }
    out.push({ word, def, example, exJa });
  }
  const map = new Map();
  for (const w of out) map.set(w.word.toLowerCase(), w);
  return [...map.values()];
}

// テスト用: 未mastered を 8語 取れたら mastered は 出さない。
//   - 未mastered ≥ 8: 8 未mastered のみ（mastered 0語）
//   - 未mastered < 8: 全 未mastered + mastered を 最大 2語 補充
// ※「まなぶで 今日 触れた単語」は テストから 除外（翌日以降に 出題）
function pickSessionWords() {
  const pool = getWords();
  const masteredWords = new Set(state.mastered.map(m => m.word));
  const todayStr = today();
  const learnedToday = w => state.srs[w.word] && state.srs[w.word].learnedAt === todayStr;

  // 未mastered かつ 今日まなぶで触れていない語 かつ まなぶに一度でも出た語だけ
  const everLearned = w => !!(state.srs[w.word] && state.srs[w.word].everLearned);
  const nonMastered = pool.filter(w => !masteredWords.has(w.word) && !learnedToday(w) && everLearned(w));
  const nmDue   = nonMastered.filter(w => isDue(w.word) && !isNew(w.word))
    .sort((a, b) => (srsOf(a.word).due || "").localeCompare(srsOf(b.word).due || ""));
  const nmFresh = nonMastered.filter(w => isNew(w.word));
  const nmKnown = shuffle(nonMastered.filter(w => !isDue(w.word) && !isNew(w.word)));

  const mode = getCurrentFlowMode();
  const nmOrder = mode === "learn-first"
    ? [...nmDue, ...nmKnown, ...nmFresh]
    : [...nmDue, ...nmFresh, ...nmKnown];

  // ①未mastered を 最大 8語 取る
  let targets = nmOrder.slice(0, TEST_NM_TARGET);

  // ②未mastered が 8語に 満たない場合のみ、mastered を 最大 2語 補充
  //   mastered からも 今日 まなぶで 触れたものは 除外
  if (targets.length < TEST_NM_TARGET) {
    const masteredPool = pool.filter(w => masteredWords.has(w.word) && !learnedToday(w));
    const masteredDue   = masteredPool.filter(w => isDue(w.word))
      .sort((a, b) => (srsOf(a.word).due || "").localeCompare(srsOf(b.word).due || ""));
    const masteredOther = shuffle(masteredPool.filter(w => !isDue(w.word)));
    const masteredOrder = [...masteredDue, ...masteredOther];
    targets = [...targets, ...masteredOrder.slice(0, TEST_MASTERED_MAX)];
  }
  return targets;
}

function buildSession() {
  const targets = pickSessionWords();
  const queue = [];
  // 1単語あたり 最大3問（意味あて・単語あて・空欄うめ）= 10語 × 3 ≒ 30問
  for (const w of targets) {
    queue.push({ w, type: "wordToDef" });
    queue.push({ w, type: "defToWord" });
    if (w.example && w.example.includes("___")) queue.push({ w, type: "fillBlank" });
  }
  return shuffleNoAdjacent(queue, e => e.w.word);
}

// 指定した単語からタイプ別の4択問題を作る（Learning/Testで共用）
function buildChoiceQuestion(w, type) {
  const pool = getWords();
  const wrong = shuffle(pool.filter(x => x.word !== w.word)).slice(0, 3);

  if (type === "fillBlank" && w.example && w.example.includes("___")) {
    const sentence = esc(w.example).replace("___", `<span class="blank">？</span>`);
    return { type, word: w, prompt: "空欄に入る単語は？", content: sentence,
      choices: shuffle([w, ...wrong]).map(x => ({ key: x.word, label: esc(x.word) })), answer: w.word };
  }
  if (type === "defToWord") {
    return { type, word: w, prompt: "この意味の単語は？",
      content: `“${esc(w.def || "（意味なし）")}”`,
      choices: shuffle([w, ...wrong]).map(x => ({ key: x.word, label: esc(x.word) })), answer: w.word };
  }
  // 既定: wordToDef（単語→意味）
  return { type: "wordToDef", word: w, prompt: "この単語の意味は？",
    content: `<span class="word">${esc(w.word)}</span>`, isWord: true,
    choices: shuffle([w, ...wrong]).map(x => ({ key: x.word, label: esc(x.def || "（意味なし）") })),
    answer: w.word };
}

// ---------- SRS helpers ----------
function srsOf(word) { return state.srs[word] || { box: 0, due: null, correct: 0, wrong: 0 }; }
function isDue(word) {
  const s = state.srs[word];
  if (!s) return false;            // 未学習はnew扱い
  return !s.due || s.due <= today();
}
function isNew(word) { return !state.srs[word]; }
function addDays(dateStr, n) {
  const d = new Date(dateStr); d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}
function srsUpdate(word, correct, source) {
  const s = srsOf(word);
  if (correct) { s.box = Math.min(MAX_BOX, s.box + 1); s.correct++; }
  else         { s.box = Math.max(0, s.box - 1);       s.wrong++; }
  s.due = addDays(today(), SRS_INTERVALS[s.box]);
  s.seenAt = today();
  // まなぶで触れた単語は learnedAt を 今日に。テストでは 今日 learnedAt の語を 除外する。
  if (source === "learn") { s.learnedAt = today(); s.everLearned = true; }
  state.srs[word] = s;
}
function dueCount() {
  const m = new Set(state.mastered.map(x => x.word));
  return getWords().filter(w => !m.has(w.word) && !isNew(w.word) && isDue(w.word)).length;
}
function newCount() {
  const m = new Set(state.mastered.map(x => x.word));
  return getWords().filter(w => !m.has(w.word) && isNew(w.word)).length;
}

// ---------- audio (browser built-in, no internet) ----------
function speak(text) {
  try {
    if (!("speechSynthesis" in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US"; u.rate = 0.9;
    speechSynthesis.speak(u);
  } catch (e) {}
}

// ロードマップ SVG テーマ切り替え（forest / ac）
function applySvgTheme(theme) {
  if (theme !== "forest" && theme !== "ac") theme = "forest";
  state.svgTheme = theme;
  saveState();
  const tmplId = theme === "ac" ? "acSvgTemplate" : "forestSvgTemplate";
  const tmpl = document.getElementById(tmplId);
  const host = document.getElementById("journeySvg");
  if (!tmpl || !host) return;
  // テンプレートから 内側の <svg> を 取得して、その innerHTML を host にコピー
  const innerSvg = tmpl.content.querySelector("svg");
  host.innerHTML = innerSvg ? innerSvg.innerHTML : "";
  // ボタンのアクティブ状態
  const fBtn = document.getElementById("themeBtnForest");
  const aBtn = document.getElementById("themeBtnAc");
  if (fBtn) fBtn.classList.toggle("active", theme === "forest");
  if (aBtn) aBtn.classList.toggle("active", theme === "ac");
  // 再描画（軌道計算をやり直す）
  renderMountain();
}

function renderMountain() {
  const mastered = state.mastered.length;
  const pct = Math.min(100, (mastered / TARGET) * 100);

  document.getElementById("elevNum").innerHTML =
    `${mastered} <small>/ <span id="elevTarget">${TARGET}</span> 語</small>`;
  document.getElementById("elevPct").innerHTML = `${Math.round(pct)}<small>%</small>`;
  document.getElementById("trackFill").style.width = pct + "%";

  const label =
    pct >= 100 ? "ゴール到着！ TOEFL 100" :
    pct >= 75  ? "大きな森のおく" :
    pct >= 50  ? "木もれ日の小道" :
    pct >= 25  ? "草はらをぬけて" :
    pct >  0   ? "森に入った！" :
                 "スタート地点";
  document.getElementById("elevLabel").textContent = label;

  document.querySelectorAll("#ckLabels span").forEach(el => {
    el.classList.toggle("passed", pct >= +el.dataset.pct);
  });

  const trail = document.getElementById("trail");
  const climber = document.getElementById("climber");
  if (trail && climber) {
    const len = trail.getTotalLength();
    const p = trail.getPointAtLength(len * (pct / 100));
    climber.setAttribute("transform", `translate(${p.x},${p.y})`);

    // 30匹 全員を 軌道上に 配置
    // - met（出会った）: emoji大きめ + 白い背景円
    // - next（次の1匹）: 中サイズ + やわらかい光るリング
    // - locked（まだ）: 小さな茶色の足跡マーク
    const nextIdx = FRIENDS.findIndex(f => mastered < f.need);
    let svg = "";
    FRIENDS.forEach((f, i) => {
      const fp = trail.getPointAtLength(len * (f.pct / 100));
      const met = mastered >= f.need;
      const isNext = i === nextIdx;
      // 交互に 軌道の 上/下 に 配置して 重なりを 減らす
      const above = i % 2 === 0;
      const oy = above ? -12 : 13;

      if (met) {
        svg += `<circle cx="${fp.x}" cy="${fp.y + oy}" r="8.5" fill="#fff" stroke="#eaa83f" stroke-width="1.4"/>`;
        svg += `<text x="${fp.x}" y="${fp.y + oy + 4}" font-size="11" text-anchor="middle">${f.emoji}</text>`;
      } else if (isNext) {
        svg += `<circle class="friend-next-glow" cx="${fp.x}" cy="${fp.y + oy}" r="8" fill="#fff" stroke="#d65f48" stroke-width="1.5" stroke-dasharray="3 2"/>`;
        svg += `<text x="${fp.x}" y="${fp.y + oy + 4}" font-size="10" text-anchor="middle" opacity="0.55">${f.emoji}</text>`;
      } else {
        // ロック中: 小さな茶色ドット
        svg += `<circle cx="${fp.x}" cy="${fp.y + (above ? -8 : 9)}" r="2.2" fill="#b6a589" opacity="0.55"/>`;
      }
    });
    document.getElementById("friends").innerHTML = svg;
  }

  // friends roster（30匹・100語ごと）
  const metCount = FRIENDS.filter(f => mastered >= f.need).length;
  const nextFriend = FRIENDS.find(f => mastered < f.need);
  document.getElementById("rosterCount").textContent = `${metCount} / ${FRIENDS.length}`;

  const nf = document.getElementById("nextFriend");
  if (nextFriend) {
    nf.style.display = "inline-block";
    nf.textContent = `つぎの なかま：${nextFriend.emoji} ${nextFriend.name} まで あと ${nextFriend.need - mastered} 語`;
  } else {
    nf.style.display = "inline-block";
    nf.textContent = "ぜんぶの なかまに 出会えた！🎉";
  }

  document.getElementById("rosterList").innerHTML = FRIENDS.map(f => {
    const met = mastered >= f.need;
    const isNext = f === nextFriend;
    return `<div class="friend ${met ? "met" : ""} ${isNext ? "next" : ""}">
      <div class="face">${met ? f.emoji : "❔"}</div>
      <div class="fname">${met ? f.name : "？"}</div>
      <div class="fneed">${met ? "なかま！" : f.need}</div>
    </div>`;
  }).join("");

  document.getElementById("stMastered").textContent = state.mastered.length;
  document.getElementById("stStreak").textContent = state.streak;
  document.getElementById("stAcc").textContent = state.totalAttempts === 0
    ? "—" : Math.round((state.totalCorrect / state.totalAttempts) * 100) + "%";
  document.getElementById("stWords").textContent = getWords().length;
}

// 新規解放されたバッチが あれば 一度だけ ダイアログを 出す
function checkNewlyUnlocked() {
  const batches = getBatches();
  if (!Array.isArray(state.unlockedSeen)) state.unlockedSeen = [];
  for (let i = 1; i < batches.length; i++) {
    if (isBatchUnlocked(i) && !state.unlockedSeen.includes(batches[i].id)) {
      state.unlockedSeen.push(batches[i].id);
      saveState();
      setTimeout(() => {
        alert(`🎉 おめでとう！\n\n「${batches[i].name}」 が 解放されました！\n\n新しい100語が テストに 加わります。\nまずは テストで 知らない単語を 見つけよう。`);
      }, 200);
      return;
    }
  }
}

function updatePreview() {
  const text = document.getElementById("wordInput").value;
  uploadParsed = parseWordList(text);
  const n = uploadParsed.length;
  const withDef = uploadParsed.filter(w => w.def).length;
  const withEx  = uploadParsed.filter(w => w.example).length;
  const withJa  = uploadParsed.filter(w => w.exJa).length;

  const line = document.getElementById("previewLine");
  const sample = document.getElementById("sample");
  const appendBtn = document.getElementById("appendBtn");
  const replaceBtn = document.getElementById("replaceBtn");

  if (n === 0) {
    line.innerHTML = "貼り付けると、読み取れた語数がここに出ます。";
    sample.style.display = "none";
    appendBtn.disabled = replaceBtn.disabled = true;
    return;
  }
  line.innerHTML = `<strong>${n}語</strong> 読み取りました。`
    + (withDef < n ? ` <span style="color:var(--bad)">（定義なし ${n - withDef}語）</span>` : "")
    + (withEx ? ` ・ 例文つき ${withEx}語` : "")
    + (withJa ? ` ・ 日本語訳つき ${withJa}語` : "");
  sample.style.display = "block";
  sample.innerHTML = uploadParsed.slice(0, 6).map(w =>
    `<div><b>${esc(w.word)}</b> — ${esc(w.def || "（定義なし）")}</div>`
  ).join("") + (n > 6 ? `<div style="color:var(--ink-soft)">…ほか ${n - 6}語</div>` : "");
  appendBtn.disabled = replaceBtn.disabled = false;
}

function commitUpload(replace) {
  if (!uploadParsed.length) return;
  if (replace) {
    if (!confirm(`いまの単語リストを ${uploadParsed.length}語 で入れかえます。よろしいですか？`)) return;
    state.words = uploadParsed;
  } else {
    const base = usingStarter() ? [] : state.words;
    const map = new Map(base.map(w => [w.word.toLowerCase(), w]));
    for (const w of uploadParsed) map.set(w.word.toLowerCase(), w);
    state.words = [...map.values()];
  }
  saveState();
  renderMountain();
  alert(`単語リストを更新しました。いまは ${state.words.length}語 です。`);
  renderHome();
}

let session = null;

// ---------- session 上部バー（やめる / 学ぶ⇄テスト 切りかえ）----------
function sessionTopBar(mode) {
  const sw = mode === "learn"
    ? `<button class="icon-btn switch-btn" onclick="switchMode('test')">📝 テストへ</button>`
    : `<button class="icon-btn switch-btn" onclick="switchMode('learn')">🌱 まなぶへ</button>`;
  return `<div class="session-bar">
    <button class="icon-btn" onclick="exitSession()">← やめる</button>
    ${sw}
  </div>`;
}
function exitSession() {
  if (!confirm("いまの がくしゅうを やめて ホームに もどりますか？\n（とちゅうの けっかは 記録されません）")) return;
  session = null; learn = null;
  renderHome();
}
function switchMode(to) {
  const msg = to === "test" ? "テストに 切りかえますか？" : "まなぶに 切りかえますか？";
  if (!confirm(msg + "\n（いまの とちゅうの けっかは 記録されません）")) return;
  session = null; learn = null;
  if (to === "test") startSession(); else startLearn();
}

function startSession() {
  if (getWords().length < 4) { alert("単語が4語以上必要です。まず単語をアップロードしてください。"); return; }
  const queue = buildSession();
  if (queue.length === 0) {
    alert("今日は マナブを やってね。\nテストは 明日 また チャレンジ してね 🌱");
    return;
  }
  session = {
    queue,
    initialLen: queue.length,
    asked: 0,
    correct: 0,
    newlyMastered: [],
    wrongSet: new Set(),
    everWrong: new Set(),
    askedWords: new Set(),   // セッション中に出題された単語（重複なし）
    answered: false,
    current: null,
  };
  renderQuestion();
}

function renderQuestion() {
  const s = session;
  const spec = s.queue[0];
  const q = buildChoiceQuestion(spec.w, spec.type);
  s.current = q;
  s.answered = false;
  const totalKnown = s.asked + s.queue.length;
  const pct = totalKnown ? (s.asked / totalKnown) * 100 : 0;
  const typeLabel = { wordToDef: "意味あて", defToWord: "単語あて", fillBlank: "空欄うめ" }[q.type];

  app.innerHTML = `
    <div class="card">
      ${sessionTopBar("test")}
      <div class="q-progress-bar"><div style="width:${pct}%"></div></div>
      <div class="q-meta">
        <span>問題 ${s.asked + 1}（のこり ${s.queue.length}）</span>
        <span class="q-type-tag">${typeLabel}</span>
      </div>
      <div class="q-prompt">${q.prompt}</div>
      <div class="q-content ${q.isWord ? 'word' : ''}">${q.content}</div>
      <div class="choices" id="choices">
        ${q.choices.map((c, i) => `
          <button class="choice" data-key="${esc(c.key)}" onclick="answerQuestion(${i})">
            <span class="letter">${String.fromCharCode(65 + i)}</span>${c.label}
          </button>`).join("")}
      </div>
      <div class="feedback" id="feedback"></div>
    </div>
  `;
}

function answerQuestion(idx) {
  const s = session;
  if (s.answered) return;
  s.answered = true;

  const q = s.current;
  const correct = q.choices[idx].key === q.answer;

  const btns = document.querySelectorAll(".choice");
  btns.forEach(b => { b.disabled = true; if (b.dataset.key === q.answer) b.classList.add("correct"); });
  if (!correct) btns[idx].classList.add("wrong");

  s.asked++;
  s.askedWords.add(q.word.word);
  state.totalAttempts++;
  if (correct) {
    s.correct++;
    state.totalCorrect++;
  } else {
    s.wrongSet.add(q.word.word);
    s.everWrong.add(q.word.word);
  }
  // テストでも 1問ごとに SRS を反映（間違えた単語はその日のうちに復習に回る）
  // ※ mastered/testWrong の更新は セッション終了時に まとめて 行う（finishSession）
  srsUpdate(q.word.word, correct, "test");
  saveState();

  const ex = q.word.example ? esc(q.word.example).replace("___", `<b>${esc(q.word.word)}</b>`) : "";
  const fb = document.getElementById("feedback");
  fb.className = "feedback show " + (correct ? "ok" : "ng");
  fb.innerHTML = `${correct ? "正解！" : "おしい！"}
    <div class="word-info">${esc(q.word.word)} — ${esc(q.word.def || "")}</div>`
    + (ex ? `<div style="margin-top:4px; font-weight:600">${ex}</div>` : "");
  if (!correct) speak(q.word.word);

  setTimeout(() => {
    const spec = s.queue.shift();
    if (!correct) requeueAvoidingAdjacent(s.queue, spec, e => e.w.word);
    if (s.queue.length === 0) finishSession();
    else renderQuestion();
  }, correct ? 1100 : 1800);
}

function finishSession() {
  const s = session;
  const total = s.asked;
  const acc = total ? Math.round((s.correct / total) * 100) : 0;

  // セッションで 出題された 単語ごとに、mastered / testWrong を 更新
  // 【方針】一度 mastered に 入った 語は 維持する（積み上げ式）。
  // - 一度も 間違えていない → mastered（mode:"test"）に まだ無ければ追加。testWrong から 削除。
  // - 一度でも 間違えた → testWrong に 追加（mastered からは 除外しない）。
  //                       次のテストで 全問正解すれば testWrong から 抜ける。
  const mset = masteredSet();
  for (const wordStr of s.askedWords) {
    const wasWrong = s.everWrong.has(wordStr);
    if (wasWrong) {
      const existing = state.testWrong.find(t => t.word === wordStr);
      if (existing) {
        existing.at = today();
        existing.learnCount = 0;  // 再度 間違えたので まなぶカウントを リセット
      } else {
        state.testWrong.push({ word: wordStr, at: today(), learnCount: 0 });
      }
      // ※ mastered からは 削除しない（過去に覚えた実績は維持）
    } else {
      if (!mset.has(wordStr)) {
        state.mastered.push({ word: wordStr, masteredAt: today(), mode: "test" });
        s.newlyMastered.push(wordStr);
      }
      state.testWrong = state.testWrong.filter(t => t.word !== wordStr);
    }
  }

  bumpStreak();
  state.history.push({ date: today(), climbed: s.newlyMastered.length, score: s.correct, total, mode: "test" });
  saveState();
  autoBackup("test");

  // このセッションで新しく出会った森のなかま
  const afterCount = state.mastered.length;
  const beforeCount = afterCount - s.newlyMastered.length;
  const newFriends = FRIENDS.filter(f => beforeCount < f.need && f.need <= afterCount);

  saveState();
  renderMountain();

  const stars = acc === 100 ? "🌟🌟🌟" : acc >= 70 ? "🌟🌟" : acc >= 40 ? "🌟" : "🌰";
  const cheer = acc === 100 ? "パーフェクト！" : acc >= 70 ? "いい調子！" : acc >= 40 ? "ナイスファイト！" : "次はもっといける！";

  const friendBanner = newFriends.length
    ? `<div style="background:var(--honey-soft); border:1px solid #efd6a3; border-radius:14px; padding:12px; margin-bottom:14px; font-weight:800; color:var(--coral-deep)">
         ${newFriends.map(f => `${f.emoji} ${f.name}`).join("、")} に出会った！🎉</div>`
    : "";

  const newWordsList = s.newlyMastered.length
    ? `<p style="margin-top:8px; font-size:0.85rem; color:var(--ink-soft);">新しく覚えた: ${s.newlyMastered.map(w => `<code style="background:var(--teal-soft);padding:1px 6px;border-radius:6px;color:var(--good);font-weight:700">${esc(w)}</code>`).join(" ")}</p>`
    : `<p style="margin-top:8px; font-size:0.85rem; color:var(--ink-soft);">今回は復習。おつかれさま。</p>`;

  app.innerHTML = `
    <div class="card result">
      <div class="stars-burst">${stars}</div>
      ${friendBanner}
      <h2>テスト完了 — ${cheer}</h2>
      <p class="summary">${total}問中 ${s.correct}問 正解（${acc}%）</p>
      <div class="result-score">+${s.newlyMastered.length}<small> 語 覚えた</small></div>
      <div class="result-gain">いまは ${state.mastered.length} / ${TARGET} 語</div>
      ${newWordsList}
      <div class="result-actions">
        <button class="btn ghost" onclick="renderHome()">ホーム</button>
        <button class="btn" onclick="startSession()">もう1回 →</button>
      </div>
    </div>
  `;
}

// ============ LEARNING（フェーズ式: 全単語であう→全単語おもいだす→全単語つかう）============
let learn = null;

function bumpStreak() {
  const t = today();
  if (state.lastSessionDate) {
    const diff = daysBetween(state.lastSessionDate, t);
    if (diff === 0) {}
    else if (diff === 1) state.streak += 1;
    else state.streak = 1;
  } else { state.streak = 1; }
  state.lastSessionDate = t;
}

// まなぶの単語選定
// - test-first モード: testWrong + SRS-due（新規語は テストで まず ふるいにかける）
// - learn-first モード: testWrong + SRS-due + **新規語**（まず まなぶで 学んでから テスト）
function pickLearnWords() {
  const pool = getWords();
  const masteredWords = new Set(state.mastered.map(m => m.word));
  // testWrong から アクティブな語（learnCount < LEARN_REPEAT_MAX）のみ
  const testWrongActive = state.testWrong.filter(t => (t.learnCount || 0) < LEARN_REPEAT_MAX);
  const testWrongSet  = new Set(testWrongActive.map(t => t.word));
  const mode = getCurrentFlowMode();

  // テストで まちがえた単語（まだ まなぶ回数が 上限未満）
  const testWrongItems = pool.filter(w => testWrongSet.has(w.word));

  // 【ルール】アクティブな testWrong が 20語以上 → testWrong だけに 集中
  if (testWrongItems.length >= 20) {
    return testWrongItems.slice(0, 20);
  }

  // SRS で due な語（mastered と testWrong と 新規 は 除外）
  const due = pool
    .filter(w => isDue(w.word) && !isNew(w.word)
                 && !masteredWords.has(w.word) && !testWrongSet.has(w.word))
    .sort((a, b) => (srsOf(a.word).due || "").localeCompare(srsOf(b.word).due || ""));

  if (mode === "learn-first") {
    // 新規語も まなぶに 含める（学んでから テストで 確認する 流れ）
    // 新規は LEARN_NEW_TARGET (10) で 上限
    const fresh = pool.filter(w => isNew(w.word) && !masteredWords.has(w.word))
      .slice(0, LEARN_NEW_TARGET);
    return [...testWrongItems, ...due, ...fresh].slice(0, 20);
  }

  // test-first モード: 新規は 入れない
  return [...testWrongItems, ...due].slice(0, 20);
}

function startLearn() {
  if (getWords().length < 4) { alert("単語が4語以上必要です。まず単語をアップロードしてください。"); return; }
  const items = pickLearnWords();
  if (items.length === 0) {
    alert("まなぶ単語が ありません。\n\nまずは テストで まちがえた語を 見つけましょう！\n（テストで まちがえた語が ここに 入ります）");
    return;
  }
  learn = {
    items,
    phase: "encounter",       // "encounter" | "recall" | "use"
    phaseQueue: [],           // 現フェーズの残りキュー
    phaseTotal: 0,
    current: null,
    answered: false,
    revealed: false,
    pendingQuiz: null,
    everWrong: new Set(),
    newlyMastered: [],
    startStage: {},
    askedQs: 0,
    correctQs: 0,
  };
  items.forEach(w => learn.startStage[w.word] = srsOf(w.word).box);
  startPhase("encounter");
}

function stepBar(active) {
  const steps = [["1", "であう"], ["2", "おもいだす"], ["3", "つかう"], ["★", "チャレンジ"]];
  return `<div class="steps">${steps.map((s, i) => {
    const n = i + 1;
    const cls = n < active ? "done" : n === active ? "active" : "";
    return `<div class="step-dot ${cls}">${n < active ? "✓" : s[0]} ${s[1]}</div>`;
  }).join("")}</div>`;
}

const PHASE_LABEL = { encounter: "であう", recall: "おもいだす", use: "つかう", challenge: "チャレンジ" };
const PHASE_STEPNUM = { encounter: 1, recall: 2, use: 3, challenge: 4 };

function startPhase(phase) {
  learn.phase = phase;
  if (phase === "encounter") {
    learn.phaseQueue = learn.items.map(w => ({ w, loop: 0 }));
  } else if (phase === "recall") {
    // おもいだす = 意味あて (wordToDef) + 空欄うめ (fillBlank)
    const items = [];
    learn.items.forEach(w => {
      items.push({ w, qType: "wordToDef", loop: 0 });
      if (w.example && w.example.includes("___")) {
        items.push({ w, qType: "fillBlank", loop: 0 });
      }
    });
    learn.phaseQueue = shuffleNoAdjacent(items, e => e.w.word);
  } else if (phase === "use") {
    // つかう = 単語あて (defToWord) 4択
    learn.phaseQueue = shuffleNoAdjacent(learn.items.map(w => ({ w, qType: "defToWord", loop: 0 })), e => e.w.word);
  } else if (phase === "challenge") {
    // チャレンジ = Writing/タイピング（例文ある単語のみ）
    learn.phaseQueue = shuffleNoAdjacent(
      learn.items.filter(w => w.example && w.example.includes("___"))
        .map(w => ({ w, loop: 0 })),
      e => e.w.word
    );
    if (learn.phaseQueue.length === 0) { finishLearn(); return; }
  }
  learn.phaseTotal = learn.phaseQueue.length;
  advancePhase();
}

function advancePhase() {
  if (learn.phaseQueue.length === 0) {
    // フェーズ完了 → 次フェーズ または 完了
    if (learn.phase === "encounter") { showPhaseIntro("recall"); return; }
    if (learn.phase === "recall")    { showPhaseIntro("use"); return; }
    if (learn.phase === "use")       { showPhaseIntro("challenge"); return; }
    finishLearn(); return;
  }
  learn.current = learn.phaseQueue[0];
  learn.answered = false;
  learn.revealed = false;
  if (learn.phase === "encounter")   renderLearnCard();
  else if (learn.phase === "recall") renderRecallQuiz();
  else if (learn.phase === "use")    renderUseQuiz();
  else if (learn.phase === "challenge") renderChallengeInput();
}

function nextLearnItem(wasCorrect) {
  const entry = learn.phaseQueue.shift();
  // であうフェーズはマスタリーなし。recall/use は 間違えたら 末尾近くに 戻す（連続出題回避）。
  // challenge は チャレンジ問題なので 間違えても 再投入しない（submitChallengeInput が 常に true を渡す）。
  if (learn.phase !== "encounter" && learn.phase !== "challenge"
      && !wasCorrect && entry.loop < MAX_REVIEW_LOOPS) {
    const requeueSpec = { ...entry, loop: entry.loop + 1 };
    requeueAvoidingAdjacent(learn.phaseQueue, requeueSpec, e => e.w.word);
  }
  advancePhase();
}

function phaseProgressText() {
  const remaining = learn.phaseQueue.length;
  return `${PHASE_LABEL[learn.phase]}（のこり ${remaining}）`;
}

function showPhaseIntro(nextPhase) {
  // ★ チャレンジに 到達した時点で 進捗を 保存（やらなくても 結果は 残る）
  if (nextPhase === "challenge") {
    commitLearnProgress();
  }
  const intro = {
    recall: {
      emoji: "🧠",
      title: "つぎは『おもいだす』",
      body: `さっき であった ${learn.items.length}語 の<br>意味あて＋空欄うめ で 思い出そう。<br>間ちがえても 同じ単語が もう一度 出るよ。`,
      btn: "おもいだす を始める →",
      skippable: false,
    },
    use: {
      emoji: "🔁",
      title: "つぎは『つかう』",
      body: `意味を 読んで、ぴったりの 単語を 4択で えらぼう。<br>覚えた単語を 使いこなそう！`,
      btn: "つかう を始める →",
      skippable: false,
    },
    challenge: {
      emoji: "✍️★",
      title: "★ チャレンジ問題 ★",

// ---------- であう (encounter) ----------
function renderLearnCard() {
  const w = learn.current.w;
  const g = GROWTH[srsOf(w.word).box];
  // 例文の英語: ___ があれば単語を埋めて bold、無ければ自動で簡単な例を作る
  let exEn = "";
  if (w.example) {
    if (w.example.includes("___")) {
      exEn = esc(w.example).replace("___", `<b>${esc(w.word)}</b>`);
    } else {
      // 単語が例文に含まれていれば bold、それ以外はそのまま表示
      const re = new RegExp(`\\b${w.word.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")}\\b`, "i");
      exEn = esc(w.example).replace(re, `<b>${esc(w.word)}</b>`);
    }
  } else {
    // 例文が無いときは、意味から最低限の例を自動生成（"This is the word: WORD."）
    exEn = `This is the word <b>${esc(w.word)}</b>.`;
  }
  const exJa = w.exJa ? esc(w.exJa) : (w.example ? "" : `これは「${esc(w.word)}」という単語だよ。`);
  const noExample = !w.example;
  const done = learn.phaseTotal - learn.phaseQueue.length;

  app.innerHTML = `
    <div class="card">
      ${sessionTopBar("learn")}
      ${stepBar(1)}
      <div class="q-meta">
        <span>であう ${done + 1} / ${learn.phaseTotal}</span>
        <span class="growth-badge">${g.emoji} ${g.name}</span>
      </div>
      <div class="flash-word">${esc(w.word)}</div>
      <div style="text-align:center">
        <button class="audio-btn" data-w="${esc(w.word)}" onclick="speak(this.dataset.w)">🔊</button>
      </div>
      <p style="text-align:center; font-size:0.8rem; color:var(--ink-soft); margin-bottom:12px">
        まず 頭の中で 意味を 思い出してみよう。</p>
      <div id="revealArea">
        <div class="flash-meaning reveal-hidden" id="meaningBox">
          <span class="lbl">いみ</span>${esc(w.def || "（意味なし）")}
        </div>
        <div class="flash-ex reveal-hidden" id="exBox">
          <span class="lbl">📖 れいぶん（かんたんな例文）</span>
          <div class="ex-en">${exEn}</div>
          ${exJa ? `<div class="ex-ja">${exJa}</div>` : ""}
          ${noExample ? `<div style="font-size:0.7rem; color:var(--ink-soft); margin-top:6px">※ この単語の くわしい例文は まだ ありません。アップロード時に 3列目に 例文を 入れると もっと くわしく 学べます。</div>` : ""}
        </div>
      </div>
      <button class="btn wide" id="revealBtn" onclick="revealMeaning()">意味をみる 👀</button>
    </div>
  `;
  speak(w.word);
}

function revealMeaning() {
  learn.revealed = true;
  document.getElementById("meaningBox")?.classList.remove("reveal-hidden");
  document.getElementById("exBox")?.classList.remove("reveal-hidden");
  const btn = document.getElementById("revealBtn");

  btn.setAttribute("onclick", "nextLearnItem(true)");
}

// ---------- おもいだす (recall, 意味あて + 空欄うめ の 4択) ----------

function answerLearn(idx) {
  if (learn.answered) return;
  learn.answered = true;
  const q = learn.pendingQuiz;
  const correct = q.choices[idx].key === q.answer;

  const btns = document.querySelectorAll(".choice");
  btns.forEach(b => { b.disabled = true; if (b.dataset.key === q.answer) b.classList.add("correct"); });
  if (!correct) btns[idx].classList.add("wrong");

  learn.askedQs++;
  state.totalAttempts++;
  if (correct) {
    learn.correctQs++;
    state.totalCorrect++;
    // ※ まなぶでは「覚えた」にカウントしない（テストで正解したときのみ）
  } else {
    learn.everWrong.add(q.word.word);
  }
  saveState();

  const ex = q.word.example ? esc(q.word.example).replace("___", `<b>${esc(q.word.word)}</b>`) : "";
  const fb = document.getElementById("feedback");
  fb.className = "feedback show " + (correct ? "ok" : "ng");
  fb.innerHTML = (correct ? "正解！" : "ここで しっかり覚えよう 💪")
    + `<div class="word-info">${esc(q.word.word)} — ${esc(q.word.def || "")}</div>`
    + (ex ? `<div style="margin-top:4px; font-weight:600">${ex}</div>` : "");
  if (!correct) speak(q.word.word);

  setTimeout(() => nextLearnItem(correct), correct ? 1100 : 2000);
}

// チャレンジで わからない時 → 正解を見せて 次へ（採点には影響しない）
function skipChallenge() {
  if (learn.answered) return;
  learn.answered = true;
  const w = learn.current.w;
  const input = document.getElementById("useInput");
  if (input) input.disabled = true;

  const ex = w.example ? esc(w.example).replace("___", `<b>${esc(w.word)}</b>`) : "";
  const fb = document.getElementById("feedback");
  fb.className = "feedback show ok";
  fb.innerHTML = `スキップ OK！ こたえは <b style="color:var(--good)">${esc(w.word)}</b><br>`
    + `<small style="font-weight:600">何度も見て、聞いて、慣れていこう 🌱</small>`
    + `<div class="word-info">${esc(w.word)} — ${esc(w.def || "")}</div>`
    + (ex ? `<div style="margin-top:4px; font-weight:600">${ex}</div>` : "");
  speak(w.word);
  // スキップは「間違い」扱いに しない（チャレンジは おまけ）→ nextLearnItem(true) で 次へ
  setTimeout(() => nextLearnItem(true), 1800);
}

function submitChallengeInput() {
  if (learn.answered) return;
  const w = learn.current.w;
  const input = document.getElementById("useInput");
  if (!input) return;
  const guess = (input.value || "").trim().toLowerCase();
  if (!guess) { input.focus(); return; }
  learn.answered = true;
  const correct = guess === w.word.toLowerCase();
  input.disabled = true;
  input.classList.add(correct ? "ok" : "ng");

  learn.askedQs++;
  state.totalAttempts++;
  if (correct) {
    learn.correctQs++;
    state.totalCorrect++;
  }
  // ★ チャレンジは おまけ なので、間違えても everWrong には 加えない
  // （SRS の 降格、再復習キュー、テスト不正解扱いに ならない）
  saveState();

  const ex = w.example ? esc(w.example).replace("___", `<b>${esc(w.word)}</b>`) : "";
  const fb = document.getElementById("feedback");
  fb.className = "feedback show " + (correct ? "ok" : "ng");
  fb.innerHTML = (correct
      ? "せいかい！🎉 すごい！"
      : `おしい！ こたえは <b style="color:var(--good)">${esc(w.word)}</b><br><small style="font-weight:600">スペル できなくても OK。TRY できたね 💪</small>`)
    + `<div class="word-info">${esc(w.word)} — ${esc(w.def || "")}</div>`
    + (ex ? `<div style="margin-top:4px; font-weight:600">${ex}</div>` : "");
  speak(w.word);

  // チャレンジは 再復習しない（間違いでも 必ず 次へ）
  setTimeout(() => nextLearnItem(true), correct ? 1200 : 2400);
}

// まなぶの進捗を 保存（SRS反映・履歴追加・自動バックアップ）。
// チャレンジに 到達した時点 と finishLearn の 両方から 呼ばれるため idempotent。
function commitLearnProgress() {
  if (!learn || learn._committed) return;
  learn._committed = true;
  // セッション中に一度でも間違えた単語は SRS を下げる（=復習に回る）
  // source: "learn" を指定して learnedAt を 今日に → テストで 今日は 出題されない
  learn.items.forEach(w => srsUpdate(w.word, !learn.everWrong.has(w.word), "learn"));
  // testWrong に ある語は learnCount を +1 → 上限を超えたら まなぶに 出なくなる
  const twMap = new Map(state.testWrong.map(t => [t.word, t]));
  learn.items.forEach(w => {
    const e = twMap.get(w.word);
    if (e) e.learnCount = (e.learnCount || 0) + 1;
  });
  bumpStreak();
  const itemsN = learn.items.length;
  const firstTryRight = itemsN - learn.everWrong.size;
  state.history.push({ date: today(), climbed: learn.newlyMastered.length, score: firstTryRight, total: itemsN, mode: "learn" });
  saveState();
  autoBackup("learn");
}

function finishLearn() {
  commitLearnProgress();
  const itemsN = learn.items.length;

  const grown = learn.items.map(w => ({
    word: w.word, before: learn.startStage[w.word] ?? 0, after: srsOf(w.word).box,
  }));
  const grownUp = grown.filter(g => g.after > g.before);

  const afterCount = state.mastered.length;
  const beforeCount = afterCount - learn.newlyMastered.length;
  const newFriends = FRIENDS.filter(f => beforeCount < f.need && f.need <= afterCount);

  saveState();
  renderMountain();

  const plantRow = grown.map(g =>
    `<span class="growth-badge" style="margin:2px">${GROWTH[g.after].emoji} ${esc(g.word)}</span>`
  ).join(" ");
  const friendBanner = newFriends.length
    ? `<div style="background:var(--honey-soft); border:1px solid #efd6a3; border-radius:14px; padding:12px; margin-bottom:14px; font-weight:800; color:var(--coral-deep)">${newFriends.map(f => `${f.emoji} ${f.name}`).join("、")} に出会った！🎉</div>`
    : "";

  const acc = learn.askedQs ? Math.round((learn.correctQs / learn.askedQs) * 100) : 0;

  app.innerHTML = `
    <div class="card result">
      <div class="stars-burst">🌟</div>
      ${friendBanner}
      <h2>がくしゅう かんりょう！</h2>
      <p class="summary">${itemsN}語を 学習。${grownUp.length}語が せいちょうしたよ 🌿</p>
      <div class="result-score">${learn.correctQs}<small> / ${learn.askedQs} 問 正解（${acc}%）</small></div>
      <p style="margin-top:6px; font-size:0.86rem; color:var(--ink-soft)">
        ※「覚えた語」は <b>テスト</b> で正解したときに カウントされるよ。<br>
        まずは まなぶで しっかり 練習しよう 💪
      </p>
      <div style="margin:12px 0; text-align:center; line-height:2.1">${plantRow}</div>
      <p style="font-size:0.8rem; color:var(--ink-soft)">この単語たちは、忘れたころ（あす以降）にまた出てくるよ 🌱</p>
      <div class="result-actions">
        <button class="btn ghost" onclick="renderHome()">ホーム</button>
        <button class="btn" onclick="startSession()">テストへ →</button>
        <button class="btn teal" onclick="startLearn()">つづける →</button>
      </div>
    </div>
  `;
}

function renderHistory() {
  const testHistory = state.history.filter(r => r.mode === "test");
  const reversed = [...testHistory].reverse();
  const rows = reversed.length
    ? `<div class="hist-list">` + reversed.map(r => {
        const pct = Math.round((r.score / r.total) * 100);
        return `<div class="hist-row">
          <span class="hist-date">📝 ${r.date}</span>
          <div>
            <div class="hist-bar"><div style="width:${pct}%"></div></div>
            ${r.climbed ? `<span class="hist-climb">+${r.climbed}語 覚えた</span>` : ""}
          </div>
          <span class="hist-score">${r.score}/${r.total}</span>
        </div>`;
      }).join("") + `</div>`
    : `<p class="empty-note">まだテストの記録がありません。<br>ホームからテストを始めましょう。</p>`;

  const chartSvg = testHistory.length >= 2 ? renderTestChart(testHistory) : "";
  const totalTests = testHistory.length;
  const totalCorrectT = testHistory.reduce((s, r) => s + r.score, 0);
  const totalAskedT   = testHistory.reduce((s, r) => s + r.total, 0);
  const avgAcc = totalAskedT ? Math.round((totalCorrectT / totalAskedT) * 100) : 0;
  const wrongCount = state.testWrong.length;

  app.innerHTML = `
    <div class="card">
      <div class="section-title"><span>テストの記録</span><span class="sub">${totalTests}回 ・ 平均 ${avgAcc}%</span></div>
      ${chartSvg}
      ${rows}
      <div class="result-actions" style="margin-top:16px; flex-wrap:wrap; gap:8px">
        <button class="btn ghost small" onclick="renderHome()">ホーム</button>
        <button class="btn ghost small" onclick="showTestWrongWords()" ${wrongCount?"":"disabled"}>❌ まちがえた単語 (${wrongCount})</button>
        <button class="btn small" onclick="startSession()" ${getWords().length>=4?"":"disabled"}>テストを始める →</button>
      </div>
    </div>
  `;
}

// テスト点数の 折れ線グラフ（直近12回）
function renderTestChart(testHistory) {
  const data = testHistory.slice(-12);
  if (data.length < 2) return "";
  const W = 560, H = 160, padL = 38, padR = 12, padT = 22, padB = 26;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const xs = data.map((_, i) => padL + (innerW * i) / Math.max(1, data.length - 1));
  const pcts = data.map(r => (r.score / r.total) * 100);
  const ys = pcts.map(p => padT + innerH - (innerH * p) / 100);

  const linePath = xs.map((x, i) => `${i === 0 ? "M" : "L"}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(" ");
  // 塗りつぶし用 area path
  const areaPath = linePath
    + ` L${xs[xs.length-1].toFixed(1)},${(padT + innerH).toFixed(1)}`
    + ` L${xs[0].toFixed(1)},${(padT + innerH).toFixed(1)} Z`;
  const dots = xs.map((x, i) =>
    `<circle cx="${x.toFixed(1)}" cy="${ys[i].toFixed(1)}" r="4.5" fill="#fff" stroke="var(--coral)" stroke-width="2.5"/>`
  ).join("");
  const labels = xs.map((x, i) => {
    const pct = Math.round(pcts[i]);
    return `<text x="${x.toFixed(1)}" y="${(ys[i] - 10).toFixed(1)}" font-size="10" text-anchor="middle" fill="var(--coral-deep)" font-weight="800">${pct}%</text>`;
  }).join("");
  const xLabels = data.map((r, i) => {
    const m = (r.date || "").slice(5).replace("-", "/");
    return `<text x="${xs[i].toFixed(1)}" y="${H - 6}" font-size="9" text-anchor="middle" fill="var(--ink-soft)">${m}</text>`;
  }).join("");
  const yLines = [0, 50, 100].map(pct => {
    const y = padT + innerH - (innerH * pct) / 100;
    return `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="var(--line)" stroke-dasharray="3 3"/>
            <text x="${padL - 6}" y="${y + 3}" font-size="9" text-anchor="end" fill="var(--ink-soft)">${pct}%</text>`;
  }).join("");

  return `<div class="test-chart">
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="chartFill" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="var(--coral)" stop-opacity="0.28"/>
          <stop offset="100%" stop-color="var(--coral)" stop-opacity="0.02"/>
        </linearGradient>
      </defs>
      ${yLines}
      <path d="${areaPath}" fill="url(#chartFill)"/>
      <path d="${linePath}" fill="none" stroke="var(--coral)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
      ${dots}
      ${labels}
      ${xLabels}
    </svg>
  </div>`;
}

// テストで まちがえた単語一覧
function showTestWrongWords() {
  const wrongs = [...state.testWrong].sort((a, b) => (b.at || "").localeCompare(a.at || ""));
  const pool = getWords();
  const wordMap = new Map(pool.map(w => [w.word, w]));
  const activeCount  = wrongs.filter(t => (t.learnCount || 0) < LEARN_REPEAT_MAX).length;
  const dormantCount = wrongs.length - activeCount;

  const items = wrongs.map(t => {
    const w = wordMap.get(t.word);
    if (!w) return "";
    const lc = t.learnCount || 0;
    const active = lc < LEARN_REPEAT_MAX;
    const badge = active
      ? `<span style="background:var(--coral); color:#fff; padding:1px 7px; border-radius:6px; font-size:0.66rem; font-weight:800">まなぶ ${lc}/${LEARN_REPEAT_MAX}</span>`
      : `<span style="background:var(--ink-soft); color:#fff; padding:1px 7px; border-radius:6px; font-size:0.66rem; font-weight:800">復習済 (次テスト待ち)</span>`;
    return `<div class="wrong-word" style="${active ? "" : "opacity:0.65"}">
      <div class="ww-head">
        <span class="ww-word">${esc(w.word)}</span>

// SRS 履歴から、ありそうな「過去にうまくいった/苦戦した」語を推定して 見せる
function showSrsInsights() {
  const pool = getWords();
  const wordMap = new Map(pool.map(w => [w.word, w]));
  const entries = Object.entries(state.srs).map(([word, s]) => ({
    word,
    box: s.box || 0,
    correct: s.correct || 0,
    wrong: s.wrong || 0,
    due: s.due || "",
    def: (wordMap.get(word) || {}).def || "",
  }));
  // 並べ替え: correct 多い順 → wrong 少ない順
  entries.sort((a, b) => (b.correct - a.correct) || (a.wrong - b.wrong));

  const goodOnes = entries.filter(e => e.correct >= 2 && e.wrong === 0);   // 強い: 2回以上正解、間違いなし
  const okOnes   = entries.filter(e => e.correct >= 1 && e.wrong === 0 && !(e.correct >= 2));
  const struggling = entries.filter(e => e.wrong >= 1).sort((a, b) => b.wrong - a.wrong);

  const rowHtml = (e, color) => `
    <div style="background:${color}; border-radius:10px; padding:6px 12px; margin-bottom:4px; display:flex; justify-content:space-between; align-items:center; gap:10px">
      <div style="flex:1; min-width:0">
        <b style="font-size:0.96rem">${esc(e.word)}</b>
        ${e.def ? `<div style="font-size:0.74rem; color:var(--ink-soft); white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${esc(e.def)}</div>` : ""}
      </div>
      <div style="font-size:0.72rem; color:var(--ink); white-space:nowrap">
        <span style="color:var(--good)">✓${e.correct}</span> /
        <span style="color:var(--bad)">✗${e.wrong}</span>
        <span style="color:var(--ink-soft); margin-left:6px">box${e.box}</span>
      </div>
    </div>`;

  const sectionHtml = (title, list, color, note) => `
    <div style="margin-top:12px">
      <div style="font-weight:800; font-size:0.86rem; color:var(--ink); margin-bottom:6px">${title}（${list.length}語）</div>
      ${note ? `<div style="font-size:0.72rem; color:var(--ink-soft); margin-bottom:6px">${note}</div>` : ""}
      ${list.length ? list.slice(0, 80).map(e => rowHtml(e, color)).join("") : `<p style="color:var(--ink-soft); font-size:0.82rem">なし</p>`}
      ${list.length > 80 ? `<p style="color:var(--ink-soft); font-size:0.72rem; text-align:center">…ほか ${list.length - 80}語</p>` : ""}
    </div>`;

  const back = document.createElement("div");
  back.className = "modal-backdrop";
  back.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()" style="max-width:560px">
      <h3>🔍 過去の正解/間違いの 推定（SRSから）</h3>
      <p style="font-size:0.78rem; color:var(--ink-soft); margin-bottom:8px">
        SRS の <b>correct</b> / <b>wrong</b> カウントは <b>まなぶ＋テスト 両方</b> を 集計しています。<br>
        過去の「テスト だけ」の 結果は 分けて 保存されていなかった ため、ここでは 全体傾向 を 見せています。
      </p>
      <div style="max-height:55vh; overflow-y:auto; padding-right:4px">
        ${sectionHtml("💪 つよい (2回以上 正解 ＆ 間違いなし)", goodOnes, "var(--teal-soft)",
            "これらが「過去のテスト正解」に 最も 近い 候補です。")}
        ${sectionHtml("⚠️ 苦戦した（間違えたことがある）", struggling, "var(--coral-soft)",
            "これらは これまで 一度でも 間違えた ことが ある 語です。")}
        ${sectionHtml("👌 まあまあ (1回 正解、間違いなし)", okOnes, "var(--honey-soft)", "")}
      </div>
      <div class="row">
        <button class="btn ghost small" onclick="this.closest('.modal-backdrop').remove()">閉じる</button>
      </div>
    </div>
  `;
  back.onclick = () => back.remove();
  document.body.appendChild(back);
}

function showMasteredWords() {
  const mastered = [...state.mastered].sort((a, b) =>
    (b.masteredAt || "").localeCompare(a.masteredAt || "")
  );
  const pool = getWords();
  const wordMap = new Map(pool.map(w => [w.word, w]));

  const items = mastered.map(m => {
    const w = wordMap.get(m.word) || { word: m.word, def: "" };
    const modeBadge = m.mode === "test"
      ? `<span style="background:var(--teal-soft); color:var(--good); padding:1px 7px; border-radius:6px; font-size:0.66rem; font-weight:800">📝 test</span>`
      : `<span style="background:var(--coral-soft); color:var(--bad); padding:1px 7px; border-radius:6px; font-size:0.66rem; font-weight:800">⚠ ${esc(m.mode || "no mode")}</span>`;
    return `<div style="background:var(--teal-soft); border:1px solid #c9e6df; border-radius:12px; padding:8px 12px; margin-bottom:6px">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:8px">
        <b style="color:var(--good); font-size:1rem">${esc(w.word)}</b>
        <div style="display:flex; gap:6px; align-items:center">
          ${modeBadge}
          <span style="font-size:0.7rem; color:var(--ink-soft)">${esc(m.masteredAt || "")}</span>
        </div>
      </div>
      ${w.def ? `<div style="font-size:0.8rem; color:var(--ink); margin-top:2px">${esc(w.def)}</div>` : ""}
    </div>`;
  }).join("");

  // mode 別の集計
  const modeCounts = {};
  for (const m of state.mastered) {
    const k = m.mode || "（無し）";
    modeCounts[k] = (modeCounts[k] || 0) + 1;
  }
  const modeSummary = Object.entries(modeCounts)
    .map(([k, v]) => `<b>${esc(k)}</b>: ${v}語`).join(" ・ ");

  const back = document.createElement("div");
  back.className = "modal-backdrop";
  back.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()" style="max-width:560px">
      <h3>✅ 覚えた語の中身（${state.mastered.length}語）</h3>
      <p style="font-size:0.82rem; color:var(--ink-soft); margin-bottom:8px">
        ${modeSummary || "（データ なし）"}
      </p>
      <p style="font-size:0.78rem; color:var(--ink-soft); margin-bottom:8px">
        mode:"test" のみが 正しい「覚えた語」です。他のラベルが あれば、レガシー データです。
      </p>
      <div style="max-height:55vh; overflow-y:auto; padding-right:4px">
        ${items || `<p class="empty-note">まだ覚えた語はありません。</p>`}
      </div>
      <div class="row">
        <button class="btn ghost small" onclick="this.closest('.modal-backdrop').remove()">閉じる</button>
      </div>
    </div>
  `;
  back.onclick = () => back.remove();
  document.body.appendChild(back);
}

  const lines = words.map(w =>

      <textarea id="wordsArea" readonly style="width:100%; min-height:240px; font-family:monospace; font-size:0.78rem; padding:10px; border:1px solid var(--line); border-radius:10px; color:var(--ink); background:#fffdf8; resize:vertical">${esc(simple)}</textarea>

          <button class="btn ghost small" id="copyWordsBtn" onclick="copyWordsToClipboard()">📋 コピー</button>

function copyWordsToClipboard() {
  const ta = document.getElementById("wordsArea");
  if (!ta) return;
  ta.select();
  try {
    navigator.clipboard.writeText(ta.value).then(() => {
      const btn = document.getElementById("copyWordsBtn");
      if (btn) { btn.textContent = "✓ コピーしました"; setTimeout(() => btn.textContent = "📋 コピー", 1800); }
    }).catch(() => document.execCommand("copy"));
  } catch (e) {
    try { document.execCommand("copy"); } catch (e2) {}
  }
}

function buildBackupPayload(auto) {
  return {
    exportedAt: new Date().toISOString(),
    auto: !!auto,
    masterVersion: masterVersion(),
    state: state,
  };
}

function exportProgress() {
  const filename = `履歴バックアップ_${today()}.json`;
  const blob = new Blob([JSON.stringify(buildBackupPayload(false), null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  a.click(); URL.revokeObjectURL(url);
  setTimeout(() => alert(`バックアップを ダウンロードしました:\n${filename}\n\nClaudeフォルダに 移動して 保存しよう。`), 200);
}
