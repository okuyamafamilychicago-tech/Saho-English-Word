<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Riho Essay Progress</title>
<style>
:root{--bg:#f8fafc;--sur:#fff;--bdr:#e2e8f0;--txt:#1e293b;--muted:#64748b;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
header{background:linear-gradient(135deg,#1e293b,#334155);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.2)}
header h1{font-size:1rem;font-weight:700;flex:1}
.back-link{color:#94a3b8;font-size:.82rem;text-decoration:none;white-space:nowrap}
.back-link:hover{color:#fff}
.container{max-width:680px;margin:0 auto;padding:20px 16px 40px}

/* Token card */
.tok-card{background:var(--sur);border:1.5px solid var(--bdr);border-radius:var(--r);padding:14px 16px;margin-bottom:20px;display:flex;gap:8px;align-items:center}
.tok-label{font-size:.75rem;font-weight:700;color:var(--muted);white-space:nowrap}
.tok-input{flex:1;padding:7px 10px;border:1.5px solid var(--bdr);border-radius:8px;font-size:.83rem;min-width:0}
.tok-input:focus{outline:none;border-color:#4A90E2}
.tok-btn{padding:7px 16px;background:#4A90E2;color:#fff;border:none;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;white-space:nowrap}
.tok-btn:hover{opacity:.85}

/* Section title */
.sec{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:24px 0 10px}

/* Stats row */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:4px}
.stat-card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:14px 10px;text-align:center}
.stat-num{font-size:2rem;font-weight:800;line-height:1.1}
.stat-lbl{font-size:.68rem;color:var(--muted);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}

/* Topic grid */
.topic-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.topic-card{background:var(--sur);border:1.5px solid var(--bdr);border-radius:var(--r);padding:13px}
.topic-card.all-done{border-color:#22c55e}
.topic-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.t-icon{font-size:1.3rem;flex-shrink:0}
.t-name{font-size:.82rem;font-weight:700;line-height:1.3}
.persp-dots{display:flex;flex-direction:column;gap:4px}
.p-dot{border-radius:6px;padding:4px 8px;font-size:.7rem;font-weight:600;border:1.5px solid #e2e8f0;color:var(--muted);background:#f8fafc;display:flex;justify-content:space-between;align-items:center}
.p-dot.done{color:#fff;border-color:transparent}
.p-dot-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.p-dot-score{flex-shrink:0;margin-left:6px;font-size:.68rem;opacity:.9}
.t-prog{display:flex;align-items:center;gap:6px;margin-top:8px}
.t-bar-wrap{flex:1;background:#e2e8f0;border-radius:20px;height:5px;overflow:hidden}
.t-bar{height:100%;border-radius:20px;transition:width .6s}
.t-pct{font-size:.67rem;color:var(--muted);font-weight:600;min-width:28px;text-align:right}

/* Timeline */
.timeline{position:relative;padding-left:26px}
.timeline::before{content:'';position:absolute;left:9px;top:4px;bottom:4px;width:2px;background:#e2e8f0;border-radius:2px}
.tl-empty{text-align:center;padding:30px 20px;color:var(--muted);font-size:.88rem}
.tl-item{position:relative;margin-bottom:10px}
.tl-dot{position:absolute;left:-21px;top:14px;width:10px;height:10px;border-radius:50%;border:2.5px solid var(--bg);box-shadow:0 0 0 1.5px #cbd5e1}
.tl-card{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:10px 13px;display:flex;align-items:center;gap:10px}
.tl-icon{font-size:1.1rem;flex-shrink:0}
.tl-body{flex:1;min-width:0}
.tl-title{font-size:.83rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-sub{font-size:.72rem;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-date{font-size:.65rem;color:#94a3b8;margin-top:2px}
.tl-score{text-align:right;flex-shrink:0}
.tl-s-num{font-size:.95rem;font-weight:800}
.tl-s-pct{font-size:.65rem;color:var(--muted)}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state p{font-size:.88rem;line-height:1.6}

@media(max-width:460px){.topic-grid{grid-template-columns:1fr}.stats-row{gap:6px}.stat-num{font-size:1.6rem}}
</style>
</head>
<body>
<header>
  <a class="back-link" href="riho-essay-topic.html">← 戻る</a>
  <h1>📊 Progress Summary</h1>
</header>

<div class="container">
  <div class="tok-card">
    <span class="tok-label">☁️ Token</span>
    <input class="tok-input" id="tokIn" type="password" placeholder="GitHub Token">
    <button class="tok-btn" onclick="loadData()">読み込む</button>
  </div>
  <div id="content">
    <div class="empty-state"><p>GitHubのTokenを入力して「読み込む」を押すと<br>これまでの学習履歴が表示されます</p></div>
  </div>
</div>

<script>
const GH_OWNER='okuyamafamilychicago-tech';
const GH_REPO='Saho-English-Word';
const GH_PATH='progress/riho-essay-progress.json';
const GH_TOK_KEY='rihoEssay_gh_token';

const TOPICS={
  ai:    {icon:'🤖',col:'#4A90E2',tja:'AIと働き方の未来',    persp:['AI推進派','AI懐疑派','実用主義派']},
  climate:{icon:'🌍',col:'#11998e',tja:'炭素税と気候変動対策',persp:['市場メカニズム重視派','社会的公正重視派','国際協調重視派']},
  ubi:   {icon:'💰',col:'#9B59B6',tja:'ベーシックインカム',   persp:['UBI推進派','UBI反対派','段階的導入派']},
  socialmedia:{icon:'📱',col:'#E91E8C',tja:'SNS規制',         persp:['規制強化派','表現の自由重視派','構造改革派']},
  nuclear:{icon:'⚡',col:'#F39C12',tja:'原子力発電の未来',    persp:['原子力推進派','脱原発派','条件付き推進派']},
  remote:{icon:'💻',col:'#1ABC9C',tja:'リモートワーク',       persp:['リモートワーク推進派','出社推進派','ハイブリッド派']},
  healthcare:{icon:'🏥',col:'#E74C3C',tja:'国民皆保険',       persp:['国民皆保険推進派','市場競争推進派','現実的改革派']},
  education:{icon:'🎓',col:'#8E44AD',tja:'大学の学位は価値があるか',persp:['学位肯定派','学位不要派','教育改革派']},
};

let progData={quizzes:{},history:[]};

function getToken(){return localStorage.getItem(GH_TOK_KEY)||'';}
function setToken(t){if(t)localStorage.setItem(GH_TOK_KEY,t);}

async function loadData(){
  const tok=(document.getElementById('tokIn').value.trim()||getToken());
  if(!tok){
    document.getElementById('content').innerHTML='<div class="empty-state"><p>Tokenを入力してください</p></div>';
    return;
  }
  setToken(tok);
  document.getElementById('content').innerHTML='<div class="empty-state"><p>読み込み中...</p></div>';
  try{
    const r=await fetch(
      `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}`,
      {headers:{Authorization:`token ${tok}`,Accept:'application/vnd.github+json'}}
    );
    if(!r.ok){
      document.getElementById('content').innerHTML=
        '<div class="empty-state"><p>データが見つかりません。<br>まずクイズを解いて保存してください。</p></div>';
      return;
    }
    const j=await r.json();
    progData=JSON.parse(decodeURIComponent(escape(atob(j.content))));
    render();
  }catch(e){
    document.getElementById('content').innerHTML=
      `<div class="empty-state"><p>読み込みエラー: ${e.message}</p></div>`;
  }
}

function scoreColor(pct){
  return pct>=80?'#22c55e':pct>=60?'#f59e0b':'#ef4444';
}

function render(){
  const q=progData.quizzes||{};
  const hist=progData.history||[];

  // ── Stats ────────────────────────────────────────
  let totalDone=0,totalScore=0,totalPts=0;
  const topicsStarted=new Set();
  Object.entries(q).forEach(([tid,persp])=>{
    Object.values(persp).forEach(v=>{
      if(v&&v.done){totalDone++;totalScore+=v.score;totalPts+=v.total;topicsStarted.add(tid);}
    });
  });
  const avgPct=totalPts>0?Math.round(totalScore/totalPts*100):null;

  const statsHTML=`
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" style="color:#4A90E2">${totalDone}</div>
      <div class="stat-lbl">完了した視点</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:${avgPct!=null?scoreColor(avgPct):'#94a3b8'}">${avgPct!=null?avgPct+'%':'—'}</div>
      <div class="stat-lbl">平均正答率</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:#9B59B6">${topicsStarted.size}</div>
      <div class="stat-lbl">取り組んだトピック</div>
    </div>
  </div>`;

  // ── Topic grid ───────────────────────────────────
  let topicHTML='';
  Object.entries(TOPICS).forEach(([tid,meta])=>{
    const tdata=q[tid]||{};
    const tot=meta.persp.length;
    const doneN=Object.values(tdata).filter(v=>v&&v.done).length;
    const pct=Math.round(doneN/tot*100);

    const dots=meta.persp.map((pn,pi)=>{
      const pd=tdata[pi+''];
      if(pd&&pd.done){
        const sc=Math.round(pd.score/pd.total*100);
        return `<div class="p-dot done" style="background:${scoreColor(sc)}">
          <span class="p-dot-name">${pn}</span>
          <span class="p-dot-score">${pd.score}/${pd.total}</span>
        </div>`;
      }
      return `<div class="p-dot"><span class="p-dot-name">${pn}</span></div>`;
    }).join('');

    topicHTML+=`
    <div class="topic-card${doneN===tot&&tot>0?' all-done':''}">
      <div class="topic-top">
        <span class="t-icon">${meta.icon}</span>
        <div class="t-name">${meta.tja}</div>
      </div>
      <div class="persp-dots">${dots}</div>
      <div class="t-prog">
        <div class="t-bar-wrap"><div class="t-bar" style="width:${pct}%;background:${meta.col}"></div></div>
        <span class="t-pct">${doneN}/${tot}</span>
      </div>
    </div>`;
  });

  // ── Timeline ─────────────────────────────────────
  // Use history array if available; otherwise build from quizzes (no timestamps)
  let items=[];
  if(hist.length>0){
    items=[...hist].reverse();
  } else {
    Object.entries(q).forEach(([tid,persp])=>{
      const meta=TOPICS[tid];
      if(!meta)return;
      Object.entries(persp).forEach(([pi,v])=>{
        if(v&&v.done){
          items.push({date:v.completedAt||null,tid,tidTitle:meta.tja,pi:+pi,
            piName:meta.persp[+pi]||'視点'+(+pi+1),score:v.score,total:v.total});
        }
      });
    });
    items.sort((a,b)=>b.date&&a.date?new Date(b.date)-new Date(a.date):0);
  }

  let tlHTML='';
  if(items.length===0){
    tlHTML='<div class="tl-empty">まだ完了したクイズがありません</div>';
  } else {
    tlHTML=items.map(it=>{
      const meta=TOPICS[it.tid]||{icon:'📝',col:'#94a3b8'};
      const pct=it.total>0?Math.round(it.score/it.total*100):0;
      const dateStr=it.date
        ?new Date(it.date).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})
        :'';
      return `<div class="tl-item">
        <div class="tl-dot" style="background:${meta.col}"></div>
        <div class="tl-card">
          <span class="tl-icon">${meta.icon}</span>
          <div class="tl-body">
            <div class="tl-title">${it.tidTitle||it.tid}</div>
            <div class="tl-sub">${it.piName}</div>
            ${dateStr?`<div class="tl-date">${dateStr}</div>`:''}
          </div>
          <div class="tl-score">
            <div class="tl-s-num" style="color:${scoreColor(pct)}">${it.score}/${it.total}</div>
            <div class="tl-s-pct">${pct}%</div>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  document.getElementById('content').innerHTML=`
    ${statsHTML}
    <div class="sec">トピック別進捗</div>
    <div class="topic-grid">${topicHTML}</div>
    <div class="sec">取り組み履歴</div>
    <div class="timeline">${tlHTML}</div>
  `;
}

// Auto-load if token already saved
document.getElementById('tokIn').value=getToken();
if(getToken()) loadData();
</script>
</body>
</html>
