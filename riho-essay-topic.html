{q:"Germany's healthcare system is considered a model for pragmatic reform because:",opts:["It is a single-payer government system providing the lowest-cost healthcare in the developed world","It uses mandatory insurance with 105+ competing regulated non-profit funds — universal coverage through regulated competition, not government monopoly","It has eliminated all private healthcare activity to ensure profits go toward patient care","It requires all employers to provide full coverage, similar to the pre-ACA US employer-based model"],ans:1,exp:"Germany's insight: universal coverage doesn't require a single government insurer. Mandate coverage, regulate the basic package (all funds must cover the same essential services), make funds non-profit, and set income-based premiums. This creates competition on service quality and efficiency without the market failure of excluding the sick. Over 100 competing funds — zero uninsured."},
{q:"The pragmatic reform perspective would describe the single-payer vs. free market debate as:",opts:["A clear-cut choice where single-payer is obviously superior in every country","A false binary — German and Japanese models show universal coverage can coexist with regulated competition and multiple payers","A purely technical question that should be decided by economists, not politicians","Irrelevant, since all wealthy countries will inevitably converge on the same system"],ans:1,exp:"The pragmatic argument challenges the framing itself. 'Government monopoly vs. free market' presents two poles and ignores the large middle ground where most successful universal coverage systems actually live — Germany, France, Japan, Netherlands. These achieve universality through mandates and regulation while maintaining competition and innovation incentives."},
{q:"Income-based premiums (higher earners pay more for identical coverage) are valued by pragmatic reformers because:",opts:["They incentivize healthy lifestyle choices through financial rewards","They address equity — healthcare cost burden is proportional to ability to pay — while maintaining private insurance structure","They allow funds to select more profitable (healthier) customers","They create competition between insurance funds to attract the highest-income members"],ans:1,exp:"Income-based premiums solve the access problem: coverage costs the same percentage of income whether you earn €20,000 or €200,000 per year. A low-income worker isn't priced out of coverage they need. A high earner pays more in absolute terms but the same proportional burden. This is a solidarity mechanism embedded in the insurance structure."},
{q:"The ACA's approach is cited as evidence for pragmatic incrementalism because:",opts:["It achieved universal coverage in the US by 2015","It halved the uninsured rate without eliminating private insurance, showing targeted reforms can achieve major coverage gains","It proved that single-payer was impossible to achieve politically in the US","It showed that market competition, properly incentivized by the ACA, could solve the uninsured problem alone"],ans:1,exp:"The ACA reduced the uninsured rate from ~16% to ~8.6% — roughly halved — without revolutionizing the entire system. It banned key insurance abuses, created markets for people without employer insurance, and expanded Medicaid for the poorest. Imperfect but real progress. This is the pragmatic reformer's template: identify the worst failures, fix them directly, iterate — don't wait for the perfect system."}
]}
]},
{id:"education",title:"Is a College Degree Worth It?",tja:"大学の学位は価値があるか",cat:"Education",icon:"🎓",col:"#8E44AD",
desc:"As costs rise and alternatives multiply, should everyone still aim for a four-year college degree?",
summary:`<h3>The Rising Cost</h3>
<p>US average annual tuition at a four-year private college: <strong>$40,000+</strong>. Total US student loan debt: <strong>$1.7 trillion</strong>. Yet the college wage premium remains substantial: <strong>~$1 million more in lifetime earnings</strong> for college graduates vs. high school graduates. The debate isn't whether college adds value on average — it clearly does. It's whether it adds enough value for every student, at today's costs.</p>
<h3>The Alternative Landscape</h3>
<p>Alternatives have multiplied: <strong>coding bootcamps</strong> (average $13,000, 4 months), <strong>trade apprenticeships</strong> (electricians average $80,000+ salary), <strong>MOOCs</strong> (Coursera, edX), <strong>micro-credentials</strong> (Google Career Certificates). Companies like <strong>Google, Apple, IBM, Costco</strong> have removed degree requirements for many positions. Still, elite college credentials remain powerful in consulting, finance, and law — and the peer networks from selective schools add hard-to-quantify career value.</p>
<div class="kterms"><h4>Key Terms</h4><ul><li>ROI (Return on Investment)</li><li>Signaling theory</li><li>Human capital</li><li>Credential inflation</li><li>Opportunity cost</li><li>Micro-credentials</li></ul></div>`,
persp:[
{t:"Yes: The Degree Premium Remains Real",tja:"学位肯定派",col:"#8E44AD",
story:`<p>In 2023, Georgetown University's Center on Education and the Workforce published updated data: the average college graduate earns <strong>$1 million more</strong> over their lifetime than a high school graduate. Unemployment for college graduates: <strong>2.2%</strong>. For high school graduates: <strong>3.9%</strong>. Even accounting for four years of foregone income and student loan debt, the median financial return on a college degree remains strongly positive — better than most investments. The stock market's average annual return is roughly 7% inflation-adjusted; the internal rate of return on a college degree is estimated at 12–15% for most completers. As financial investments go, this is exceptional.</p>
<p>But the data hides something important: it's not just what you learn — it's <strong>who you meet</strong>. The Opportunity Insights project at Harvard tracked how students from different backgrounds built professional networks. Going to a selective college exposes you to the peers who will become doctors, lawyers, CEOs, and senators. <strong>50% of Americans in the top 1% of income</strong> attended a college ranked in the top 1% of selectivity. Economist Raj Chetty's research found that at elite schools, the primary driver of future income wasn't grades or major — it was exposure to high-income peer networks that provided referrals, partnerships, and introductions unavailable outside those campuses. The network effects of elite college attendance are not captured in the wage premium data — they're on top of it.</p>
<p>The recession-resilience argument adds another dimension. During the 2008–2009 financial crisis, unemployment for college graduates peaked at <strong>5%</strong>. For high school graduates, it hit <strong>11%</strong>. During COVID-19, the gap widened further — remote work was overwhelmingly accessible to college-educated workers, while jobs requiring physical presence (which skew toward non-degree holders) evaporated. A degree isn't just a wage multiplier in good times; it's an economic buffer in bad ones. McKinsey, Goldman Sachs, and major law firms all still maintain de facto degree requirements — not because college teaches specific skills, but because the diploma signals the capacity for sustained high-level intellectual work under pressure. Soft skills — persuasive writing, structured argument, cross-disciplinary thinking — are precisely what four years of liberal arts education forces you to practice, and precisely what AI has not yet automated.</p>`,
rel:[
{ja:"日本の就職活動を考えてほしい。「学歴フィルター」は建前上は否定されているが、実質的に存在する企業も多い。大手企業の採用担当者が無意識にエントリーシートを選別するとき、大学名は「この人を信頼できるか」の代理指標として機能することがある。一部のGAFA企業では学歴不問になりつつあるが、日本では依然として大学のブランドが初期の門戸開放に影響している。",en:"Consider Japan's shukatsu job-hunting culture. The 'academic background filter' (gakureki filter) is officially denied but widely practiced: when a recruiter reviews thousands of applications, the university name functions as a proxy for reliability. While some GAFA companies have moved to skill-based screening, Japan's corporate mainstream still treats university brand as a first-stage selection mechanism — making the degree credential most valuable precisely where the hiring market uses it as a shortcut."},
{ja:"リーマンショック（2008年）のとき、大学卒の失業率は約5%でピークを迎えたが、高卒以下では約10%を超えた。COVID-19でも同様に、リモートワーク可能な仕事は大学卒に集中しており、対面必須の仕事が真っ先に失われた。学位は「好景気の賃金プレミアム」だけでなく、「不況時のクッション」として機能するという証拠だ。",en:"During the 2008 financial crisis, unemployment among college graduates peaked at around 5%, while high school graduates exceeded 10%. During COVID-19, remote-work-eligible positions were concentrated among degree holders, while in-person jobs disappeared first. A college degree isn't just a wage premium in good times — it's a recession buffer, a structural form of employment insurance the earnings statistics alone don't fully capture."}
],
pros:["Lifetime earnings premium of ~$1M makes college a strong financial investment for most students who complete their degree","Social network access at selective colleges creates career opportunities unmeasured by wage statistics alone","College develops critical thinking, writing, and intellectual flexibility that compound over a full career"],
cons:["Average data masks huge variance — STEM graduates earn significantly more than many humanities graduates; some degrees have poor ROI","Student debt burden is heaviest for students who start but don't finish — dropouts get the debt without the diploma","The premium may partly reflect 'signaling' — employers using the degree as a filter — rather than actual skills learned"],
quiz:[
{q:"Georgetown University's research found the average lifetime earnings premium for a college vs. high school graduate to be approximately:",opts:["About $200,000 — meaningful but not enough to justify most debt levels","About $500,000 — enough to justify moderate borrowing","About $1 million — making college a strong financial investment for most completers","About $3 million — making any debt level justified"],ans:2,exp:"Georgetown's Center on Education and the Workforce estimates the average lifetime college wage premium at ~$1 million in additional earnings. The key word is 'average' — individual outcomes vary enormously by field of study, school selectivity, and whether the student completes the degree. The average is strong; individual cases require closer analysis."},
{q:"The Opportunity Insights research found that 50% of Americans in the top 1% of income attended colleges in the top 1% of selectivity. This suggests:",opts:["Elite colleges produce high earners primarily through better teaching","Peer network access at selective colleges may be a major driver of top-income attainment beyond what wage premium statistics capture","Elite college attendance has no causal effect on earnings after controlling for student ability","Elite colleges are accessible to students from all income backgrounds at equal rates"],ans:1,exp:"Opportunity Insights (Raj Chetty et al.) found striking concentration: half of the very top earners attended the most selective 1% of colleges. This isn't fully explained by what these colleges teach. It reflects network effects — sitting next to the future Senate majority leader, hedge fund manager, or tech founder. That network has economic value the simple wage premium doesn't capture."},
{q:"The lower unemployment rate for college graduates (2.2%) vs. high school graduates (3.9%) is significant because:",opts:["It shows college graduates never face unemployment during downturns","It demonstrates recession resilience — college graduates are better protected during job loss cycles","It suggests high school graduates should be barred from certain industries","The difference is too small to meaningfully affect career decisions"],ans:1,exp:"Lower unemployment rates for college graduates are consistent across business cycles. During recessions, high school graduate unemployment spikes much more sharply than college graduate unemployment. This 'recession resilience' means the college premium is not just higher wages in good times — it's more stable employment throughout a full career, making the lifetime earnings calculation more reliable."},
{q:"'Signaling theory' in the context of college degrees argues that:",opts:["Colleges should communicate to employers more clearly which skills graduates have learned","The college degree premium exists partly because employers use graduation as a screening signal for traits like discipline, not because graduates are inherently more productive","College signals to students that they should pursue graduate education","Social media has replaced the college degree as the primary hiring signal"],ans:1,exp:"Economist Bryan Caplan argues much of the college wage premium reflects signaling — employers use college graduation as a proxy for traits like conscientiousness and follow-through that they can't directly observe. Under this view, the premium isn't about skills learned in class — it's about what completing a degree signals about the person. If largely true, much college education is socially wasteful."},
{q:"The pro-degree position's strongest argument against alternatives like coding bootcamps is:",opts:["Bootcamps and trade programs are illegal in most states","Bootcamps have significantly lower job placement rates than computer science degrees","The social network, critical thinking development, and career flexibility of a broad college education are hard to replicate in specialized alternatives","College is the only path to high-paying jobs in any sector"],ans:2,exp:"Bootcamps teach specific skills efficiently. But a 4-month program optimized for immediate job placement doesn't expose you to economics, psychology, history, or build peer networks that compound over decades. The pro-degree argument: college isn't just skills transfer — it's intellectual formation and network access. Those benefits are real and hard to replicate, especially for careers not yet predictable at age 18."}
]},
{t:"No: The System Is Broken, Alternatives Work",tja:"学位不要派",col:"#E74C3C",
story:`<p>In 2011, Peter Thiel launched the Thiel Fellowship — paying <strong>100 students $100,000 each</strong> to drop out of college and build a company instead. Alumni include Vitalik Buterin (co-founder of Ethereum) and Dylan Field (CEO of Figma, acquired by Adobe for $20 billion). Thiel's thesis: for ambitious people, college is an opportunity cost problem — four years and $200,000 that could instead be spent building something real. The fellowship's existence is itself a market signal: if college were obviously the best use of a smart 20-year-old's time, no one would take $100,000 to skip it.</p>
<p>The macro data is stark. Average time to repay US student loans: <strong>20 years</strong>. The percentage of recent college graduates working jobs that don't require a degree: <strong>41%</strong>. Electricians and plumbers — who train 4–5 years via apprenticeship <em>while earning</em> — often out-earn English literature graduates by age 30 and carry zero debt. Coding bootcamps like Lambda School and App Academy report <strong>80%+ placement rates</strong> in software roles at $80,000+ starting salaries, at a fraction of four-year costs. The Federal Reserve Bank of New York tracks underemployment among recent college graduates: in 2023, their most common occupations included retail salesperson, cashier, and waiter — jobs that pay $30,000–$40,000 and require no credential. When college became universal, the credential inflated — but the cost didn't stop rising.</p>
<p>The corporate world is quietly sending a different signal. In 2021, <strong>Google, Apple, IBM, Costco, Bank of America, and Accenture</strong> all publicly dropped four-year degree requirements for large categories of jobs. IBM has eliminated degree requirements for roughly half its US roles, replacing them with skills assessments. The rationale is blunt: the degree doesn't predict job performance as well as a structured skills test. If the companies with the most data on employee performance are removing the degree requirement, what does that say about the degree's value as a signal? The anti-degree argument's uncomfortable conclusion: the degree may be most valuable not because of what you learn, but because institutions — universities, employers, governments — have agreed to treat it as a ticket, regardless of whether the education behind it justified the cost.</p>`,
rel:[
{ja:"日本でも「就職のための大学進学」への疑問が出始めている。国立大授業料は年間53万円、私立は平均100万円以上。4年間で数百万円かかる。一方、職業訓練校や資格取得で直接就職した場合との収入・生活満足度を比べると、職種によっては大学進学の優位が明確ではないケースもある。「大学を出ることが当たり前」という社会的プレッシャーと実際の経済合理性は、必ずしも一致しない。",en:"Japan is questioning whether universal college attendance makes economic sense. National university tuition runs ¥530,000 per year; private universities average over ¥1 million. Four years totals several million yen before living expenses. A licensed electrician who completes vocational training earns a comparable income while their peers are still in university and accumulating costs. Social pressure to attend university and actual economic rationality don't always point the same direction."},
{ja:"IBMは2021年に「アメリカの採用ポジションの約半数で4年制大学の学位要件を撤廃」すると発表した。代わりにスキル評価テストを使う。「学位があるからといって仕事ができるとは限らない」—最も豊富なデータを持つ雇用主がこう判断したなら、学位の「シグナル価値」は変わりつつある。採用市場が変われば、学位への投資対効果も変わる。",en:"IBM announced in 2021 it was removing four-year degree requirements for roughly half its US positions, replacing them with structured skills assessments. Google, Apple, Bank of America, and Accenture followed. These companies have better data on who performs well than any academic institution. When the largest employers in the economy are removing the degree requirement, the 'signaling value' that justifies degree costs is structurally changing."}
],
pros:["Trade apprenticeships (electricians, plumbers) earn $80,000+ with no debt while college peers are still studying","41% of recent graduates work jobs not requiring a degree — suggesting significant credential over-investment","Coding bootcamps offer faster, cheaper paths to specific high-demand skills like software development"],
cons:["'Skip college' advice disproportionately harms first-generation and low-income students for whom the credential still opens doors that networks don't","Alternative credentials lack the universal recognizability of a college degree — many employers still default to degree requirements","The comparison ignores field-of-study variation: STEM and nursing graduates rarely face the underemployment statistics cited"],
quiz:[
{q:"Peter Thiel's Fellowship is cited as evidence against college because:",opts:["It proved that dropping out of college statistically harms most participants' career outcomes","It paid elite students $100,000 to not attend college and build companies, with notable alumni co-founding Ethereum and Figma","It funded research showing college graduation rates are declining regardless of financial incentives","It demonstrated that college dropouts earn less than graduates on average"],ans:1,exp:"Thiel's fellowship is deliberately provocative — he chose students accepted to elite schools and paid them to not attend. Notable fellows include Vitalik Buterin (Ethereum) and Dylan Field (Figma). It's not a statistical argument — it's a proof of concept: for the most ambitious and capable, college's opportunity cost can exceed its value."},
{q:"The statistic that 41% of recent college graduates work jobs not requiring a degree most likely indicates:",opts:["These graduates are all underpaid and should seek higher-level employment","College has been under-producing graduates relative to high-skill job demand","Significant credential inflation — too many people obtaining degrees for jobs that could be done without them, creating cost without proportional value","Employers are irresponsibly ignoring college credentials in hiring decisions"],ans:2,exp:"If 4 in 10 college graduates work jobs not requiring a degree, the supply of graduates has outpaced degree-required job creation. These graduates paid full college costs but aren't in positions that needed those credentials. The anti-degree argument: this is credential inflation — an arms race where the degree signals nothing special because everyone has one."},
{q:"Trade apprenticeships are cited as alternatives primarily because:",opts:["They're available to anyone regardless of academic ability and lead to equal earnings to any college degree","Apprentices earn while training and often match or exceed college-educated peer earnings by age 30 in skilled trades, with zero debt","Trade work is always more intellectually satisfying than office work","Trade wages have been rising faster than college-educated wages in every industry sector"],ans:1,exp:"A licensed electrician's path: 4-5 year apprenticeship, earning $40,000-$60,000 while training, graduating with no debt. By 30: licensed, earning $80,000+, zero loan payments. Compare to an English major: 4 years, $150,000+ in debt, entry-level at $45,000. By 30: still repaying loans. The financial comparison at age 30 often favors the tradesperson, especially when debt burden is factored in."},
{q:"'Credential inflation' in education means:",opts:["University tuition has inflated faster than consumer prices generally","As more people obtain degrees, the credential becomes less distinctive, driving employers to require degrees for jobs that previously didn't need them — increasing the cost of access without increasing value","Professors' salaries have inflated faster than teaching quality has improved","Elite school credentials have inflated while community college credentials have lost all value"],ans:1,exp:"Credential inflation: in 1970, a high school diploma was the standard credential. As college attendance spread, employers raised requirements to 'college degree' — not because jobs required new skills, but to filter candidates. Now many entry-level jobs require a BA; some require an MA. The cost of access keeps rising while the credential's distinctive value shrinks. It's an educational arms race."},
{q:"The anti-degree position's main vulnerability, as critics point out, is:",opts:["Trade wages are actually much lower than pro-trade advocates claim","The advice 'skip college' can disproportionately harm first-generation and low-income students for whom the credential still opens doors that informal networks don't","Alternative credentials like bootcamps have lower employment rates than four-year degrees","The comparison with trades ignores that most people are physically unable to do skilled trade work"],ans:1,exp:"The equity critique: elite tech founders can afford to skip degrees because they have other credentials (top school they're dropping out of), networks (family and venture capital connections), and visible talent. For a first-generation college student from a low-income background, the degree may be the only universally recognized signal that opens initial employment doors. 'Skip college' advice from wealthy insiders is not equally available to everyone."}
]},
{t:"Reform: Fix Access and Cost, Not the Degree Itself",tja:"教育改革派",col:"#1ABC9C",
story:`<p>In 2014, Germany eliminated tuition fees for all students — including international students. Germany's logic: educated citizens benefit the whole economy; costs should be shared broadly, not borne entirely by 18-year-olds who haven't yet earned anything. Result: applications from abroad surged, brain drain reversed, and universities didn't collapse without fee revenue — they're funded through general taxation, like roads and schools. Germany's universities still rank among the world's best in engineering and sciences. Finland's system adds another data point: consistently top-3 globally in PISA education rankings, combining free tuition with highly selective teacher training (only the top 10% of graduates enter teaching), small class sizes, and late introduction of formal schooling (age 7). The reformer's core argument: the problem in America and Japan isn't the concept of college — it's who can access it and at what price.</p>
<p>Meanwhile, the degree format itself needs updating. A 2022 LinkedIn analysis found the most in-demand skills — cloud computing, generative AI, data analysis, cybersecurity — weren't widely taught in traditional degree programs until recently. The reformer's answer: shorter, modular credentials that can be stacked. Google's Career Certificates (UX Design, IT Support, Data Analytics) take 6 months and cost under $300 via Coursera; Google explicitly accepts them in lieu of degrees for their own job postings. AWS cloud certifications, Microsoft Azure credentials, and Salesforce administrator certificates are similarly recognized across industries. <strong>Micro-credentials</strong> can update in months when a new technology emerges; a university curriculum takes years to revise through faculty votes, accreditation review, and catalog change cycles.</p>
<p>The equity dimension makes the cost problem urgent. The US college completion gap by income is stark: among students from the top income quartile who start a bachelor's degree, <strong>77% graduate</strong>. Among those from the bottom quartile, only <strong>11% graduate</strong>. These students take on debt, start college with good intentions, and then face a financial emergency — a sick parent, a broken car, an unexpected bill — that forces them to drop out. They leave with the debt but not the diploma. Income-share agreements (ISAs) — where students pay a percentage of future income rather than upfront tuition — attempt to align incentives: if you don't get a job, you don't pay. Lambda School popularized this model in tech education. Reformers see ISAs plus government-subsidized tuition plus robust transfer pathways between community college and four-year universities as the toolkit to preserve the value of the degree while dismantling the wealth barrier to obtaining it.</p>`,
rel:[
{ja:"日本でも、放送大学・通信制大学・リカレント教育（社会人の学び直し）への注目が高まっている。「22歳までに学校教育を終える」モデルから「人生100年時代に何度でも学び直せる」モデルへの転換が求められている。政府の「リスキリング支援」政策もその流れだ。改革派が主張するのは「学位の廃止」ではなく「誰もが質の高い教育にアクセスできる仕組みの構築」だ。",en:"Japan is seeing growing interest in Open University, online degree programs, and 'recurrent education' for working adults. The model of 'finish education at 22 then work for 40 years' no longer describes most careers in an era of automation. Japan's government 'reskilling support' policy reflects this shift. Reformers argue: the problem isn't whether degrees matter, it's that cost and access barriers ensure the people who most need credentials often can't obtain them."},
{ja:"GoogleのCareer Certificatesは6ヶ月・約3万円でUXデザイン・データ分析・ITサポートなどの認定を取得できる。GoogleはこれをGoogleの採用において4年制学位と同等と認めている。AWS認定・Azure認定・Salesforce管理者認定も業界標準として広く認知されている。「4年間・数百万円」でなく「半年・数万円」で得られるスキル認定が雇用市場で通用し始めた—教育改革派が推し進めるモデルだ。",en:"Google Career Certificates cost approximately $300 and take 6 months, covering UX design, data analytics, IT support, and more. Google explicitly accepts them as equivalent to four-year degrees for Google's own hiring. AWS cloud certifications, Microsoft Azure credentials, and Salesforce administrator certificates are similarly recognized across industries. When a ¥40,000 credential earned in 6 months is accepted for the same role as one costing ¥4 million over 4 years, the education reform case stops being theoretical and becomes a market reality."}
],
pros:["Germany and Finland prove high-quality universal higher education is financially feasible without destroying academic standards","Micro-credentials can update faster than degree curricula in rapidly changing fields like AI and cloud computing","Addressing cost and access barriers preserves genuine college value while removing the debt burden that distorts ROI calculations"],
cons:["Free tuition funded by taxes requires political consensus that may be harder to achieve in culturally diverse societies","Credential proliferation (too many micro-credentials) may create new confusion that the simple degree requirement solved","Reforming existing institutions is slower than simply advocating alternatives — students facing debt decisions now can't wait for systemic change"],
quiz:[
{q:"Germany's decision to make university tuition free for all students was justified primarily by:",opts:["Germany's constitution requires free education at all levels","A belief that educated citizens create broad societal benefits that justify socializing costs — and that tuition barriers unnecessarily reduce the talent pool","Germany's low domestic student numbers requiring international students to fill classrooms","Research showing free-tuition universities produce higher-earning graduates"],ans:1,exp:"Germany's tuition-free policy reflects a social compact argument: higher education benefits society beyond the individual graduate — through more productive workers, better-informed citizens, and more innovation. Charging full costs to individuals is inefficient if it deters capable people. The counter-argument: free college may reduce students' motivation if they have no financial stake."},
{q:"'Micro-credentials' and 'credential stacking' are proposed by education reformers as a response to:",opts:["The fact that traditional degrees are too expensive for most students","The rapid pace of skill change in technology fields — traditional 4-year curricula cannot update as fast as AI, cloud, and data skills evolve","The failure of universities to teach social skills that employers value","Evidence that employers prefer shorter, more focused training"],ans:1,exp:"The core problem micro-credentials address: a biology degree takes years to add a new AI module because curriculum changes require faculty votes, accreditation review, and catalog changes. A micro-credential can be updated in months. In fields where the most in-demand skill didn't exist two years ago, stackable credentials can respond to employer needs far faster than degree revision."},
{q:"Finland's education system is cited by reformers as evidence that:",opts:["Competitive standardized testing from a young age produces the best outcomes","Free, well-funded education with small classes and well-paid teachers can produce top global outcomes — proving that cost and access, not structure, is the US problem","Private competition between schools consistently outperforms public systems in every country","High education spending always produces proportionally better results"],ans:1,exp:"Finland's system: free tuition at all levels, highly selective teacher training (top 10% of graduates), small classes, late formal schooling (age 7), minimal standardized testing, strong student autonomy — and consistently top global rankings. Reformers cite it to argue: the US problem isn't that college is fundamentally broken — it's that cost and inequality make the good model inaccessible."},
{q:"Japan's 'reskilling' (リスキリング) government policy is relevant to the education reform debate because:",opts:["It shows the Japanese government has decided college degrees are no longer economically valuable","It reflects a shift from 'education ends at 22' to 'learn throughout your career,' driven by automation and rapid skill change","It demonstrates all Japanese workers need to learn coding by 2030","It proves traditional universities are being replaced by government training programs in Japan"],ans:1,exp:"Japan's reskilling policy addresses a structural problem: if 40%+ of jobs are at risk from automation (OECD estimates), workers need to retrain mid-career. The old model — graduate at 22, work in one field until 65 — no longer describes most careers. Policy frameworks supporting adult re-entry into education and micro-credentials acknowledge that 'get a degree then stop learning' is obsolete."},
{q:"The education reform perspective's main critique of both the 'degrees are essential' and 'skip college entirely' camps is:",opts:["Both camps ignore the importance of extracurricular activities in university life","Both camps focus on outcomes for top earners and ignore average workers","The debate focuses on the system as it exists, ignoring that the real problem is cost and access — Germany and Finland show affordable, high-quality universal higher education is achievable","Both camps agree debt levels are unsustainable but disagree only on the solution"],ans:2,exp:"The reformer's meta-argument: both 'college is the only path' and 'college is a scam' are arguing about the system as currently structured. Germany and Finland show that universal, high-quality, affordable higher education is achievable. The problem to fix isn't whether degrees matter — it's that the current cost and access structure ensures the people who most need credentials often can't afford to get them."}
]}
]}
];

function buildDiagram(d){
  if(!d) return '';
  const col=d.color||'#4A90E2';
  const hd=d.title?`<div class="d-hd" style="background:${col}18;color:${col}">${d.title}</div>`:'';
  if(d.type==='flow'){
    const s=d.steps.map((s,i)=>(i?'<span class="d-arr">→</span>':'')+`<div class="d-step">${s}</div>`).join('');
    return `<div class="diag">${hd}<div class="d-body"><div class="d-flow">${s}</div></div></div>`;
  }
  if(d.type==='compare'){
    return `<div class="diag">${hd}<div class="d-body"><div class="d-cmp">
      <div class="d-side" style="background:${d.left.color||'#dbeafe'}">
        <div class="d-side-lbl">${d.left.label}</div>
        <div class="d-side-val">${d.left.val}</div>
        ${d.left.note?`<div class="d-side-note">${d.left.note}</div>`:''}
      </div><div class="d-vs">VS</div>
      <div class="d-side" style="background:${d.right.color||'#dcfce7'}">
        <div class="d-side-lbl">${d.right.label}</div>
        <div class="d-side-val">${d.right.val}</div>
        ${d.right.note?`<div class="d-side-note">${d.right.note}</div>`:''}
      </div></div></div></div>`;
  }
  if(d.type==='stat'){
    return `<div class="diag">${hd}<div class="d-body" style="background:${col}0d;text-align:center">
      <div class="d-stat">
        <div class="d-s-num" style="color:${col}">${d.num}</div>
        ${d.unit?`<div class="d-s-unit" style="color:${col}">${d.unit}</div>`:''}
        <div class="d-s-desc">${d.desc}</div>
        ${d.note?`<div class="d-s-note">${d.note}</div>`:''}
      </div></div></div>`;
  }
  if(d.type==='bar'){
    const mx=Math.max(...d.items.map(i=>i.val));
    const bars=d.items.map(i=>`<div class="d-br">
      <div class="d-br-lbl">${i.label}</div>
      <div class="d-br-tr"><div class="d-br-fl" style="width:${Math.round(i.val/mx*100)}%;background:${i.color||col}">${i.display||i.val}</div></div>
    </div>`).join('');
    return `<div class="diag">${hd}<div class="d-body"><div class="d-bar">${bars}</div></div></div>`;
  }
  return '';
}

  return `

    ).join('');
  // Fill summary
  document.getElementById('tc-summary').innerHTML=`<div class="stext">${cur.summary}</div>`;
  document.getElementById('tc-summary').classList.add('active');
  // Build perspective content divs
  const detail=document.getElementById('detail');
  cur.persp.forEach((p,pi)=>{
    const d=document.createElement('div');
    d.className='tc tc-persp'; d.id='tc-p'+pi;
    d.innerHTML=buildPerspHTML(p,pi);
    detail.appendChild(d);
  });
  // Reset quiz state
  cur.persp.forEach((_,pi)=>{pState[pi]={picks:{},submitted:false};});
  // Restore saved quiz states from GitHub
  const saved=ghQuizData[cur.id]||{};
  cur.persp.forEach((_,pi)=>{
    const s=saved[pi+''];
    if(s&&s.done){
      Object.entries(s.picks||{}).forEach(([qi,oi])=>ppick(pi,+qi,+oi));
      checkPerspQuiz(pi,true);
    }
  });
  window.scrollTo(0,0);
}

function ppick(pi,qi,oi){
  if(pState[pi]&&pState[pi].submitted)return;
  if(!pState[pi])pState[pi]={picks:{},submitted:false};
  pState[pi].picks[qi]=oi;
  for(let j=0;j<cur.persp[pi].quiz[qi].opts.length;j++)
    document.getElementById(`po${pi}_${qi}_${j}`).classList.remove('selected');
  document.getElementById(`po${pi}_${qi}_${oi}`).classList.add('selected');
  document.querySelectorAll(`input[name="pq${pi}_${qi}"]`)[oi].checked=true;
}

function checkPerspQuiz(pi,noSave=false){
  if(!pState[pi])pState[pi]={picks:{},submitted:false};
  pState[pi].submitted=true;
  const sbtn=document.getElementById('psb'+pi);
  if(sbtn)sbtn.disabled=true;
  let score=0;
  const quiz=cur.persp[pi].quiz;
  quiz.forEach((q,qi)=>{
    const chosen=pState[pi].picks[qi];
    const correct=q.ans;
    const corrEl=document.getElementById(`po${pi}_${qi}_${correct}`);
    if(corrEl)corrEl.classList.add('show-correct');
    if(chosen===undefined){}
    else if(chosen===correct){if(corrEl)corrEl.classList.add('correct');score++;}
    else{const wrEl=document.getElementById(`po${pi}_${qi}_${chosen}`);if(wrEl)wrEl.classList.add('wrong');}
    const expEl=document.getElementById(`pexp${pi}_${qi}`);
    if(expEl)expEl.classList.add('show');
  });
  const total=quiz.length;
  const pct=Math.round(score/total*100);
  const msnEl=document.getElementById('msn'+pi);
  if(msnEl)msnEl.textContent=`${score} / ${total}`;
  const msgs=['もう一度読んでみよう','復習してみよう！','なかなか良い！','素晴らしい！','満点！🎉'];
  const msgEl=document.getElementById('msmsg'+pi);
  if(msgEl)msgEl.textContent=msgs[Math.min(Math.floor(score/(total/4.01)),4)];
  const barEl=document.getElementById('msb'+pi);
  if(barEl)barEl.style.width=pct+'%';
  const msc=document.getElementById('msc'+pi);
  if(msc){msc.classList.add('show');if(!noSave)setTimeout(()=>msc.scrollIntoView({behavior:'smooth',block:'nearest'}),100);}
  updateTabBadge(pi,score,total);
  if(!noSave) saveQuizToGitHub(cur.id,pi,score,total);
}

function retryPerspQuiz(pi){
  pState[pi]={picks:{},submitted:false};
  document.getElementById('tc-p'+pi).innerHTML=buildPerspHTML(cur.persp[pi],pi);
  // scroll to top of this perspective tab content
  document.getElementById('tc-p'+pi).scrollIntoView({behavior:'smooth',block:'start'});
}

function switchTab(name,el){
  document.querySelectorAll('#tabs .tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('#detail>.tc').forEach(t=>t.classList.remove('active'));
  document.getElementById('tc-'+name).classList.add('active');
  window.scrollTo({top:document.getElementById('detail').offsetTop-60,behavior:'smooth'});
}

// ─── GitHub Progress Sync ───────────────────────────────────
const GH_ES_OWNER='okuyamafamilychicago-tech';
const GH_ES_REPO='Saho-English-Word';
const GH_ES_PATH='progress/riho-essay-progress.json';
const GH_ES_TOK_KEY='rihoEssay_gh_token';

function getGHToken(){return localStorage.getItem(GH_ES_TOK_KEY)||'';}
function setGHToken(t){if(t)localStorage.setItem(GH_ES_TOK_KEY,t);}

function toggleGHPanel(){
  const p=document.getElementById('ghPanel');
  p.classList.toggle('open');
  if(p.classList.contains('open'))
    document.getElementById('ghTokInput').value=getGHToken();
}
document.addEventListener('click',e=>{
  if(!e.target.closest('#ghPanel')&&!e.target.closest('#ghBtn'))
    document.getElementById('ghPanel').classList.remove('open');
});

function showToast(msg,ms=2500){
  const t=document.getElementById('ghToast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._tm);
  t._tm=setTimeout(()=>t.classList.remove('show'),ms);
}

function updateTabBadge(pi,score,total){
  document.querySelectorAll(`#tabs .tab[data-pi="${pi}"]`).forEach(tab=>{
    tab.querySelectorAll('.tab-score').forEach(b=>b.remove());
    const b=document.createElement('span');
    b.className='tab-score';
    b.textContent=`${score}/${total}`;
    tab.appendChild(b);
  });
}

function updateCardBadge(tid){
  const data=ghQuizData[tid]||{};
  const topic=T.find(t=>t.id===tid);
  if(!topic)return;
  const tot=topic.persp.length;
  const done=Object.values(data).filter(v=>v&&v.done).length;
  const badge=document.getElementById('cgb-'+tid);
  if(!badge)return;
  if(done>0){
    badge.textContent=`✓ ${done}/${tot} クイズ完了`;
    badge.classList.add('visible');
  }
  const card=document.querySelector(`.card[data-tid="${tid}"]`);
  if(card&&done===tot)card.classList.add('card-all-done');
}

function updateAllCardBadges(){
  T.forEach(t=>updateCardBadge(t.id));
}

async function saveQuizToGitHub(tid,pi,score,total){
  if(!ghQuizData[tid])ghQuizData[tid]={};
  ghQuizData[tid][pi+'']={done:true,score,total,picks:{...pState[pi].picks}};
  updateCardBadge(tid);
  await pushGHData();
}

async function loadEssayProgressFromGH(){
  const token=getGHToken(); if(!token)return;
  try{
    const url=`https://api.github.com/repos/${GH_ES_OWNER}/${GH_ES_REPO}/contents/${GH_ES_PATH}`;
    const r=await fetch(url,{headers:{Authorization:`token ${token}`,Accept:'application/vnd.github+json'}});
    if(!r.ok)return;
    const j=await r.json();
    const data=JSON.parse(decodeURIComponent(escape(atob(j.content))));
    if(data.quizzes){
      ghQuizData=data.quizzes;
      updateAllCardBadges();
      showToast('☁️ 進捗を読み込みました');
    }
  }catch(e){console.warn('GH load error:',e);}
}

async function pushGHData(){
  const token=getGHToken(); if(!token)return;
  try{
    const payload=JSON.stringify({version:1,savedAt:new Date().toISOString(),quizzes:ghQuizData},null,2);
    const url=`https://api.github.com/repos/${GH_ES_OWNER}/${GH_ES_REPO}/contents/${GH_ES_PATH}`;
    const hdrs={Authorization:`token ${token}`,'Content-Type':'application/json',Accept:'application/vnd.github+json'};
    let sha='';
    const g=await fetch(url,{headers:hdrs});
    if(g.ok){const j=await g.json();sha=j.sha;}
    const body={message:`Essay progress ${new Date().toLocaleString('ja-JP')}`,content:btoa(unescape(encodeURIComponent(payload))),...(sha?{sha}:{})};
    const r=await fetch(url,{method:'PUT',headers:hdrs,body:JSON.stringify(body)});
    if(r.ok)showToast('☁️ GitHubに保存しました');
    else showToast('⚠️ 保存に失敗 — TokenをGitHub設定で確認してください',3500);
  }catch(e){console.warn('GH push error:',e);showToast('⚠️ 保存エラー');}
}
async function manualSaveGH(){
  setGHToken(document.getElementById('ghTokInput').value);
  if(!getGHToken()){showToast('⚠️ Tokenを入力してください');return;}
  await pushGHData();
}
async function manualLoadGH(){
  setGHToken(document.getElementById('ghTokInput').value);
  if(!getGHToken()){showToast('⚠️ Tokenを入力してください');return;}
  await loadEssayProgressFromGH();
}

// Auto-load on startup
(async()=>{await loadEssayProgressFromGH();})();
</script>
