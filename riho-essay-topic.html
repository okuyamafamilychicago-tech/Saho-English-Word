<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEFL 社会時事学習</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f4f6fb;--sur:#fff;--txt:#1a1a2e;--muted:#6b7280;--bdr:#e5e7eb;--r:12px;--sh:0 2px 12px rgba(0,0,0,.08);--ac:#4A90E2}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;line-height:1.6}
header{background:#1a1a2e;color:#fff;padding:13px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
header h1{font-size:1.05rem;font-weight:600;flex:1}
.back-btn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 13px;border-radius:8px;cursor:pointer;font-size:.85rem}
.back-btn:hover{background:rgba(255,255,255,.28)}
.hidden{display:none!important}
#home{padding:18px}
.hero{text-align:center;padding:24px 0 18px}
.hero h2{font-size:1.4rem;font-weight:800}
.hero p{color:var(--muted);margin-top:6px;font-size:.88rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:13px;max-width:980px;margin:0 auto}
.card{background:var(--sur);border-radius:var(--r);padding:20px;cursor:pointer;transition:transform .2s,box-shadow .2s;border:2px solid transparent;box-shadow:var(--sh);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--cc)}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.13);border-color:var(--cc)}
.ci{font-size:1.7rem;margin-bottom:9px}.ccat{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--cc);margin-bottom:3px}
.ctitle{font-size:.98rem;font-weight:700;margin-bottom:2px}.ctja{font-size:.78rem;color:var(--muted);margin-bottom:7px}
.cdesc{font-size:.8rem;color:var(--muted);line-height:1.5}
.cmeta{display:flex;flex-wrap:wrap;gap:5px;margin-top:11px}
.badge{font-size:.66rem;padding:2px 8px;border-radius:20px;background:var(--bg);color:var(--muted)}
#detail{display:none}
.dhead{padding:22px 18px 0;max-width:820px;margin:0 auto}
.dicon{font-size:2rem;margin-bottom:7px}.dcat{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.dtitle{font-size:1.4rem;font-weight:800;line-height:1.2}.dtja{font-size:.88rem;color:var(--muted);margin-top:3px}
.tabs{display:flex;border-bottom:2px solid var(--bdr);padding:0 18px;max-width:820px;margin:18px auto 0;overflow-x:auto}
.tab{padding:9px 16px;cursor:pointer;font-size:.86rem;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:color .2s}
.tab.active{color:var(--ac);border-bottom-color:var(--ac)}
.tc{display:none;padding:18px;max-width:820px;margin:0 auto}.tc.active{display:block}
.stext{font-size:.92rem;line-height:1.85;color:#333}
.stext h3{font-size:.98rem;font-weight:700;margin:16px 0 5px;color:#1a1a2e}
.stext p{margin-bottom:11px}.stext strong{color:#1a1a2e}
.kterms{background:#f0f4ff;border-radius:10px;padding:13px 17px;margin:16px 0}
.kterms h4{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#4a90e2;margin-bottom:7px}
.kterms ul{list-style:none;display:flex;flex-wrap:wrap;gap:6px}
.kterms li{background:#fff;border:1px solid #d0dcf5;border-radius:6px;padding:3px 10px;font-size:.76rem;color:#333}
.pcard{background:var(--sur);border-radius:var(--r);margin-bottom:16px;border:1px solid var(--bdr);box-shadow:var(--sh);overflow:hidden}
.pcard-head{display:flex;align-items:center;gap:10px;padding:16px 18px 14px;border-left:5px solid var(--pc)}
.pnum{width:28px;height:28px;border-radius:50%;background:var(--pc);color:#fff;font-size:.8rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ptitle{font-size:.95rem;font-weight:700}.ptja{font-size:.74rem;color:var(--muted)}
.pstory{font-size:.88rem;line-height:1.82;color:#3a3a4a;padding:0 18px 14px;border-left:5px solid var(--pc)}
.pstory p{margin-bottom:10px}.pstory p:last-child{margin-bottom:0}
.rel-wrap{margin:12px 0;display:flex;flex-direction:column;gap:8px}
.rel-item{background:#fffbeb;border-left:3px solid #f59e0b;padding:10px 14px;border-radius:0 8px 8px 0;font-size:.85rem;line-height:1.6}
.rel-label{font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#b45309;margin-bottom:5px}
.rel-ja{color:#78350f;margin-bottom:4px}
.rel-en{color:#92400e;font-style:italic;font-size:.81rem;border-top:1px dashed #fde68a;padding-top:5px;margin-top:2px}
/* ── Diagram components ── */
.diag{margin:8px 0 4px;border-radius:8px;overflow:hidden;border:1px solid #e5e7eb;background:#fff;font-size:.82rem}
.d-hd{font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;padding:4px 10px}
.d-body{padding:9px 10px}
.d-flow{display:flex;align-items:center;flex-wrap:wrap;gap:4px;justify-content:center}
.d-step{background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:6px;padding:5px 9px;font-size:.76rem;font-weight:600;color:#1e40af;text-align:center;line-height:1.3}
.d-arr{color:#93c5fd;font-size:1.05rem;font-weight:700;flex-shrink:0}
.d-cmp{display:grid;grid-template-columns:1fr 22px 1fr;gap:5px;align-items:center}
.d-side{border-radius:6px;padding:8px 6px;text-align:center}
.d-side-lbl{font-size:.7rem;font-weight:700;margin-bottom:3px;line-height:1.3}
.d-side-val{font-size:.92rem;font-weight:800;line-height:1.2}
.d-side-note{font-size:.65rem;color:#555;margin-top:3px;line-height:1.3}
.d-vs{display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;color:#9ca3af}
.d-stat{text-align:center;padding:2px 0}
.d-s-num{font-size:1.7rem;font-weight:800;line-height:1.15}
.d-s-unit{font-size:.8rem;font-weight:600;margin-bottom:3px}
.d-s-desc{font-size:.78rem;color:#374151;line-height:1.45}
.d-s-note{font-size:.68rem;color:#6b7280;background:#f9fafb;border-radius:5px;padding:3px 8px;margin-top:5px;display:inline-block}
.d-bar{display:flex;flex-direction:column;gap:5px}
.d-br{display:flex;align-items:center;gap:6px}
.d-br-lbl{font-size:.7rem;font-weight:600;min-width:72px;text-align:right;color:#374151;flex-shrink:0;line-height:1.3}
.d-br-tr{flex:1;background:#f3f4f6;border-radius:20px;height:17px;overflow:hidden}
.d-br-fl{height:100%;border-radius:20px;display:flex;align-items:center;padding:0 7px;font-size:.65rem;font-weight:700;color:#fff;min-width:32px;justify-content:flex-end}
.pc-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:1px solid var(--bdr)}
.pros-block,.cons-block{padding:14px 16px}
.pros-block{border-right:1px solid var(--bdr);background:#f0fdf4}.cons-block{background:#fff5f5}
.pc-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.pros-block .pc-label{color:#16a34a}.cons-block .pc-label{color:#dc2626}
.pc-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.pc-list li{font-size:.78rem;line-height:1.5;color:#444;display:flex;gap:6px}
.pc-list li::before{flex-shrink:0;margin-top:1px}
.pros-block .pc-list li::before{content:"✓";color:#16a34a;font-weight:700}
.cons-block .pc-list li::before{content:"✗";color:#dc2626;font-weight:700}
/* Per-perspective tab indicator */
.tab-pnum{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;color:#fff;font-size:.65rem;font-weight:700;margin-right:5px;flex-shrink:0;vertical-align:middle}
.tab[data-pi].active{color:var(--ptab)!important;border-bottom-color:var(--ptab)!important}
/* Perspective full content */
.pcard-full{background:var(--sur);border-radius:var(--r);margin-bottom:0;border:1px solid var(--bdr);box-shadow:var(--sh);overflow:hidden}
/* Inline quiz section */
.inline-quiz{padding:22px 18px 28px;background:#f8faff;border-top:3px solid var(--pc,#4A90E2)}
.iq-hd{font-size:.95rem;font-weight:800;color:var(--pc,#4A90E2);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.iq-hd::after{content:'';flex:1;height:2px;background:var(--pc,#4A90E2);opacity:.2;border-radius:2px}
.qq{margin-bottom:14px;padding:14px 16px;background:#fff;border-radius:10px;border:1px solid var(--bdr);box-shadow:0 1px 4px rgba(0,0,0,.04)}
.qn{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ac);margin-bottom:4px}
.qt{font-size:.88rem;font-weight:600;margin-bottom:10px;line-height:1.45}
.opts{display:flex;flex-direction:column;gap:6px}
.opt{display:flex;align-items:flex-start;gap:9px;padding:8px 12px;border:2px solid var(--bdr);border-radius:8px;cursor:pointer;font-size:.83rem;line-height:1.4;transition:border-color .15s,background .15s}
.opt:hover{border-color:var(--ac);background:#f0f4ff}
.opt.selected{border-color:var(--ac);background:#eef4ff}
.opt.correct{border-color:#16a34a!important;background:#f0fdf4!important;color:#15803d;font-weight:600}
.opt.wrong{border-color:#dc2626!important;background:#fff5f5!important;color:#b91c1c}
.opt.show-correct{border-color:#16a34a!important;background:#f0fdf4!important}
.opt input{margin-top:3px;flex-shrink:0;accent-color:var(--ac)}
.q-exp{display:none;margin-top:8px;padding:9px 12px;background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;font-size:.79rem;line-height:1.55;color:#92400e}
.q-exp.show{display:block}
.sbtn{width:100%;padding:12px;background:var(--ac);color:#fff;border:none;border-radius:var(--r);font-size:.92rem;font-weight:600;cursor:pointer;margin-top:6px;transition:opacity .2s}
.sbtn:hover{opacity:.9}.sbtn:disabled{opacity:.45;cursor:default}
.mini-score{display:none;text-align:center;padding:14px;background:var(--bg);border-radius:10px;margin-top:10px}
.mini-score.show{display:block}
.ms-num{font-size:2rem;font-weight:800;color:var(--ac)}
.ms-bar-wrap{background:#e5e7eb;border-radius:20px;height:8px;overflow:hidden;max-width:200px;margin:6px auto 10px}
.ms-bar{height:100%;border-radius:20px;background:var(--ac);transition:width .6s ease}
.retry-btn{padding:7px 18px;background:var(--sur);border:2px solid var(--ac);color:var(--ac);border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer}
.retry-btn:hover{background:#eef4ff}
@media(max-width:600px){.grid{grid-template-columns:1fr}.dtitle{font-size:1.15rem}.pc-grid{grid-template-columns:1fr}.pros-block{border-right:none;border-bottom:1px solid var(--bdr)}}
/* GitHub sync */
.gh-btn{background:rgba(255,255,255,.18);border:none;color:#fff;padding:5px 10px;border-radius:8px;cursor:pointer;font-size:.85rem;margin-left:8px;vertical-align:middle}
.gh-btn:hover{background:rgba(255,255,255,.32)}
.gh-panel{display:none;position:fixed;top:54px;right:12px;background:#fff;border:1px solid var(--bdr);border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.18);padding:16px;z-index:200;min-width:265px}
.gh-panel.open{display:block}
.gh-panel h3{font-size:.82rem;font-weight:700;margin:0 0 10px;color:#1a1a2e}
.gh-tok{width:100%;box-sizing:border-box;padding:7px 10px;border:1.5px solid var(--bdr);border-radius:8px;font-size:.82rem;margin-bottom:8px}
.gh-tok:focus{outline:none;border-color:var(--ac)}
.gh-row{display:flex;gap:6px}
.gh-act{flex:1;padding:7px;border:none;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer}
.gh-act.gh-save{background:#4A90E2;color:#fff}
.gh-act.gh-load{background:#f0f4ff;color:#4A90E2;border:1.5px solid #bfdbfe}
.gh-act:hover{opacity:.82}
.gh-toast{position:fixed;bottom:20px;right:20px;background:#1a1a2e;color:#fff;padding:10px 16px;border-radius:10px;font-size:.83rem;z-index:300;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none}
.gh-toast.show{opacity:1;transform:translateY(0)}
.tab-score{font-size:.63rem;font-weight:700;background:#22c55e;color:#fff;border-radius:10px;padding:1px 5px;margin-left:4px;vertical-align:middle}
.card-gh-badge{display:none;font-size:.68rem;font-weight:700;color:#16a34a;margin-top:6px}
.card-gh-badge.visible{display:block}
.card.card-all-done{box-shadow:0 0 0 2px #22c55e}
</style>
</head>
<body>
<header>
  <h1 id="htitle">TOEFL 社会時事学習</h1>
  <button class="back-btn hidden" id="backbtn" onclick="showHome()">← トップへ</button>
  <button class="gh-btn" id="ghBtn" onclick="toggleGHPanel()">☁️</button>
</header>
<div class="gh-panel" id="ghPanel">
  <h3>☁️ GitHub 進捗保存</h3>
  <input class="gh-tok" id="ghTokInput" type="password" placeholder="GitHub Token を入力">
  <div class="gh-row">
    <button class="gh-act gh-save" onclick="manualSaveGH()">保存</button>
    <button class="gh-act gh-load" onclick="manualLoadGH()">読み込む</button>
  </div>
</div>
<div class="gh-toast" id="ghToast"></div>
<div id="home">
  <div class="hero">
    <h2>📖 TOEFL Academic Discussion</h2>
    <p>社会時事テーマを読み、3つの視点を学び、各視点の理解度クイズに挑戦しよう</p>
  </div>
  <div class="grid" id="grid"></div>
</div>
<div id="detail">
  <div class="dhead">
    <div class="dicon" id="dicon"></div>
    <div class="dcat" id="dcat"></div>
    <div class="dtitle" id="dtitle"></div>
    <div class="dtja" id="dtja"></div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="tc active" id="tc-summary"></div>
</div>
<script>
const T=[
{id:"ai",title:"AI & the Future of Work",tja:"AIと働き方の未来",cat:"Technology",icon:"🤖",col:"#4A90E2",
desc:"Will AI create more jobs than it destroys, or is mass unemployment inevitable?",
summary:`<h3>The Scale of Change</h3>
<p>The World Economic Forum's 2023 report estimates AI will <strong>displace 83 million jobs</strong> globally by 2027 while <strong>creating 69 million new ones</strong>—a net loss of 14 million (~2% of global employment). Goldman Sachs (2023) estimates <strong>300 million jobs</strong> globally could be affected, with 18% of work tasks automatable in the near term.</p>
<h3>Who Is Most at Risk?</h3>
<p>Unlike past automation that targeted physical labor, AI targets <strong>cognitive labor</strong>—the skills white-collar workers spent years acquiring. Highest risk: data entry, accounting, customer service, legal research, and increasingly, software development itself.</p>
<h3>Policy Responses</h3>
<p>The EU's <strong>AI Act (2024)</strong> bans high-risk AI uses and requires transparency. The US relies on voluntary guidelines plus $500M in research funding. China targets global AI leadership by 2030. The core challenge: even if AI creates more jobs long-term, displaced workers today cannot immediately become AI engineers.</p>
<div class="kterms"><h4>Key Terms</h4><ul><li>Automation</li><li>Job displacement</li><li>Reskilling</li><li>EU AI Act</li><li>Cognitive labor</li><li>Flexicurity</li></ul></div>`,
persp:[
{t:"Pro-AI: Embrace the Change",tja:"AI推進派",col:"#4A90E2",
story:`<p>At UCSF Medical Center, radiologist Dr. Sarah Chen's team started using Google DeepMind's AI to screen mammograms. The AI catches cancer patterns with 11.5% fewer false negatives than humans alone — but it didn't replace the team. It shifted their work: less routine screening, more complex case judgment, patient counseling, and research. "The AI does the first pass," she says. "We do the nuanced work." By 2023, DeepMind's tool was in use across six NHS hospitals in the UK, and early data showed radiologist job listings had actually <em>increased</em> — because catching more cancers earlier meant more patients needing follow-up care.</p>
<p>A classic historical parallel: when ATMs spread in the 1970s, bank teller jobs were predicted to vanish. Instead, ATMs cut per-branch costs, so banks opened <em>more</em> locations, and teller employment rose for two decades. Workers shifted from cash-handling to sales and relationship roles. The industrial revolution offers an even more dramatic example: the power loom was supposed to destroy textile employment. Instead, cloth became so cheap that demand exploded — and the number of weavers in England <em>tripled</em> over the following century as new markets opened up.</p>
<p>The same pattern is now visible with software developers. GitHub's Copilot AI helps engineers complete tasks <strong>55% faster</strong> — but GitHub reports developer hiring has accelerated, not slowed. The WEF projects a net loss of 14 million jobs by 2027 (roughly 2% of global employment), but also forecasts 69 million new roles in data analysis, AI maintenance, green energy, and care work. In Kenya, AI-powered tutoring platforms like Eneza Education are enabling teachers to reach rural students at scale — creating demand for local teacher trainers, curriculum designers, and community tech support roles that didn't exist five years ago. Historically, every wave of automation has replaced specific tasks while expanding the total volume of economic activity that humans manage.</p>`,
rel:[
{ja:"あなたが毎日使うコンビニのセルフレジを思い浮かべてほしい。確かにレジ係は減った。しかし店員は今、惣菜の品質管理・接客・フードデリバリー対応など、より付加価値の高い仕事をしている。店舗数も増えた。AIも同じパターンをたどると推進派は主張する。",en:"Think of convenience store self-checkouts. Cashier jobs shrank — but staff now handle food quality checks, home delivery coordination, and customer service requiring human judgment. The number of stores actually increased. Pro-AI advocates say this is the historical pattern: automation eliminates routine tasks, humans move up to higher-value work."},
{ja:"銀行のATMが普及した1970〜80年代、「銀行員の仕事が消える」と予測された。実際には銀行員の数は増えた。ATMが現金出納の単純作業を肩代わりしたことで、支店が増え、ローン相談・資産運用など対面サービスが拡大したからだ。",en:"When ATMs spread in the 1970s–80s, experts predicted bank teller jobs would disappear. Instead, the number of bank employees grew — ATMs freed tellers for loan consultations and investment advice, and banks expanded their branches. Automation created more jobs than it displaced in the banking sector."}
],
pros:["ATM paradox: automation created more bank teller jobs, not fewer","AI + human outperforms either alone — medicine, law, and coding all show this","55% developer productivity gain grows the economy, funding new industries and jobs"],
cons:["Net job creation takes decades; displaced workers suffer today, not eventually","New AI jobs cluster in tech hubs — geographically far from displaced workers","Productivity gains mostly flow to company shareholders, not to workers"],
quiz:[
{q:"What change did AI tools bring to Dr. Sarah Chen's radiology team at UCSF?",opts:["AI replaced most radiologists, reducing team size by half","The team shifted from routine screening to complex cases and patient counseling","AI reduced diagnostic accuracy slightly but saved significant time","Radiologists now work alongside AI with no change to their daily roles"],ans:1,exp:"The AI handles the 'first pass' on routine mammogram screening, freeing radiologists for complex judgment, patient communication, and research — a role shift, not job elimination."},
{q:"What actually happened to bank teller employment after ATMs were widely introduced?",opts:["Teller employment fell by 30% within a decade","Teller employment vanished within 20 years","Teller employment rose for two decades as banks opened more branches","Teller employment stayed flat due to union agreements"],ans:2,exp:"ATMs cut per-branch costs, so banks opened more locations. Total teller employment rose — workers shifted from cash-handling to sales roles. This is the core historical analogy Pro-AI supporters use."},
{q:"By how much did GitHub Copilot increase developer task completion speed in studies?",opts:["About 20%","About 35%","About 55%","About 80%"],ans:2,exp:"GitHub's research across 95 professional developers found a 55% speed increase. Pro-AI advocates use this as evidence that AI grows the economic pie rather than merely redistributing it."},
{q:"When you use a convenience store self-checkout, the Pro-AI perspective argues:",opts:["This proves automation eventually eliminates all service jobs","Store staff are freed for higher-value work like food prep, and overall store count has grown","This only benefits store owners, not workers or customers","Self-checkout is acceptable because convenience stores are not high-skill employers"],ans:1,exp:"The Pro-AI view draws a direct parallel to the ATM story: routine task automation (cashiering) frees workers for higher-value roles while cutting costs allows the business to expand, creating net new employment across the sector."},
{q:"The Pro-AI argument that 'productivity gains grow the economic pie' relies on which assumption?",opts:["Companies will voluntarily share productivity gains with workers as higher wages","All displaced workers will naturally transition to AI-related roles","Economic growth historically generates new employment across the broader economy","Governments will redistribute AI profits through aggressive taxation"],ans:2,exp:"The argument relies on historical pattern: productivity growth expands the overall economy, creating new demand, new industries, and new jobs — even if not in the same sector or location as displaced roles."}
]},
{t:"Skeptic: The Risks Are Underestimated",tja:"AI懐疑派",col:"#E24A4A",
story:`<p>Marcus Williams has driven freight trucks in the US Midwest for 22 years. At 47, he earns $65,000/year — comfortable in Dayton, Ohio. But autonomous freight vehicles from Waymo and Aurora could reach commercial scale by 2027–2030. When that happens, 3.5 million US truck drivers face displacement. Unlike the bank teller who shifted from cash-handling to relationship banking, Marcus cannot simply become an AI engineer: the skill gap is not a matter of months of retraining but years of foundational education, at a cost most mid-career workers cannot afford while still paying rent.</p>
<p>This time, AI doesn't just target physical labor — it goes after cognitive work that took years to acquire. In 2023, GPT-4 passed the bar exam in the 90th percentile. AI systems now draft SEC filings, analyze MRI scans, write code, and generate legal briefs. Goldman Sachs estimates 300 million jobs globally could be affected, hitting lawyers, accountants, and radiologists as hard as truck drivers. The industrial revolution unfolded over 80–100 years, allowing generational adaptation; AI's transformation of cognitive labor could happen in <strong>10–15 years</strong> — 6–10 times faster than any previous disruption.</p>
<p>Meanwhile, the gains flow upward with stunning concentration. Nvidia's revenue grew 265% in a single fiscal year (2024) as demand for AI chips exploded. The five largest US tech companies added over $3 trillion in market capitalization in 2023 alone. US median wages, by contrast, have grown just 15% in real terms over the entire past four decades. The historical precedent that "automation eventually creates more jobs" relied on gains being broadly shared through rising wages and expanding consumer purchasing power. If AI's gains stay locked in stock portfolios while displaced workers see no income boost, the virtuous cycle that generated the new jobs may never materialize this time.</p>`,
rel:[
{ja:"45歳の経理担当者を想像してほしい。会計ソフト（freeeやMoneyForward）の進化で、かつて1日かかった仕訳作業が今は30分で終わる。会社は「では半分の人員でいい」と考えるかもしれない。AIエンジニアに転身するには学費と時間が必要だが、その猶予はあるだろうか？",en:"Imagine a 45-year-old bookkeeper. Accounting software has made her day-long data entry tasks take 30 minutes. Her company may reasonably conclude they need half the accounting staff. Retraining as a software developer requires tuition, time, and cognitive adjustment — but at 45, with a mortgage and children, does she have the runway to do it?"},

{t:"Pragmatist: Policy Determines Outcomes",tja:"実用主義派",col:"#11998e",
story:`<p>In 1993, Denmark hit 12% unemployment as factories automated and moved offshore. The political pressure to "protect jobs" was enormous. Instead, Denmark made a counterintuitive bet: rather than trying to stop automation, they redesigned the social contract around it. "Flexicurity" gave companies the freedom to hire and fire easily (eliminating job security), but guaranteed workers 90% of their previous salary for up to two years alongside mandatory retraining (providing income security). The trade-off was explicit: workers gave up the illusion of job protection, but gained real protection against income loss while they adapted.</p>
<p>The results were remarkable. Denmark today has among Europe's lowest long-term unemployment, some of its highest wages, and consistently ranks as one of the world's happiest societies. The average Danish worker changes jobs more frequently than an American — but never fears destitution during the transition. When Lego automated its European manufacturing in the 2000s, Danish workers who were displaced were, within two years, largely employed again — in different industries, but at comparable wages — because the system invested in bridging the gap, not just watching people fall.</p>
<p>Contrast this with what happened in America's Rust Belt when steel mills and auto plants automated in the 1980s. Workers received unemployment for 26 weeks and were largely left on their own. Dayton, Ohio; Youngstown, Pennsylvania; Gary, Indiana — entire cities fell into multigenerational poverty from which they have never fully recovered. Singapore's <strong>SkillsFuture</strong> program offers a modern middle path: every adult citizen receives $500 SGD/year in training credits, usable for anything from coding courses to management certifications. The core pragmatist insight: Denmark and the US have access to the same AI technology. Their outcomes will differ entirely because of policy — not technology.</p>`,
rel:[
{ja:"もし今日あなたが解雇されたとして、日本の雇用保険は最大330日分の給付がある。でもデンマークなら2年間・前職給与の90%が支給され、同時に政府が就労支援プログラムに参加させてくれる。同じAIの波に直面しても、国の制度次第で「再起のしやすさ」がまったく異なる。",en:"If you were laid off today, Japan's unemployment insurance covers up to 330 days. In Denmark, you'd receive 90% of your previous salary for up to two years, with mandatory government retraining program enrollment. Facing the same wave of AI displacement, the policy infrastructure determines how painful the transition is — not the technology itself."},
{ja:"シンガポールの「SkillsFuture」制度では、25歳以上の全市民に政府から学習クレジット（約4万円）が付与される。オンライン講座から職業訓練まで使途は自由だ。AIによるスキル陳腐化が加速する時代に、「学び続けるコスト」を社会が部分的に負担するアプローチだ。",en:"Singapore's SkillsFuture program gives every citizen over 25 a government learning credit (approximately ¥40,000) for approved courses — from online programs to vocational training. In an era where AI accelerates skill obsolescence, Singapore has decided the cost of continuous learning should be partially borne by society, not solely by individuals. This is adaptive-society policy in action."}
],

{q:"Denmark's 'flexicurity' system provides workers who lose their jobs with:",opts:["A guaranteed public sector job within 3 months","Free university education for up to 4 years","90% of previous salary for up to 2 years, with mandatory participation in job training","A lump sum equal to 2 years of salary and no further obligations"],ans:2,exp:"Flexicurity = labor market flexibility (easy for companies to hire and fire) + worker security (90% income replacement for up to 2 years) + active retraining requirement. It decouples job security from income security."},
{q:"Singapore's SkillsFuture program provides:",opts:["Free university education for all Singaporean adults","$500/year in government training credits every adult can use for any career development","Full salary replacement for 1 year for any worker who voluntarily retrains","Tax deductions for companies that send employees to training programs"],ans:1,exp:"SkillsFuture gives every adult Singaporean $500 SGD per year in credits usable for any training — coding, management, vocational skills, languages, etc. It treats continuous upskilling as a permanent feature of modern working life."},

{id:"climate",title:"Carbon Tax & Climate Policy",tja:"炭素税と気候変動対策",cat:"Environment",icon:"🌍",col:"#11998e",
desc:"Should governments tax carbon emissions to fight climate change, even at economic cost?",
summary:`<h3>What Is a Carbon Tax?</h3>
<p>A carbon tax is a fee on the carbon content of fossil fuels. ~70 countries have some form of carbon pricing, covering 23% of global emissions. The logic: when carbon has a price, companies and consumers choose cleaner alternatives. Sweden introduced one in 1991; now at $130/ton, the world's highest. Swedish emissions fell <strong>27%</strong> while GDP grew <strong>75%</strong>.</p>
<h3>The US Approach</h3>
<p>The US has repeatedly failed to pass a carbon tax. The 2022 <strong>Inflation Reduction Act</strong> invested $370B in clean energy subsidies instead — rewarding clean behavior rather than penalizing dirty. The EU launched the <strong>Carbon Border Adjustment Mechanism (CBAM)</strong> in 2023 — a carbon tariff on imports from countries without equivalent pricing — to address carbon leakage.</p>
<div class="kterms"><h4>Key Terms</h4><ul><li>Carbon tax</li><li>Carbon leakage</li><li>CBAM</li><li>Regressive tax</li><li>Carbon dividend</li><li>Inflation Reduction Act</li></ul></div>`,
persp:[
{t:"Market Solution: Tax Carbon Now",tja:"市場メカニズム重視派",col:"#11998e",
story:`<p>In January 2008, British Columbia quietly did what economists had been recommending for decades: it put a price on carbon. Starting at C$10 per ton, rising predictably each year to C$65 by 2022, the tax was paired with a guarantee that every cent of revenue would be returned to citizens as income tax cuts and quarterly rebate cheques. A family of four now receives roughly C$1,120/year back. Because low-income households use less energy as a share of income, <strong>80% of BC households are net financial winners</strong> — they receive more in rebates than they pay in extra fuel costs. Per-capita fuel consumption fell 15% compared to the rest of Canada, and BC's economy grew faster than the national average during the same period.</p>
<p>Sweden offers the most dramatic long-term data point. Introduced in 1991 at the equivalent of $25/ton, Sweden's carbon tax has risen to over $130/ton — the world's highest. Over 33 years, Swedish greenhouse gas emissions have fallen <strong>27%</strong> from 1990 levels. Over the same period, Sweden's GDP has grown by roughly <strong>75%</strong>. This is the most important empirical rebuttal to the argument that ambitious climate policy requires economic sacrifice: Sweden didn't get poorer by pricing carbon. It got richer while decarbonizing.</p>
<p>The reason carbon pricing works better than mandates or subsidies is that it doesn't require government to predict which technology will win. A steel company might switch to green hydrogen; a driver might buy an EV; a homeowner might install a heat pump; a logistics company might redesign delivery routes. All of these responses happen spontaneously once carbon has a cost. Subsidies for specific technologies — like EV rebates — only help if the government correctly guessed which clean solution would win. A carbon price works on every solution at once. British Columbia's experience showed that within three years, heating system upgrades, carpooling apps, and transit ridership all increased — none of them subsidized, all of them responding to price.</p>`,
rel:[
{ja:"ガソリン代が1リットルあたり30円高くなったとしよう。そのお金が全額、あなたの口座に「気候配当」として振り込まれるなら？EV購入者には実質的にお得になり、ガソリン車ユーザーにはコストになる。政府が「EVを買え」と命令せずとも、価格シグナルだけで人々の行動が変わっていく—これが炭素税の発想だ。",en:"Imagine gasoline becomes ¥30/liter more expensive, but that same money is deposited into your bank account as a 'climate dividend.' EV owners effectively profit; gasoline users pay the difference. The government never tells anyone what to drive — the price signal does the work. This is the elegance of a carbon tax: behavioral change through incentive, not mandate."},
{ja:"スウェーデンは1991年に世界初の炭素税を導入し、現在1トンあたり約16,000円（世界最高水準）に達している。それでもスウェーデンの経済成長率はEU平均を上回り続け、同期間に一人あたりCO₂排出量は約75%減少した。「炭素税は経済を壊す」という主張をスウェーデンのデータは否定している。",en:"Sweden introduced the world's first carbon tax in 1991, now at roughly ¥16,000 per ton of CO₂ — the highest rate globally. Yet Sweden's GDP growth has consistently exceeded the EU average over this period, while per-capita CO₂ emissions fell by ~75%. Sweden is the empirical answer to the claim that carbon taxes destroy economies."}
],
pros:["Market-efficient: businesses choose their own cheapest path to reduce emissions","Revenue recycling as carbon dividends makes 80% of households net financial winners","33-year track record in Sweden proves emissions fall without damaging economic growth"],
cons:["Politically toxic: France's Yellow Vest protests; Australia repealed its carbon tax after one term","Carbon leakage: industries may relocate to countries without carbon pricing, shifting emissions globally","Setting the 'correct' price level is technically and politically contentious"],
quiz:[
{q:"In British Columbia's carbon tax system, what happens to the tax revenue?",opts:["It funds new public transportation infrastructure","It is returned to citizens as income tax cuts and quarterly climate rebates","It is invested in renewable energy projects chosen by the government","It goes into a general revenue fund used for government spending"],ans:1,exp:"BC's 'revenue-neutral' model returns all carbon tax revenue directly to citizens. Because low-income households use less energy proportionally, 80% of BC households receive more in rebates than they pay in higher fuel costs — making the tax progressive, not regressive."},
{q:"Sweden has operated a carbon tax since 1991. By 2024, what has happened to Swedish emissions and GDP?",opts:["Emissions fell 27% and GDP grew 75%","Emissions fell 50% and GDP grew 30%","Emissions fell 10% and GDP grew 100%","Emissions fell 27% but GDP grew only 10%"],ans:0,exp:"Sweden's 33-year experiment is the strongest proof-of-concept: a $130/ton carbon tax (world's highest) has reduced emissions 27% from 1990 levels while GDP grew 75% — directly refuting the claim that ambitious climate policy requires economic sacrifice."},
{q:"If gasoline prices rise due to a carbon tax, the market-solution perspective would say this:",opts:["Is unfair because it burdens all drivers equally regardless of income","Signals to drivers, automakers, and energy companies to shift toward cleaner alternatives, with no government mandate needed","Will cause economic recession by raising transportation costs for all businesses","Is only acceptable if the government also provides free public transportation"],ans:1,exp:"The price signal is exactly the point: no mandate needed. Higher fuel costs make EVs more competitive, public transit more attractive, and efficient logistics routes more valuable — the market routes around the higher cost through innovation and behavior change."},
{q:"Why do carbon tax advocates argue that a well-designed dividend system benefits low-income households most?",opts:["Low-income households receive a larger absolute dividend payment","Low-income households spend less on energy as a share of income, so the flat dividend exceeds their extra costs","Low-income households are exempt from the carbon tax on essential purchases","The government supplements the dividend with extra payments for low-income families"],ans:1,exp:"Key insight: a billionaire and a low-income worker receive the same flat dividend, but the billionaire has a much bigger carbon footprint (private jets, large homes, high consumption). The low-income worker pays less in carbon taxes but gets the same rebate — net positive."},
{q:"The 'carbon leakage' problem refers to which risk of national carbon pricing?",opts:["CO₂ leaking from underground carbon capture storage sites","Energy-intensive industries relocating to countries with no carbon price, shifting emissions without reducing them","Governments collecting carbon tax revenue but spending it on non-climate purposes","Carbon credits being traded fraudulently between companies"],ans:1,exp:"Carbon leakage is the fatal flaw of unilateral carbon pricing: if Germany prices carbon and China doesn't, German steel producers may lose business to Chinese ones — global emissions don't fall, they just move. This is why the EU designed CBAM to charge a carbon tariff at the border."}
]},
{t:"Social Justice First",tja:"社会的公正重視派",col:"#E2844A",
story:`<p>In November 2018, nurse Fatima Okonkwo joined France's "Gilets Jaunes" (Yellow Vest) protests wearing a fluorescent safety vest — the symbol of manual workers and delivery drivers. The trigger was a 6-cent-per-liter fuel tax increase that President Macron framed as climate policy. Fatima drives 45 minutes each way to work because no train reaches her suburb outside Lyon. For her, this wasn't climate policy — it was a monthly surcharge on getting to her job. "Paris has the Métro," she told a reporter. "We have our cars." Within weeks, over 300,000 protesters had blocked roundabouts and toll booths across France. Macron suspended the tax, then cancelled it permanently. One fuel tax, one month, one movement — climate policy defeated.</p>
<p>The structural problem runs deep. US data shows low-income households spend <strong>8–10% of their income on energy</strong> — transportation and home heating — compared to 2–3% for high-income households. A flat $50-per-ton carbon tax that raises gas prices by $0.45/gallon takes proportionally far more from a Walmart cashier than from a tech executive. Electric vehicles — the supposedly obvious solution — require $30,000–50,000 upfront and a home charger, putting them financially out of reach for the half of Americans who rent.</p>
<p>Australia's carbon tax story is equally instructive. Introduced in 2012 under Prime Minister Julia Gillard, it was a well-designed scheme with low-income compensation built in. But the conservative opposition ran a relentless campaign of "household cost of living" messaging, and the tax was repealed just two years later. The pattern repeats: in politically contested democracies, climate policy that visibly raises costs for working-class households — even when offset — creates an attack surface that opponents will exploit until it collapses. Climate advocates who dismiss equity concerns as secondary are, in practice, building policies that don't survive contact with democracy.</p>`,
rel:[
{ja:"地方に住む人を想像してほしい。電車はない。車が唯一の移動手段だ。炭素税でガソリンが高くなっても、EVを買う貯金はない。一方、都市部の高収入者は電車通勤で影響ゼロ。「脱炭素」の痛みが、最も声の小さい人たちに集中する—これが社会的公正派が警告することだ。",en:"Imagine someone in rural Akita — no train, car is the only option. A carbon tax raises gasoline prices, but an EV is unaffordable. Meanwhile, a high-income Tokyo professional commuting by subway feels zero impact. The cost of decarbonization falls heaviest on those least able to adapt and least responsible for cumulative emissions — this is the social justice critique of blunt carbon pricing."},
{ja:"フランスで2018年に「黄色いベスト運動」が起きた。マクロン政権が炭素税増税でディーゼルを値上げしたところ、地方在住の労働者層が全国でデモを起こした。政府は増税撤回を余儀なくされた。炭素税の設計が公正でなければ、民主主義的な反発で政策自体が覆されうる。",en:"In 2018, France's Yellow Vest movement erupted after President Macron raised diesel fuel taxes as a carbon measure. Rural working-class drivers who couldn't use public transit took to the streets nationwide, forcing Macron to reverse the policy. An inequitably designed carbon tax isn't just an ethical problem — it may be politically unsustainable in democracies."}
],

{q:"The social justice perspective argues that climate policy must invest in which areas to be equitable?",opts:["Only in green technology startups that will eventually lower prices for everyone","Public transportation, weatherizing low-income homes, and green jobs in fossil-fuel-dependent communities","Direct cash payments to all citizens regardless of their carbon footprint","Research into carbon capture technology that does not require behavior change"],ans:1,exp:"The justice perspective argues revenue must be used not just for climate goals but to actively reduce vulnerability: affordable transit alternatives, home energy efficiency for low-income households, and economic development in communities that currently depend on fossil fuel industries."},

{q:"Which of the following best represents the social justice perspective on electric vehicles?",opts:["EVs are the ideal climate solution and subsidies should make them affordable for everyone","EVs are too expensive for most working-class families, so policy must invest in public transit and other alternatives first","EVs are unnecessary because hybrid vehicles offer adequate emission reductions","EV adoption should be mandated, with the government providing financing for all households"],ans:1,exp:"EVs require $30,000-50,000 upfront — inaccessible to most working-class families even with subsidies. The social justice view argues policy must prioritize affordable transit, urban planning, and home energy efficiency that help lower-income people, not just subsidize technologies for those who can already afford them."}

{t:"Global Coordination Is Essential",tja:"国際協調重視派",col:"#764BA2",
story:`<p>In 2009, ArcelorMittal's steel mill in Düsseldorf, Germany was paying €25 per ton in carbon costs under the EU's Emissions Trading System. Its competitor in Shanghai making identical structural steel for the same European construction buyers paid exactly zero. The math was straightforward: the German plant was at a structural cost disadvantage on every tonne shipped. Over the next five years, it lost contracts, reduced shifts, and laid off workers. The Chinese mill expanded capacity. Total global steel production was unchanged. Global steel emissions were essentially unchanged. But German workers lost jobs, and the EU's climate ambition had successfully exported carbon emissions to a country with no carbon price. This is carbon leakage — not just an academic concern, but a mechanism that has directly undermined European climate policy for a decade.</p>
<p>The EU's response arrived in 2023: the <strong>Carbon Border Adjustment Mechanism (CBAM)</strong>. Starting in 2026, importers of steel, cement, aluminum, fertilizers, and electricity into the EU must pay a carbon fee equivalent to what EU producers pay domestically. If you make steel in China with no carbon cost and want to sell it in Germany, you pay the carbon cost at the border. CBAM immediately changes the strategic calculus for every major exporting nation: if you want access to the EU's $15 trillion economy, your industries face the same carbon price EU industries face.</p>
<p>The IMF took this logic further in 2021, proposing a <strong>Global Carbon Price Floor</strong>: $75/ton for wealthy nations, $50/ton for emerging economies, $25/ton for developing nations by 2030. The differentiated levels acknowledge that not every country has equally contributed to historical emissions or has equal capacity to pay for the transition. But without some minimum global floor, countries willing to pollute cheaply will always undercut those that price carbon responsibly — turning climate ambition into competitive disadvantage. As EU trade commissioner Valdis Dombrovskis put it: "We cannot decarbonize Europe while importing carbon from elsewhere."</p>`,
rel:[
{ja:"格安ファストファッションを思い浮かべてほしい。海外の工場で大量のCO₂を排出して作られた服が、国内ブランドより安く売られる。国内が炭素税を払っていても、輸入品にはその負担がない。CBAMは「輸入品にも同じ炭素コストを課す」仕組みで、この不公平を是正しようとするものだ。",en:"Picture fast fashion: clothes made in factories with no carbon cost overseas sell more cheaply than domestic alternatives that pay carbon taxes. CBAM — Carbon Border Adjustment Mechanism — fixes this by charging imports an equivalent carbon cost at the border. Without it, domestic carbon pricing just relocates emissions abroad rather than reducing them."},
{ja:"日本の鉄鋼・セメント産業は炭素税導入に最も強く反対してきた。「炭素価格が上がれば、安価な輸入品に負ける」という主張だ。しかしCBAMがあれば、輸入品にも同じ炭素コストが課される。国内産業が脱炭素化に投資しつつ、輸入品競合から守られる—「競争力と脱炭素の両立」というアプローチの核心だ。",en:"Japan's steel and cement industries have strongly opposed domestic carbon pricing, arguing higher costs would make them uncompetitive against imports from countries with no carbon rules. CBAM eliminates this 'carbon leakage' problem: imports face the same cost at the border. Domestic industries can invest in decarbonization without being undercut — this is the pragmatic 'level playing field' answer."}
],

quiz:[
{q:"The Düsseldorf steel mill example illustrates which problem with national carbon pricing?",opts:["National carbon taxes always lead to economic recession in manufacturing","Carbon leakage: production moves to countries without carbon costs, so global emissions don't fall","German steel workers are particularly resistant to climate policy changes","European carbon prices are set too low to drive real behavioral change"],ans:1,exp:"Carbon leakage is the key concept: when Germany prices carbon, German steel producers face costs their Chinese competitors don't. Production shifts to China; global emissions don't fall — they just happen in a different country. The planet is no better off."},
{q:"The EU's Carbon Border Adjustment Mechanism (CBAM) addresses carbon leakage by:",opts:["Banning imports of all goods from countries without carbon pricing","Subsidizing EU producers to offset their carbon costs and remain competitive","Charging import fees on carbon-intensive goods from countries without equivalent carbon pricing","Negotiating bilateral carbon pricing agreements with major trading partners"],ans:2,exp:"CBAM is essentially a carbon tariff: importers to the EU must pay the same carbon cost as EU producers pay domestically. This removes the competitive advantage of exporting from countries with no carbon price, addressing the Düsseldorf problem directly."},
{q:"When you buy a cheap imported product made with high carbon emissions abroad, the global coordination perspective argues:",opts:["Consumer choices like this are too small to matter for climate policy","This is a feature of free trade that should not be restricted for climate reasons","The carbon cost of that production should be reflected in the import price — via a border adjustment mechanism","Import tariffs for climate reasons would start trade wars that are worse than climate change"],ans:2,exp:"CBAM's core logic: if a t-shirt made overseas generates 5kg of CO₂ with no carbon cost paid, but a domestic equivalent pays a carbon tax, the import price is artificially low. A carbon border adjustment levels this playing field and prevents carbon leakage through consumer goods."},
{q:"The IMF's proposed Global Carbon Price Floor would require wealthy nations to charge a minimum of:",opts:["$25 per ton of CO₂ by 2030","$50 per ton of CO₂ by 2030","$75 per ton of CO₂ by 2030","$130 per ton of CO₂ by 2030"],ans:2,exp:"The IMF proposed $75/ton for wealthy nations, $50/ton for emerging economies, and $25/ton for developing nations by 2030. The differentiation respects different development levels while creating globally consistent incentives — addressing leakage without demanding equal sacrifice from unequal countries."},
{q:"The global coordination argument's weakness — that 'wealthy nations have a credibility gap' — means:",opts:["Wealthy nations cannot afford to implement global carbon pricing","Many wealthy nations are not meeting their own existing climate commitments, undermining their moral authority to demand others comply","Wealthy nations have historically been the largest polluters and so should pay more","International climate negotiations consistently fail because wealthy nations dominate them"],ans:1,exp:"The credibility problem: if the US, EU, and others ask developing countries to accept a global carbon minimum while themselves falling short of Paris Agreement targets, they lack the moral and diplomatic standing to lead. 'Do as I say, not as I do' rarely works in international negotiations."}
]}
]},

{id:"ubi",title:"Universal Basic Income",tja:"ユニバーサル・ベーシックインカム",cat:"Economics",icon:"💰",col:"#9B59B6",
desc:"Should every citizen receive regular unconditional cash payments from the government?",
summary:`<h3>What Is UBI?</h3>
<p>UBI is a government program giving every adult citizen regular, unconditional cash—regardless of employment or income. Pilots in Finland, Kenya, Canada, and several US cities have provided rare empirical data. Finland's 2017–2018 pilot (€560/month to 2,000 unemployed citizens) found higher wellbeing and slightly <strong>higher employment</strong> vs. control group. Stockton CA's SEED program ($500/month) saw full-time employment among recipients rise from <strong>28% to 40%</strong>.</p>
<h3>The Cost Problem</h3>
<p>A US-wide $1,000/month UBI for all adults = approximately <strong>$3 trillion/year</strong> — ~75% of the entire federal budget. This fiscal reality is why most economists who favor the concept propose targeted versions. Alaska's Permanent Fund Dividend (~$1,000–2,000/resident/year from oil revenues) is the longest-running real-world example, operating since 1982.</p>
<div class="kterms"><h4>Key Terms</h4><ul><li>UBI</li><li>Poverty trap</li><li>Means-tested benefits</li><li>Negative income tax</li><li>Alaska Permanent Fund</li><li>Automation dividend</li></ul></div>`,
persp:[
{t:"Pro-UBI: Freedom and Security",tja:"UBI推進派",col:"#9B59B6",
story:`<p>In 2019, Josephine Lott was working part-time in a Stockton, California retail store while providing primary care for her elderly mother. Her household budget had almost no slack: a single car repair could spiral into missed shifts, missed shifts could mean short rent, short rent meant anxiety that consumed her mental bandwidth day and night. When Stockton's SEED program started depositing $500/month into her account — no questions asked, no conditions attached — she didn't spend it on luxuries. She kept her car maintained. She could reliably get to work. She stopped missing appointments. Within a year, she moved to full-time employment and enrolled in a community college accounting course. "It wasn't a handout," she told researchers. "It was a foothold." SEED data: full-time employment among recipients rose from 28% to 40%, compared to 25% to 37% in the control group.</p>
<p>The mechanism makes scientific sense. Nobel Prize-winning economist Abhijit Banerjee's research found that financial scarcity doesn't just limit what people can buy — it limits cognitive capacity. The mental bandwidth consumed by chronic financial stress ("putting out fires") genuinely reduces people's ability to make good long-term decisions. In this sense, a guaranteed income isn't charity — it's the removal of an invisible tax on poor people's attention. Finland's 2017–2018 pilot told the same story: 2,000 unemployed citizens received €560/month unconditionally. After two years, recipients had higher wellbeing scores and were marginally <em>more</em> employed than the control group — the predicted "laziness effect" failed to appear in any major pilot study.</p>
<p>GiveDirectly, which provides direct cash transfers to extremely poor households in Kenya, has tracked recipients for up to a decade. Three years after receiving cash, recipients had more assets, more food security, more psychological wellbeing, and higher earnings. Remarkably, for every $1 given in transfers, the surrounding local economy received approximately $2.40 in total economic activity — because recipients spent at local businesses, which hired more staff, who spent locally in turn. As AI automation accelerates and displaces cognitive labor at unprecedented scale, UBI proponents argue these pilots have proven the concept. The only question left is whether societies will choose to fund it.</p>`,
rel:[
{ja:"フリーランスのイラストレーターを想像してほしい。本当はオリジナル作品を作りたいが、家賃の心配があるから安定した企業案件ばかり受けている。月10万円の基本収入があったら、リスクを取って創作活動に挑戦できるかもしれない。UBI推進派は「不安がなくなれば、人はより挑戦的になれる」と主張する。",en:"Imagine a freelance illustrator who wants to develop her own original style, but rent anxiety means she fills her calendar with safe corporate contracts. A monthly ¥100,000 basic income removes the floor she fears falling through. Pro-UBI advocates argue: security doesn't create laziness — it enables the risk-taking that our current system economically punishes."},
{ja:"カナダのオンタリオ州で2017〜19年に実施されたUBI実験では、受給者の就労率は下がらず、精神的健康の改善・高校中退率の低下・医療費の節約が観測された。「働く意欲がなくなる」という予測は実証されなかった。フィンランドでも同様の実験で失業者の就職率・幸福度ともに改善した。",en:"Ontario, Canada's UBI pilot (2017–19) found that recipients did not stop working. Researchers observed improved mental health, lower dropout rates, and reduced medical costs. The prediction that people would become lazy was not confirmed. Finland's UBI experiment similarly showed unemployed recipients finding jobs at higher rates and reporting greater wellbeing than the control group."}
],
pros:["Stockton pilot: employment rose 28%→40% — directly refutes the 'people will stop working' argument","Eliminates the poverty trap: working more always means more total income, unlike means-tested benefits","Provides economic floor for AI-displaced workers without requiring a new bureaucracy to administer"],
cons:["A meaningful universal UBI costs $3 trillion/year in the US — fiscally prohibitive without major tax increases","Even with good design, may reduce work incentives at the margin for some secondary earners","As a flat payment, may actually be less helpful than targeted support for the most severely vulnerable"],
quiz:[
{q:"What did Josephine Lott from the Stockton SEED program use her $500/month primarily for?",opts:["Non-essential spending — which critics cited as wasteful","Her car — needed for commuting to work and taking her mother to medical appointments","Starting a small business that eventually hired two more employees","Paying off student loan debt she had accumulated in college"],ans:1,exp:"Josephine used the cash for her car — a practical necessity for work and caregiving. This illustrates the Pro-UBI argument: recipients invest in the things they know will help them most, rather than bureaucrats deciding on their behalf. She also moved to full-time work and started community college."},
{q:"The Stockton SEED program found that full-time employment among UBI recipients, compared to a control group:",opts:["Fell significantly — confirming concerns about work disincentives","Stayed roughly the same as the control group","Rose from 28% to 40%, higher than the control group's rise","Rose slightly but the difference was not statistically significant"],ans:2,exp:"Full-time employment among SEED recipients rose from 28% to 40%. The control group's employment also rose (25% to 37%), but recipients rose faster. This directly contradicts the most common anti-UBI argument — that unconditional cash makes people stop working."},
{q:"The 'poverty trap' problem that UBI is designed to solve refers to:",opts:["Poor countries being unable to attract the investment needed to escape poverty","Low-income workers losing benefits when they earn more, creating a financial penalty for working harder","Poverty leading directly to poor health outcomes, creating a cycle that is hard to break","AI automation disproportionately targeting low-wage workers"],ans:1,exp:"Means-tested welfare creates a trap: earn $1 more and lose $1 (or more) in benefits. The effective marginal tax rate can exceed 80% for low-income workers — a disincentive to seek higher pay or more hours. UBI eliminates this because the payment is unconditional: working more always means more total income."},
{q:"For a freelancer or creative worker, the Pro-UBI argument would specifically emphasize which benefit?",opts:["The freelancer could stop working and live on UBI alone, pursuing pure creative work","A guaranteed income floor allows the freelancer to take creative and entrepreneurial risks they'd otherwise avoid","The freelancer would receive more than a salaried employee because they have no employer contributions","UBI would replace all professional development subsidies for freelancers"],ans:1,exp:"This is one of the Pro-UBI movement's most compelling arguments: guaranteed income enables risk-taking. Currently, financial insecurity forces freelancers and entrepreneurs to take low-risk, low-reward work. A basic income floor makes it safe to invest in higher-potential, riskier creative or entrepreneurial ventures."},
{q:"Which Nobel Prize-winning economist's research on poverty supports the Pro-UBI claim that financial insecurity reduces cognitive performance?",opts:["Milton Friedman — who argued negative income tax achieves the same result more efficiently","Abhijit Banerjee — whose research showed scarcity limits not just purchasing but also decision-making capacity","Paul Krugman — who argued UBI is the most efficient anti-poverty intervention","Joseph Stiglitz — who showed inequality reduces overall economic growth"],ans:1,exp:"Abhijit Banerjee (2019 Nobel Prize winner) found that financial scarcity doesn't just limit what people can buy — it limits how well they can think. The mental bandwidth consumed by financial stress ('putting out fires') leaves less cognitive capacity for long-term planning and decision-making."}
]},
{t:"Anti-UBI: Costly and Counterproductive",tja:"UBI反対派",col:"#E24A4A",
story:`<p>Andrew Yang's 2020 US presidential campaign crystallized the UBI debate when he proposed $1,000/month for every American adult — his "Freedom Dividend." But the arithmetic that excites UBI enthusiasts is also its most serious obstacle. The calculation: $1,000 × 12 months × 260 million US adults = <strong>$3.12 trillion per year</strong>. The entire US federal discretionary budget — defense, education, infrastructure, science, and everything else — is approximately $1.7 trillion. True universal UBI costs roughly <em>double</em> all other discretionary spending combined. Yang proposed funding it partly by replacing existing welfare programs, but disability advocates raised an immediate objection: many severely vulnerable people currently receive $1,500–$3,000/month in targeted support combining disability insurance, food assistance, and housing vouchers. A flat $1,000 replacement would cut their total support dramatically — and unconditional income provides no special housing or in-kind services that some people genuinely need.</p>
<p>Beyond the fiscal math lies a deeper philosophical concern. Study after study finds that employment contributes to life satisfaction through channels entirely separate from income: daily structure, social connection, a sense of purpose and identity, professional accomplishment. The countries with the highest life satisfaction aren't those with the most generous welfare payments — they're those with the highest labor force participation and the strongest workplace cultures. Robert Putnam's research on social capital shows that when working-age populations leave the labor force, communities experience rising loneliness, declining civic participation, and weaker social trust. Critics ask: do we really want to design a society where a large fraction of working-age adults have no reason to get up and engage with others on a structured basis?</p>
<p>The "fiscal efficiency" argument reinforces this: a $3 trillion annual budget spent universally gives the same $1,000 to a billionaire, a single mother of three, a recent graduate, and a severely disabled veteran. The billionaire doesn't need it. The disabled veteran needs far more. A $3 trillion budget spent targeted could provide $5,000/month to the 50 million most vulnerable Americans — five times more to those who actually need it. Giving Elon Musk $12,000/year in "basic income" while giving a disability recipient less than their current support isn't progressive policy — it's a category error about what social insurance is for.</p>`,
rel:[
{ja:"「なぜ孫正義さんにも月10万円を払うの？」という素朴な疑問が、UBI反対派の核心を突く。全員に一律に配るということは、最も必要としている人への支援が薄まるということだ。障害を抱えた人、介護が必要な高齢者—彼らには月10万円では全然足りない。限られた財源を「全員に薄く」より「必要な人に厚く」使うべきでは？",en:"'Why should Masayoshi Son receive ¥100,000 per month?' is the core anti-UBI intuition. Universality means the money is spread thin. People who genuinely can't work — those with severe disabilities, people requiring intensive care — need far more than ¥100,000 monthly. Spending limited funds universally means inadequate support for those with the greatest need."},
{ja:"1970年代にニクソン政権が負の所得税の導入を試みたとき、実験データで女性受給者の離婚率がわずかに上昇した（経済的自立が選択肢を広げたため）。これが「家族の崩壊を招く」という政治的攻撃に使われ、法案は廃案になった。UBI反対派は「大規模な所得移転は予測不能な行動変化を引き起こす」という不確実性も論拠にする。",en:"When Nixon's administration attempted a Negative Income Tax in the 1970s, experimental data showed a slight increase in divorce rates among female recipients (greater financial independence expanded their options). This was framed as 'UBI destroys families' and helped kill the bill. Anti-UBI critics use this to argue that large-scale income transfers produce hard-to-predict second-order behavioral changes that small pilot studies fail to capture."}
],
pros:["Correctly identifies the fiscal reality: $3 trillion/year is genuinely prohibitive without major economic restructuring","Highlights that targeted programs (disability, housing vouchers) serve the most vulnerable more efficiently than flat payments","Raises the legitimate question of work as a source of social identity and community, not just income"],

{q:"Andrew Yang's proposed $1,000/month 'Freedom Dividend' for all Americans would cost approximately:",opts:["About $500 billion per year","About $1.5 trillion per year","About $3 trillion per year","About $5 trillion per year"],ans:2,exp:"$1,000 × 12 months × ~260 million US adults = approximately $3.12 trillion annually. For context, the entire US federal discretionary budget (defense, education, infrastructure, etc.) is about $1.7 trillion — making true universal UBI roughly double what the US currently spends on all discretionary programs."},
{q:"Disability advocates objected to Yang's proposal to fund UBI by replacing existing welfare programs because:",opts:["They preferred a higher payment amount of $2,000/month","Many severely disabled people receive far more than $1,000/month in targeted support — a flat replacement would hurt them","They believed the money should come from higher corporate taxes, not welfare reallocation","They objected to the work requirements Yang attached to the Freedom Dividend"],ans:1,exp:"This is the anti-UBI argument's strongest point: a flat $1,000 payment is far less than what severely vulnerable people currently receive through targeted programs. Replacing disability insurance, housing vouchers, and specialized support with a flat $1,000 would leave the most vulnerable worse off."},
{q:"Beyond income, the anti-UBI perspective argues that traditional employment provides:",opts:["Skills that cannot be learned outside the workplace","Identity, social structure, and community that unconditional income cannot replace","Better healthcare outcomes due to employer-provided insurance","The only politically legitimate basis for receiving government support"],ans:1,exp:"Anti-UBI advocates argue work provides non-financial goods that matter deeply: social connection, daily structure, a sense of purpose and identity. The concern isn't purely laziness — it's whether communities of working-age people without employment develop meaningful social lives and civic participation."},
{q:"Which of the following represents the most efficient use of limited public funds, according to the anti-UBI perspective?",opts:["$1,000/month to every citizen including billionaires","Targeted programs like disability insurance, housing vouchers, and food assistance that focus on specific needs","A lower universal payment of $300/month that is more fiscally sustainable","An earned income tax credit that supplements wages for low-income workers only"],ans:1,exp:"The anti-UBI argument: precision tools (disability insurance, food assistance, housing vouchers) reach people with specific needs at appropriate levels. A universal flat payment dilutes resources by giving equal amounts to those with very different needs — including those who need nothing."},
{q:"The anti-UBI argument's weakest point, given available evidence, is:",opts:["The fiscal cost calculation — $3 trillion/year is actually affordable with moderate tax increases","The claim that people will stop working if given unconditional income — pilot data consistently shows the opposite","The comparison to existing welfare programs — most targeted programs have been very effective","The argument about work providing identity — most people would prefer guaranteed income to precarious employment"],ans:1,exp:"The 'laziness' prediction is the anti-UBI argument's most empirically vulnerable point. Every major pilot (Stockton, Finland, Kenya, Canada) has found that unconditional cash does not reduce employment and often increases it. The fiscal cost concern is more credible, but the behavioral prediction has been repeatedly disproven by data."}
]},
{t:"Targeted Basic Income: The Middle Path",tja:"段階的導入派",col:"#F39C12",
story:`<p>In 1969, President Nixon's administration drafted a law that would have fundamentally changed American poverty policy. Designed by economist Milton Friedman and endorsed across ideological lines, the <strong>Family Assistance Plan</strong> was essentially a Negative Income Tax: instead of giving the same cash payment to every citizen including billionaires, it would top up incomes only below a threshold. If you earned $5,000/year and the floor was $8,000, you'd receive $3,000. As you earned more, the supplement would taper — but at a rate slow enough that working more always left you better off (eliminating the poverty trap). The Senate Finance Committee passed it twice. It died in the full Senate in 1972 by a narrow margin. Half a century later, economists on both left and right still cite it as the road not taken.</p>
<p>Today's Earned Income Tax Credit (EITC) is the closest surviving descendant of that idea. It provides a tax rebate to low-income working families — essentially a targeted income supplement funded by the tax system. Nobel laureate Paul Krugman has called it "the most successful anti-poverty program in decades." Crucially, its design preserves work incentives: you only receive it if you're working, and earning more always means more total income. Over 25 million US households receive it annually. Child poverty rates in states with the most generous EITC supplements run significantly below national averages.</p>
<p>Alaska takes the logic a step further. Since 1982, the <strong>Alaska Permanent Fund Dividend</strong> has paid every resident — including children — an annual cash dividend from oil revenues, ranging from $1,000 to $2,000 per person. No strings. No conditions. No bureaucracy to prove you qualify. Over 40 years, it has not reduced Alaskan labor force participation or created measurable dependency. It's simply a modest share of a publicly owned resource distributed to its owners — the citizens of Alaska. For AI-displaced workers, the targeted approach extends this logic: impose a levy on AI-derived productivity gains, and use the revenue to fund transition support specifically for workers whose jobs were automated. Those who capture the upside help shoulder the cost of those who bear the downside.</p>`,
rel:[
{ja:"アルバイトをしている人が「収入が少し増えると手当が全部カットされる」という不合理に直面することがある—これが貧困の罠だ。負の所得税はこれを解決する。一定収入以下の人に補助金を出し、収入が増えるにつれて補助が減る（でも手取りは必ず増える）仕組みだ。働けば必ずトクになる設計—これが中間的アプローチの核心だ。",en:"A part-time worker faces a cruel arithmetic: earning ¥10,000 more triggers a ¥15,000 benefit cut, leaving her worse off for working harder — the poverty trap. The Negative Income Tax eliminates it: benefits phase out gradually as income rises, always ensuring that an additional yen earned means an additional yen in your pocket. Work always pays — the math is structurally guaranteed."},
{ja:"アメリカのEITC（勤労所得税額控除）は負の所得税の実例だ。働く低所得者が確定申告すると、政府から税還付ではなく「補助金」を受け取れる。年間1,000億ドル以上を配布し、約500万人を貧困線以上に引き上げている。「全員に配るUBI」より「働く低所得者を支援するEITC」の方が費用対効果が高いという主張の根拠だ。",en:"The US Earned Income Tax Credit (EITC) is a working example of NIT logic: low-income workers file taxes and receive a government supplement — not just a refund, but additional money. It distributes over $100 billion annually and lifts approximately 5 million people above the poverty line each year. Pragmatists cite it as proof that targeted support for working people achieves more poverty reduction per dollar than universal payments to everyone."}
],
pros:["Fiscally realistic: targets resources to those who need them, not to billionaires","Negative income tax preserves work incentives better than a flat universal payment","Alaska model proves an automatic dividend can operate successfully for decades without creating dependency"],
cons:["'Targeted' programs often face political erosion — means-testing creates weaker coalitions than universal programs","Requires bureaucracy to determine eligibility, losing some of UBI's administrative simplicity","May not provide the universal floor needed if AI eventually displaces employment at very large scale"],
quiz:[
{q:"Milton Friedman's 'Negative Income Tax' — the intellectual predecessor to UBI — would work by:",opts:["Taxing all income above the poverty line at 100% to fund payments to those below it","Topping up incomes below a threshold with government payments that taper off as earnings rise","Giving every citizen a fixed payment and recovering it from high earners through income tax","Providing unconditional payments only to people currently unemployed or below the poverty line"],ans:1,exp:"The Negative Income Tax tops up low incomes to a minimum threshold, with the supplement gradually phasing out as earnings rise — but always ensuring that earning more means more total income. This preserves work incentives while guaranteeing a minimum standard of living. The Earned Income Tax Credit is a partial implementation."},
{q:"Alaska's Permanent Fund Dividend, the longest-running real-world basic income example, is notable because:",opts:["It is funded by a state income tax that redistributes from wealthy to poor Alaskans","It has operated since 1982, paying every resident $1,000-2,000/year from oil revenues without reducing employment","It is means-tested, going only to Alaskans whose income falls below a certain threshold","It was recently doubled and extended to cover healthcare costs as well as cash payments"],ans:1,exp:"Alaska's Permanent Fund has distributed an annual dividend to every resident (including children) since 1982 — over 40 years. It's funded by investment returns on oil revenues, has not reduced labor force participation, and is broadly popular. It demonstrates that an automatic dividend can operate sustainably for decades."},
{q:"The 'targeted basic income' perspective on funding an AI-displacement support program would most logically support:",opts:["Printing money to fund UBI without raising taxes","A tax on AI-derived productivity gains, making companies that benefit from automation help fund transition support","Cutting defense spending to fund retraining programs for displaced workers","Requiring workers to save a portion of their wages into personal displacement insurance accounts"],ans:1,exp:"The principle of targeted basic income: connect the source of the problem (AI automation creating profits for tech companies) to the cost of the solution (supporting displaced workers). A tax on AI productivity gains is more politically coherent than general tax increases because it clearly links who benefits to who pays."},
{q:"The poverty trap that targeted basic income is designed to eliminate happens when:",opts:["Low-income workers are geographically trapped in regions with few job opportunities","Earning more money causes a worker to lose benefits, so their total income barely increases or even falls","Government assistance programs spend more on administration than they distribute to recipients","Automated hiring systems exclude low-income workers from high-paying job applications"],ans:1,exp:"Means-tested benefits create a poverty trap: earn $1 more and lose $1 (or more) in benefits. The marginal tax rate can exceed 80% for low-income workers — a powerful disincentive to seek higher pay or more hours. Targeted basic income designed like a Negative Income Tax eliminates this: working more always increases total income."},
{q:"Compared to universal UBI, the targeted basic income approach has which key advantage?",opts:["It is more politically popular because everyone receives something","It is simpler to administer because no means-testing is required","It directs limited fiscal resources to those who need them most, without payments to wealthy individuals","It provides a larger payment to each recipient because the total budget is not diluted universally"],ans:2,exp:"The core efficiency argument for targeting: a fixed budget ($300 billion, say) can provide $300/month to 83 million low-income people, or $100/month to everyone. The targeted version provides 3x more support to those who actually need it. The tradeoff is administrative complexity and political sustainability."}
]}
]},

{id:"socialmedia",title:"Social Media Regulation",tja:"SNS規制",cat:"Society",icon:"📱",col:"#E91E8C",
desc:"Should governments regulate social media companies to curb misinformation and protect users?",
summary:`<h3>The Problem</h3>
<p>Social media platforms depend on maximizing engagement, and the most engaging content is often the most emotionally provocative. Studies show false news spreads <strong>6x faster</strong> on Twitter than true news. During COVID-19, vaccine misinformation measurably contributed to lower vaccination rates. US Surgeon General Vivek Murthy declared social media a "profound risk" to adolescent mental health in 2023.</p>
<h3>What's Been Done</h3>
<p>The EU's <strong>Digital Services Act (DSA)</strong> (2024) requires large platforms to assess systemic risks and can fine up to <strong>6% of global revenue</strong>. Australia banned children under 16 from social media in 2024. In the US, <strong>Section 230</strong> broadly shields platforms from content liability, making strong US-style regulation difficult.</p>
<div class="kterms"><h4>Key Terms</h4><ul><li>Algorithmic amplification</li><li>Section 230</li><li>DSA (EU)</li><li>Filter bubble</li><li>Content moderation</li><li>Disinformation</li></ul></div>`,
persp:[
{t:"Regulate Now: Public Harm Is Clear",tja:"規制強化派",col:"#E91E8C",
story:`<p>In October 2021, Facebook data scientist Frances Haugen downloaded thousands of internal research documents before leaving the company, then shared them with The Wall Street Journal and the US Securities and Exchange Commission. The documents showed what the company had known but not disclosed: Facebook's own researchers had found Instagram worsened body image for <strong>1 in 3 teenage girls</strong> who already felt bad about themselves. A 2019 internal presentation stated bluntly: "We make body image issues worse for one in three teen girls." The documents showed the algorithm specifically amplified emotionally provocative content — outrage, fear, anxiety — because it maximized "meaningful social interactions" as Facebook measured them. The company had considered changes but repeatedly chose engagement over safety. Haugen testified to the Senate: "Facebook has demonstrated they cannot act independently. Congress must act."</p>
<p>The market failure logic is straightforward. When a pharmaceutical company's drug causes harm, it gets sued — which creates a financial incentive to run safety tests and recall dangerous products. Under the US's <strong>Section 230</strong> — enacted in 1996 before social media existed — platforms face essentially zero legal liability for content their algorithms amplify to billions of users. The result is a company that can knowingly damage teenage girls' mental health and face no legal or financial consequence. The EU's <strong>Digital Services Act (DSA)</strong> directly addresses this: large platforms must assess "systemic risks" created by their algorithms (including mental health impacts on minors), implement mitigations, and submit to independent audits. Violations: up to <strong>6% of annual global revenue</strong>. For Meta (roughly $117B revenue in 2023), that's approximately $7 billion — large enough to create genuine incentive to change.</p>
<p>The tobacco industry analogy is instructive. For decades, tobacco companies knew cigarettes caused cancer, suppressed the research, and marketed aggressively to teenagers. It took decades of lawsuits and federal regulation to change their behavior. Social media companies are in an analogous position: they have internal evidence of harm, continue the practice, and face no legal consequence under current law. Waiting for voluntary self-regulation has a track record — and it's not encouraging.</p>`,

{ja:"あなたの子どもが毎日4〜5時間TikTokを見ているとしよう。アルゴリズムが最適化しているのは「視聴時間の最大化」であって「子どもの幸福」ではない。最も過激で感情的なコンテンツが最もたくさん表示される設計になっている。これがタバコ会社が「タバコは体に良い」と言い続けたのと何が違うのか—規制派の問いかけだ。",en:"Your child watches TikTok 4–5 hours a day. The algorithm optimizing her screen time is optimizing for maximum engagement, not her wellbeing. The content most likely to keep a teenager scrolling: emotionally intense, appearance-focused, or divisive material. Regulators ask: how is this different from tobacco companies marketing cigarettes to teenagers while knowing the harm?"},

{t:"Free Speech Above All",tja:"表現の自由重視派",col:"#3498DB",
story:`<p>The case against social media regulation starts with an uncomfortable historical observation: governments with the power to define and remove "harmful speech" or "disinformation" have a consistent track record of using that power against speech that is merely inconvenient to those in power. In Brazil in 2022, the Supreme Court granted itself authority to remove social media content deemed "harmful to democracy" — powers that critics documented were used to silence journalists, opposition politicians, and critics of the court itself. In Hungary, Prime Minister Orbán's government passed a law criminalizing content that "distorts" information about COVID — applied in practice to restrict political opposition messaging. The question isn't whether platforms should have some content rules. It's: who decides what "harmful" means, and is that power trustworthy in every country that will use it?</p>
<p>Germany's NetzDG law illustrates the mechanism failure clearly. It required platforms to remove "clearly illegal" content within 24 hours under threat of fines up to €50 million. Platforms responded rationally: when in doubt, remove. Documented over-removal of lawful political speech followed. An anti-fascist group's posts were deleted. Parody accounts vanished. A comedy sketch was flagged as hate speech. The financial incentive was to err aggressively on the side of deletion — exactly what free speech advocates predicted would happen when governments make platforms liable for leaving content up.</p>
<p>Meanwhile, the social media that spreads misinformation also organized the Arab Spring (mobilizing millions in countries where traditional media was state-controlled), gave voice to #MeToo (allowing millions of women to share experiences that polite society had suppressed for decades), and amplified Black Lives Matter (bringing police violence evidence to national attention that local media had systematically ignored). Giving government or platforms the authority to define and remove "harmful" content means giving someone the power to have removed those movements before they became powerful — which is precisely when they were most "disruptive" and most needed.</p>`,
